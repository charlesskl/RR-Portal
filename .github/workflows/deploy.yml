name: Deploy to Cloud

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'devops/logs/**'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: deploy-cloud
  # cancel-in-progress: false (默认)，让并发 deploy 排队而非取消。
  # 2026-05-20 review-open-prs 踩坑：cancel-in-progress=true 时，
  # PR A merge 触发 deploy A 在 build peise，PR B merge 来了 cancel 掉 A，
  # B 的 BEFORE_COMMIT = A 的 after，导致 B 只 build 自己的 diff (huadeng)，
  # peise 永远没 build → 容器停在老 code，但 GHA 显示 SUCCESS。
  # 排队比快慢更重要 — 单次 deploy 47s~24min，等就等。
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CLOUD_HOST }}
          username: ${{ secrets.CLOUD_USER }}
          key: ${{ secrets.CLOUD_SSH_KEY }}
          command_timeout: 60m
          envs: BEFORE_COMMIT,AFTER_COMMIT
          # BEFORE_COMMIT / AFTER_COMMIT 传给 update-server.sh 用于算 diff
          # 脚本自己负责 git pull，不要在这里先 pull（否则 pull 后 HEAD 已经前进，脚本的 BEFORE==AFTER）
          script: |
            set -euo pipefail
            # set -e: 任一行 fail 立刻退出。之前没设导致 update-server.sh 退出非零仍
            # 继续跑 verify，验证又只 grep 一个长寿字符串 → false-positive SUCCESS。
            # 2026-05-20 review-open-prs 中 PR #144/#141 都因此中招（git pull 静默 abort）。

            export BEFORE_COMMIT="${{ github.event.before }}"
            export AFTER_COMMIT="${{ github.event.after }}"
            cd /opt/rr-portal

            # === peise Bailian env guard (2026-06-02) ===
            # 背景: 服务器 .env.cloud.production 缺 PEISE_BAILIAN_API_KEY → 容器里 key 为空 → OCR 不可用。
            # GitHub secret PEISE_BAILIAN_API_KEY 是唯一可信来源,每次部署确保服务器与其一致。
            # 同时修正历史遗留的 -latest 模型名(阿里云已关闭 -latest 别名访问,返回 403)。
            echo "=== peise Bailian env guard ==="
            PEISE_ENV_CHANGED=0
            PEISE_KEY='${{ secrets.PEISE_BAILIAN_API_KEY }}'
            if [ -n "$PEISE_KEY" ]; then
              if grep -q '^PEISE_BAILIAN_API_KEY=' .env.cloud.production; then
                CURRENT_KEY=$(grep '^PEISE_BAILIAN_API_KEY=' .env.cloud.production | head -1 | cut -d= -f2-)
                if [ "$CURRENT_KEY" != "$PEISE_KEY" ]; then
                  sed -i "s|^PEISE_BAILIAN_API_KEY=.*|PEISE_BAILIAN_API_KEY=$PEISE_KEY|" .env.cloud.production
                  PEISE_ENV_CHANGED=1
                  echo "[GUARD] PEISE_BAILIAN_API_KEY 与 secret 不一致 → 已更新"
                else
                  echo "[GUARD] PEISE_BAILIAN_API_KEY 已存在且一致"
                fi
              else
                echo "PEISE_BAILIAN_API_KEY=$PEISE_KEY" >> .env.cloud.production
                PEISE_ENV_CHANGED=1
                echo "[GUARD] PEISE_BAILIAN_API_KEY 不存在 → 已写入"
              fi
            else
              echo "[GUARD][WARN] GitHub secret PEISE_BAILIAN_API_KEY 为空,跳过"
            fi
            if grep -q '^PEISE_BAILIAN_MODEL=.*-latest' .env.cloud.production; then
              sed -i 's|^PEISE_BAILIAN_MODEL=.*|PEISE_BAILIAN_MODEL=qwen-vl-max|' .env.cloud.production
              PEISE_ENV_CHANGED=1
              echo "[GUARD] PEISE_BAILIAN_MODEL 含 -latest → 已改为 qwen-vl-max"
            fi
            echo "=== 诊断: peise 容器近期 LLM OCR 日志 ==="
            docker logs rr-portal-peise-1 --tail 200 2>&1 | grep "LLM OCR" | tail -5 || echo "(无相关日志)"

            export SHIPPING_HISTORY_SEED_PASSPHRASE='${{ secrets.SHIPPING_HISTORY_SEED_PASSPHRASE }}'

            echo "=== qc Bailian env guard ==="
            QC_ENV_CHANGED=0
            QC_KEY='${{ secrets.QC_BAILIAN_API_KEY }}'
            if [ -n "$QC_KEY" ]; then
              if grep -q '^QC_BAILIAN_API_KEY=' .env.cloud.production; then
                CURRENT_QC_KEY=$(grep '^QC_BAILIAN_API_KEY=' .env.cloud.production | head -1 | cut -d= -f2-)
                if [ "$CURRENT_QC_KEY" != "$QC_KEY" ]; then
                  sed -i "s|^QC_BAILIAN_API_KEY=.*|QC_BAILIAN_API_KEY=$QC_KEY|" .env.cloud.production
                  QC_ENV_CHANGED=1
                  echo "[GUARD] QC_BAILIAN_API_KEY updated from GitHub secret"
                else
                  echo "[GUARD] QC_BAILIAN_API_KEY already matches GitHub secret"
                fi
              else
                echo "QC_BAILIAN_API_KEY=$QC_KEY" >> .env.cloud.production
                QC_ENV_CHANGED=1
                echo "[GUARD] QC_BAILIAN_API_KEY added from GitHub secret"
              fi
            else
              echo "[GUARD][WARN] GitHub secret QC_BAILIAN_API_KEY is empty, skipping"
            fi

            echo "=== Script version check ==="
            grep -c "recreate" deploy/update-server.sh && echo "[OK] update-server.sh contains recreate logic" || echo "[WARN] update-server.sh MISSING recreate logic"
            bash deploy/update-server.sh
            bash deploy/install-shipping-history-seed.sh
            unset SHIPPING_HISTORY_SEED_PASSPHRASE

            # peise env guard 改了 .env.cloud.production → 必须 recreate 容器才能注入新 env
            if [ "$PEISE_ENV_CHANGED" = "1" ]; then
              echo "=== peise env 已修正 → force-recreate peise ==="
              docker compose -f docker-compose.cloud.yml --env-file .env.cloud.production up -d --no-deps --force-recreate peise
              echo "=== 验证容器内 BAILIAN env (key 打码) ==="
              docker exec rr-portal-peise-1 printenv | grep '^BAILIAN' | sed 's|\(BAILIAN_API_KEY=sk-....\).*|\1***|' || echo "[WARN] 容器内未找到 BAILIAN env"
            fi

            # qc env guard 改了 .env.cloud.production,必须 recreate 容器才能注入新 env
            if [ "$QC_ENV_CHANGED" = "1" ]; then
              echo "=== qc env changed -> force-recreate qc ==="
              docker compose -f docker-compose.cloud.yml --env-file .env.cloud.production up -d --no-deps --force-recreate qc
              echo "=== Verify qc container DASHSCOPE env (masked) ==="
              docker exec rr-portal-qc-1 printenv | grep '^DASHSCOPE_API_KEY=' | sed 's|\(DASHSCOPE_API_KEY=sk-....\).*|\1***|' || echo "[WARN] qc container DASHSCOPE_API_KEY env missing"
            fi

            echo ""
            echo "=== Verify deploy actually landed ==="
            # Critical：AFTER_COMMIT 必须是 HEAD 的 ancestor（HEAD == AFTER_COMMIT 或 HEAD 更新）。
            # 这比 == 更稳健：手动 rerun 旧 workflow 时 HEAD 已经领先，但只要不是落后就行。
            # 任何 git pull 静默 abort（HEAD 没追上 AFTER_COMMIT）都会被这一步 catch。
            ACTUAL_HEAD=$(git rev-parse HEAD)
            if ! git merge-base --is-ancestor "$AFTER_COMMIT" "$ACTUAL_HEAD"; then
              echo "[FAIL] AFTER_COMMIT ($AFTER_COMMIT) 不是当前 HEAD ($ACTUAL_HEAD) 的 ancestor"
              echo "       update-server.sh 大概率 git pull 静默失败。检查上面日志找 'Aborting' 或 'error:'。"
              echo "       常见根因：ECS 上有 runtime modified data 文件卡住 pull。"
              echo "       恢复 sequence：ssh ECS → git stash 那些 M 文件 → git pull → 重 trigger 部署。"
              exit 1
            fi
            if [ "$ACTUAL_HEAD" = "$AFTER_COMMIT" ]; then
              echo "[OK] git HEAD = $AFTER_COMMIT"
            else
              echo "[OK] git HEAD ($ACTUAL_HEAD) 是 $AFTER_COMMIT 的 descendant（main 已往前走，正常）"
            fi
            # 长寿字符串 sanity（nginx html 没被破坏）
            if docker exec rr-portal-nginx-1 grep -q "河源排期" /usr/share/nginx/html/index.html; then
              echo "[OK] nginx container index.html contains 河源排期"
            else
              echo "[FAIL] nginx container index.html missing 河源排期"
              exit 1
            fi

      - name: Health Check
        run: |
          sleep 30
          FAILED=0
          check_endpoint() {
            local ep=$1
            local status
            for attempt in 1 2 3; do
              status=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 10 \
                "http://${{ secrets.CLOUD_HOST }}${ep}" 2>/dev/null || echo "000")
              if [ "$status" = "200" ]; then
                echo "[OK] ${ep} (HTTP $status, attempt $attempt)"
                return 0
              fi
              [ $attempt -lt 3 ] && sleep 5
            done
            echo "[FAIL] ${ep} (HTTP $status after 3 attempts)"
            return 1
          }
          # Updated 2026-05-20: 补齐新部署 service (penyou/pi-outsource/production-plan/
          # tomy-paiqi/zuru-order-system/zuru-master/peise/huadeng) 的 health endpoint，
          # 之前 missing 这些 → 单 service deploy 挂了也不会被 health-check 抓到。
          for ENDPOINT in \
              /nginx-health \
              /health \
              /hy-schedule/health \
              /rr/health \
              /zouhuo/health \
              /jiangping/health \
              /paiji/health \
              /figure-mold-cost-system/health \
              /baojia/health \
              /liwenjuan/health \
              /huadeng-maorong/health \
              /huadeng/health \
              /peise/health \
              /qc/api/health \
              /penyou/api/health \
              /pi-outsource/api/health \
              /production-plan/health \
              /shipping/health \
              /tomy-paiqi/health \
              /zuru-order-system/health \
              /zuru-master/health; do
            check_endpoint "$ENDPOINT" || FAILED=$((FAILED + 1))
          done
          if [ "$FAILED" -gt 0 ]; then
            echo "Deployment failed: $FAILED services unhealthy"
            exit 1
          else
            echo "Deployment successful: all services healthy"
          fi
