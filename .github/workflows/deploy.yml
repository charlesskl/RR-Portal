name: Deploy to Cloud

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'devops/logs/**'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: deploy-cloud
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CLOUD_HOST }}
          username: ${{ secrets.CLOUD_USER }}
          key: ${{ secrets.CLOUD_SSH_KEY }}
          command_timeout: 60m
          envs: BEFORE_COMMIT,AFTER_COMMIT
          # BEFORE_COMMIT / AFTER_COMMIT 传给 update-server.sh 用于算 diff
          # 脚本自己负责 git pull，不要在这里先 pull（否则 pull 后 HEAD 已经前进，脚本的 BEFORE==AFTER）
          script: |
            export BEFORE_COMMIT="${{ github.event.before }}"
            export AFTER_COMMIT="${{ github.event.after }}"
            cd /opt/rr-portal
            bash deploy/update-server.sh

      - name: Verify Portal Content
        run: |
          sleep 5
          echo "Verifying portal index.html contains hy-schedule..."
          curl -sf --max-time 10 "http://${{ secrets.CLOUD_HOST }}/" 2>/dev/null | grep -q "河源排期" && echo "[OK] Portal content verified" || { echo "[FAIL] Portal content missing hy-schedule"; exit 1; }

      - name: Health Check
        run: |
          sleep 25
          FAILED=0
          check_endpoint() {
            local ep=$1
            local status
            for attempt in 1 2 3; do
              status=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 10 \
                "http://${{ secrets.CLOUD_HOST }}${ep}" 2>/dev/null || echo "000")
              if [ "$status" = "200" ]; then
                echo "[OK] ${ep} (HTTP $status, attempt $attempt)"
                return 0
              fi
              [ $attempt -lt 3 ] && sleep 5
            done
            echo "[FAIL] ${ep} (HTTP $status after 3 attempts)"
            return 1
          }
          for ENDPOINT in /nginx-health /health /hy-schedule/health /rr/health /zouhuo/health /jiangping/health /paiji/health /figure-mold-cost-system/health /quotation/health /liwenjuan/health; do
            check_endpoint "$ENDPOINT" || FAILED=$((FAILED + 1))
          done
          if [ "$FAILED" -gt 0 ]; then
            echo "Deployment failed: $FAILED services unhealthy"
            exit 1
          else
            echo "Deployment successful: all services healthy"
          fi
