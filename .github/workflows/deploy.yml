name: Deploy to Cloud

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'devops/logs/**'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: deploy-cloud
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CLOUD_HOST }}
          username: ${{ secrets.CLOUD_USER }}
          key: ${{ secrets.CLOUD_SSH_KEY }}
          command_timeout: 60m
          envs: BEFORE_COMMIT,AFTER_COMMIT
          # BEFORE_COMMIT / AFTER_COMMIT 传给 update-server.sh 用于算 diff
          # 脚本自己负责 git pull，不要在这里先 pull（否则 pull 后 HEAD 已经前进，脚本的 BEFORE==AFTER）
          script: |
            export BEFORE_COMMIT="${{ github.event.before }}"
            export AFTER_COMMIT="${{ github.event.after }}"
            cd /opt/rr-portal
            bash deploy/update-server.sh
            echo ""
            echo "=== Direct file check ==="
            if grep -q "河源排期" frontend/index.cloud.html; then
              echo "[OK] frontend/index.cloud.html contains 河源排期"
            else
              echo "[FAIL] frontend/index.cloud.html MISSING 河源排期"
              head -n 5 frontend/index.cloud.html
            fi
            echo ""
            echo "=== Docker container check ==="
            docker ps --format "table {{.Names}}\t{{.Image}}" | grep -i nginx || echo "No nginx containers found"
            echo ""
            echo "=== Container mounts ==="
            docker inspect rr-portal-nginx-1 2>/dev/null | python3 -c "
import sys, json
d = json.load(sys.stdin)[0]
print('Name:', d['Name'])
print('Mounts:')
for m in d.get('Mounts', []):
    print(f'  {m.get(\"Type\")}: {m.get(\"Source\")} -> {m.get(\"Destination\")}')
" || echo "Cannot inspect container"
            echo ""
            echo "=== Container file content ==="
            docker exec rr-portal-nginx-1 sh -c 'wc -c /usr/share/nginx/html/index.html && head -3 /usr/share/nginx/html/index.html' 2>/dev/null || echo "Cannot read container file"
            echo ""
            echo "=== Verify Portal Content (localhost) ==="
            sleep 2
            if curl -sf --max-time 10 http://localhost/ 2>/dev/null | grep -q "河源排期"; then
              echo "[OK] localhost returns 河源排期"
            else
              echo "[FAIL] localhost missing 河源排期"
              echo "--- Actual HTTP response (first 500 chars) ---"
              curl -sf --max-time 10 http://localhost/ 2>/dev/null | head -c 500
              echo ""
              exit 1
            fi

      - name: Health Check
        run: |
          sleep 30
          FAILED=0
          check_endpoint() {
            local ep=$1
            local status
            for attempt in 1 2 3; do
              status=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 10 \
                "http://${{ secrets.CLOUD_HOST }}${ep}" 2>/dev/null || echo "000")
              if [ "$status" = "200" ]; then
                echo "[OK] ${ep} (HTTP $status, attempt $attempt)"
                return 0
              fi
              [ $attempt -lt 3 ] && sleep 5
            done
            echo "[FAIL] ${ep} (HTTP $status after 3 attempts)"
            return 1
          }
          for ENDPOINT in /nginx-health /health /hy-schedule/health /rr/health /zouhuo/health /jiangping/health /paiji/health /figure-mold-cost-system/health /quotation/health /liwenjuan/health; do
            check_endpoint "$ENDPOINT" || FAILED=$((FAILED + 1))
          done
          if [ "$FAILED" -gt 0 ]; then
            echo "Deployment failed: $FAILED services unhealthy"
            exit 1
          else
            echo "Deployment successful: all services healthy"
          fi
