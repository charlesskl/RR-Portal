name: Deploy to Cloud

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'devops/logs/**'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: deploy-cloud
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CLOUD_HOST }}
          username: ${{ secrets.CLOUD_USER }}
          key: ${{ secrets.CLOUD_SSH_KEY }}
          command_timeout: 60m
          script: |
            cd /opt/rr-portal
            git fetch origin
            git checkout main
            git pull --ff-only origin main
            bash deploy/update-server.sh

      - name: Health Check
        run: |
          sleep 30
          FAILED=0
          for ENDPOINT in /nginx-health /health /rr/health /zouhuo/health /jiangping/health /paiji/health /new-product-schedule/health /figure-mold-cost-system/health; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 10 "http://${{ secrets.CLOUD_HOST }}${ENDPOINT}" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "[OK] ${ENDPOINT} (HTTP $STATUS)"
            else
              echo "[FAIL] ${ENDPOINT} (HTTP $STATUS)"
              FAILED=$((FAILED + 1))
            fi
          done
          if [ "$FAILED" -gt 2 ]; then
            echo "Deployment failed: $FAILED services unhealthy"
            exit 1
          elif [ "$FAILED" -gt 0 ]; then
            echo "Deployment partial: $FAILED services unhealthy (non-critical)"
          else
            echo "Deployment successful: all services healthy"
          fi
