name: Docker Mirror Ops

# 修复/管理 ECS 主机 /etc/docker/daemon.json 的 registry-mirror（手动触发）。
# 背景：原 mirror 指向 mirror.ccs.tencentyun.com（腾讯云内网），在这台阿里云 ECS 上
#       DNS 解析失败，base image 拉取报 no such host（见 PR #295/#298）。
#
#   mode=diagnose  —— 只读：打印 daemon.json / docker info 的 Registry Mirrors / docker 版本。不改任何东西。
#   mode=apply     —— 把 registry-mirrors 替换为 mirror_url（可空格/逗号分隔多个）。
#                     先备份 daemon.json，python 合并（保留其它键），json 校验，
#                     systemctl reload docker（registry-mirrors 可热重载，不重启容器、零停机），
#                     再 docker info 验证 + test pull。失败自动回滚到备份。
#   mode=rollback  —— 从最近一次 .bak 恢复 daemon.json 并 reload。
#
# registry-mirrors 是 dockerd SIGHUP 可热重载的配置项，reload 不会重启任何容器。

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "diagnose(只读) / apply(改 mirror) / rollback(恢复备份)"
        type: choice
        required: true
        default: diagnose
        options:
          - diagnose
          - apply
          - rollback
      mirror_url:
        description: "apply 用：镜像加速器 URL，多个用空格/逗号分隔（如 https://xxxx.mirror.aliyuncs.com）"
        type: string
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: deploy-cloud
  queue: max
  cancel-in-progress: false

jobs:
  mirror-ops:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Validate SSH host fingerprint
        shell: bash
        env:
          CLOUD_HOST_FINGERPRINT: ${{ secrets.CLOUD_HOST_FINGERPRINT }}
        run: |
          set -euo pipefail
          if [[ ! "$CLOUD_HOST_FINGERPRINT" =~ ^SHA256:[A-Za-z0-9+/]{43}=?$ ]]; then
            echo 'CLOUD_HOST_FINGERPRINT must be a non-empty OpenSSH SHA256 fingerprint.' >&2
            exit 1
          fi

      - name: Docker mirror ops via SSH
        env:
          CLOUD_HOST_FINGERPRINT: ${{ secrets.CLOUD_HOST_FINGERPRINT }}
          OPS_MODE: ${{ inputs.mode }}
          MIRROR_URL: ${{ inputs.mirror_url }}
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        with:
          host: ${{ secrets.CLOUD_HOST }}
          username: ${{ secrets.CLOUD_USER }}
          key: ${{ secrets.CLOUD_SSH_KEY }}
          fingerprint: ${{ env.CLOUD_HOST_FINGERPRINT }}
          command_timeout: 12m
          envs: OPS_MODE,MIRROR_URL
          script: |
            set -euo pipefail
            MODE="${OPS_MODE:-diagnose}"
            DJ=/etc/docker/daemon.json
            echo "=================== MODE: $MODE ==================="

            echo "== docker version =="
            docker version --format '{{.Server.Version}}' 2>/dev/null || docker --version || true

            echo "== 当前 $DJ =="
            if [ -f "$DJ" ]; then cat "$DJ"; else echo "(不存在)"; fi

            echo "== docker info: Registry Mirrors =="
            docker info 2>/dev/null | grep -A5 -i "Registry Mirrors" || echo "(docker info 未显示 mirror)"

            if [ "$MODE" = "diagnose" ]; then
              echo "== 现有备份 =="
              ls -t "${DJ}".bak.* 2>/dev/null | head -5 || echo "(无备份)"
              echo "[OK] diagnose 完成（只读，未改动任何东西）"
              exit 0
            fi

            if [ "$MODE" = "rollback" ]; then
              LATEST_BAK="$(ls -t ${DJ}.bak.* 2>/dev/null | head -1 || true)"
              [ -n "$LATEST_BAK" ] || { echo "[FAIL] 找不到 ${DJ}.bak.* 备份，无法回滚" >&2; exit 1; }
              echo "-- 从 $LATEST_BAK 恢复 --"
              cp "$LATEST_BAK" "$DJ"
              python3 -m json.tool "$DJ" >/dev/null || { echo "[FAIL] 备份文件不是合法 JSON" >&2; exit 1; }
              systemctl reload docker
              echo "-- 恢复后 docker info --"; docker info 2>/dev/null | grep -A5 -i "Registry Mirrors" || true
              echo "[OK] rollback 完成"
              exit 0
            fi

            # ─── apply ───
            [ -n "${MIRROR_URL// /}" ] || { echo "[FAIL] apply 模式必须提供 mirror_url" >&2; exit 1; }

            # 把空格/逗号分隔的 URL 解析成 JSON 数组（带格式校验），写到 /tmp/mirrors.json
            python3 -c 'import os,json,sys,re; raw=os.environ["MIRROR_URL"].replace(",", " ").split(); urls=[u.rstrip("/") for u in raw if u.strip()]; bad=[u for u in urls if not re.match(r"^https?://[A-Za-z0-9.-]+(:\d+)?$", u)]; (sys.exit("[FAIL] 非法镜像 URL: "+", ".join(bad)) if bad else None); (sys.exit("[FAIL] 没有解析到有效 URL") if not urls else None); open("/tmp/mirrors.json","w").write(json.dumps(urls))'
            MIRRORS_JSON="$(cat /tmp/mirrors.json)"
            echo "-- 目标 registry-mirrors: $MIRRORS_JSON --"

            # 备份
            TS="$(date +%Y%m%d-%H%M%S)"
            if [ -f "$DJ" ]; then
              cp "$DJ" "${DJ}.bak.${TS}"
              echo "-- 已备份到 ${DJ}.bak.${TS} --"
            else
              echo "-- $DJ 不存在，将新建 --"
            fi

            # 合并：保留其它键，只替换 registry-mirrors（现有 JSON 非法则拒绝改动）
            DJ="$DJ" python3 -c 'import os,json,sys; p=os.environ["DJ"]; m=json.load(open("/tmp/mirrors.json")); t=(open(p).read().strip() if os.path.exists(p) else ""); cfg=({} if not t else json.loads(t)); cfg["registry-mirrors"]=m; json.dump(cfg, open(p+".new","w"), indent=2, ensure_ascii=False); open(p+".new","a").write("\n")' || { echo "[FAIL] 现有 daemon.json 不是合法 JSON，拒绝改动" >&2; exit 1; }
            python3 -m json.tool "${DJ}.new" >/dev/null || { echo "[FAIL] 新配置不是合法 JSON，放弃" >&2; rm -f "${DJ}.new"; exit 1; }
            mv "${DJ}.new" "$DJ"
            echo "-- 新 $DJ --"; cat "$DJ"

            # 热重载（registry-mirrors 可 reload，不重启容器）
            echo "-- systemctl reload docker（零停机，不重启容器）--"
            if ! systemctl reload docker; then
              echo "[WARN] reload 失败，尝试 kill -HUP dockerd"
              kill -HUP "$(pidof dockerd | awk '{print $1}')" || true
            fi
            sleep 3

            echo "-- 验证 docker info Registry Mirrors --"
            docker info 2>/dev/null | grep -A5 -i "Registry Mirrors" || echo "(未显示)"

            # test pull：拉一个小镜像验证新 mirror 真能用（失败则回滚）
            echo "-- test pull hello-world:latest --"
            if docker pull hello-world:latest >/dev/null 2>&1; then
              echo "[OK] test pull 成功，新镜像源可用"
              docker rmi hello-world:latest >/dev/null 2>&1 || true
            else
              echo "[FAIL] test pull 失败，新镜像源不可用 → 回滚到备份"
              if [ -f "${DJ}.bak.${TS}" ]; then
                cp "${DJ}.bak.${TS}" "$DJ"
                systemctl reload docker || kill -HUP "$(pidof dockerd | awk '{print $1}')" || true
                echo "[OK] 已回滚。运行中的容器全程未受影响（reload 不重启容器）。"
              fi
              exit 1
            fi

            # 确认没有把容器搞挂
            echo "-- 运行中容器数 --"; docker ps --format '{{.Names}}' | wc -l
            echo "[OK] apply 完成：registry-mirror 已换新并热重载，容器零重启。"
