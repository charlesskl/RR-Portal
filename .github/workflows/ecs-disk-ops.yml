name: ECS Disk Ops

# ECS 磁盘运维（手动触发）：
#   mode=diagnose   —— 只读诊断：df / lsblk / growpart dry-run / docker system df / 大目录，绝不改动任何东西
#   mode=prune-safe —— 安全回收：docker builder prune + 无容器引用的镜像 prune
#                      不动运行中的容器、不动任何 volume/数据、不动 data 目录
#   mode=grow-disk  —— 把根分区/文件系统撑满整块云盘（growpart + resize2fs/xfs_growfs）
#                      云盘 70GiB 但分区只用 40G 时用它把剩余 ~30GB 扩进来
# 用于 indo-shipping 上线前腾磁盘（需 >=10GB 空闲）。

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "diagnose / prune-safe / grow-disk / indo-stop(临时停indo腾内存)"
        type: choice
        required: true
        default: diagnose
        options:
          - diagnose
          - prune-safe
          - grow-disk
          - indo-stop

permissions:
  contents: read

concurrency:
  group: deploy-cloud
  queue: max
  cancel-in-progress: false

jobs:
  disk-ops:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Validate SSH host fingerprint
        shell: bash
        env:
          CLOUD_HOST_FINGERPRINT: ${{ secrets.CLOUD_HOST_FINGERPRINT }}
        run: |
          set -euo pipefail
          if [[ ! "$CLOUD_HOST_FINGERPRINT" =~ ^SHA256:[A-Za-z0-9+/]{43}=?$ ]]; then
            echo 'CLOUD_HOST_FINGERPRINT must be a non-empty OpenSSH SHA256 fingerprint.' >&2
            exit 1
          fi

      - name: ECS disk ops via SSH
        env:
          CLOUD_HOST_FINGERPRINT: ${{ secrets.CLOUD_HOST_FINGERPRINT }}
          OPS_MODE: ${{ inputs.mode }}
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        with:
          host: ${{ secrets.CLOUD_HOST }}
          username: ${{ secrets.CLOUD_USER }}
          key: ${{ secrets.CLOUD_SSH_KEY }}
          fingerprint: ${{ env.CLOUD_HOST_FINGERPRINT }}
          command_timeout: 18m
          envs: OPS_MODE
          script: |
            set -euo pipefail
            MODE="${OPS_MODE:-diagnose}"
            echo "=================== MODE: $MODE ==================="

            echo "== df -h =="
            df -h

            echo "== lsblk =="
            lsblk || true

            echo "== 根分区/未分配空间（growpart dry-run） =="
            ROOT_PART="$(findmnt -no SOURCE / || true)"
            ROOT_FSTYPE="$(findmnt -no FSTYPE / || true)"
            ROOT_DISK="/dev/$(lsblk -no PKNAME "$ROOT_PART" 2>/dev/null | head -1 || true)"
            ROOT_PARTNUM="$(echo "$ROOT_PART" | grep -oE '[0-9]+$' || true)"
            echo "root part=$ROOT_PART  disk=$ROOT_DISK  partnum=$ROOT_PARTNUM  fstype=$ROOT_FSTYPE"
            if command -v growpart >/dev/null 2>&1; then
              growpart -N "$ROOT_DISK" "$ROOT_PARTNUM" 2>&1 || echo "(growpart dry-run: 无可扩空间或已最大)"
            else
              echo "(growpart 未安装，grow-disk 模式会自动装 cloud-guest-utils)"
            fi

            echo "== docker system df =="
            docker system df || true

            echo "== /var/lib/docker 一级子目录 =="
            du -xhd1 /var/lib/docker 2>/dev/null | sort -h | tail -12 || true

            echo "== /opt/rr-portal 一级子目录 =="
            du -xhd1 /opt/rr-portal 2>/dev/null | sort -h | tail -15 || true

            echo "== journal 日志占用 =="
            journalctl --disk-usage 2>/dev/null || true

            if [ "$MODE" = "prune-safe" ]; then
              echo "=================== PRUNE-SAFE ==================="
              echo "-- 清理前 df --"; df -h / | tail -1
              echo "-- docker builder prune -af (仅构建缓存) --"
              docker builder prune -af || true
              echo "-- docker image prune -af (仅无容器引用的镜像；不动运行中容器/数据/volume) --"
              docker image prune -af || true
              echo "-- 清理后 df --"; df -h / | tail -1
              echo "-- 清理后 docker system df --"; docker system df || true
              echo "[OK] prune-safe 完成（未动任何运行中的容器/volume/data 目录）"

            elif [ "$MODE" = "grow-disk" ]; then
              echo "=================== GROW-DISK ==================="
              [ -n "$ROOT_PART" ] && [ -n "$ROOT_DISK" ] && [ -n "$ROOT_PARTNUM" ] || { echo "[FAIL] 无法解析根分区信息" >&2; exit 1; }
              echo "-- 扩容前 --"; df -h "$ROOT_PART" | tail -1; lsblk "$ROOT_DISK" || true
              if ! command -v growpart >/dev/null 2>&1; then
                echo "-- 安装 cloud-guest-utils（提供 growpart） --"
                apt-get update && apt-get install -y --no-install-recommends cloud-guest-utils
              fi
              echo "-- growpart $ROOT_DISK $ROOT_PARTNUM --"
              growpart "$ROOT_DISK" "$ROOT_PARTNUM" || echo "(growpart: NOCHANGE，可能已是最大)"
              echo "-- 扩文件系统 (fstype=$ROOT_FSTYPE) --"
              case "$ROOT_FSTYPE" in
                ext2|ext3|ext4) resize2fs "$ROOT_PART" ;;
                xfs)            xfs_growfs / ;;
                *) echo "[FAIL] 未知文件系统 $ROOT_FSTYPE，需手动处理" >&2; exit 1 ;;
              esac
              echo "-- 扩容后 --"; df -h "$ROOT_PART" | tail -1; lsblk "$ROOT_DISK" || true
              echo "[OK] grow-disk 完成（数据/容器不受影响，只是分区变大）"

            elif [ "$MODE" = "indo-stop" ]; then
              echo "=================== INDO-STOP ==================="
              echo "-- 停止前 free --"; free -m | awk '/^Mem:/{print "  available: "$7" MB"}'
              echo "-- 停 indo 容器（数据在 bind mount，安全；随后由 deploy 拉回） --"
              docker stop rr-portal-indo-shipping-1 rr-portal-indo-sqlserver-1 2>/dev/null || true
              sleep 3
              echo "-- 停止后 free --"; free -m | awk '/^Mem:/{print "  available: "$7" MB (需 >=2500 才能过 indo 预检)"}'
              echo "[OK] indo-stop 完成。立即触发一次 Deploy to Cloud，它会重新拉起 indo（含重设密码 + 持久化 transport）。"

            else
              echo "[OK] diagnose 完成（只读，未改动任何东西）"
            fi
