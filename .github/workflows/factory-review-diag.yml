name: Factory Review Diag

# 只读诊断 factory-review 的 pb_data 数据状态（手动触发）。
# 用于排查「货期管理入单记录消失」——确认 orders 表实际有多少行、pb_data 是否被重置。
# 全程只读：count/ls/du/日志，绝不改动任何数据。

on:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: deploy-cloud
  queue: max
  cancel-in-progress: false

jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Validate SSH host fingerprint
        shell: bash
        env:
          CLOUD_HOST_FINGERPRINT: ${{ secrets.CLOUD_HOST_FINGERPRINT }}
        run: |
          set -euo pipefail
          if [[ ! "$CLOUD_HOST_FINGERPRINT" =~ ^SHA256:[A-Za-z0-9+/]{43}=?$ ]]; then
            echo 'CLOUD_HOST_FINGERPRINT must be a non-empty OpenSSH SHA256 fingerprint.' >&2
            exit 1
          fi

      - name: Diagnose factory-review pb_data via SSH
        env:
          CLOUD_HOST_FINGERPRINT: ${{ secrets.CLOUD_HOST_FINGERPRINT }}
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        with:
          host: ${{ secrets.CLOUD_HOST }}
          username: ${{ secrets.CLOUD_USER }}
          key: ${{ secrets.CLOUD_SSH_KEY }}
          fingerprint: ${{ env.CLOUD_HOST_FINGERPRINT }}
          command_timeout: 8m
          script: |
            set -uo pipefail
            APP="/opt/rr-portal/apps/PMC跟仓管/加工厂月度评审管理制度"
            PBDATA="$APP/pb_data"
            echo "=================== factory-review pb_data 诊断 ==================="

            echo "== 容器状态 =="
            docker ps --filter name=factory-review --format '{{.Names}}\t{{.Status}}' || true

            echo "== pb_data 目录（host 侧 bind mount）=="
            ls -la "$PBDATA" 2>&1 | head -30 || echo "(pb_data 不存在!)"
            echo "-- du --"; du -sh "$PBDATA" 2>/dev/null || true
            echo "-- data.db 大小/时间 --"; ls -la "$PBDATA"/data.db* 2>/dev/null || echo "(无 data.db!)"

            echo "== orders 统计 / listRule / 最近 API 日志（python3 只读）=="
            python3 - "$PBDATA/data.db" <<'PY'
            import sqlite3, sys, os, json
            db = sys.argv[1]
            if not os.path.exists(db):
                print("data.db 不存在:", db); sys.exit(0)
            con = sqlite3.connect(f"file:{db}?mode=ro", uri=True, timeout=5)
            cur = con.cursor()
            try:
                n = cur.execute("select count(*) from `orders`").fetchone()[0]
                print("COUNT orders =", n)
                for st, c in cur.execute("select status, count(*) from `orders` group by status").fetchall():
                    print(f"  status {st!r}: {c}")
            except Exception as e:
                print("orders 统计失败:", e)
            try:
                for name, typ, lr, vr in cur.execute("select name, type, listRule, viewRule from _collections where name in ('orders','factories','users')").fetchall():
                    print(f"collection {name} type={typ} listRule={lr!r} viewRule={vr!r}")
            except Exception as e:
                print("collections 读取失败:", e)
            try:
                print("users count =", cur.execute("select count(*) from `users`").fetchone()[0])
            except Exception as e:
                print("users 读取失败:", e)
            # 最新 8 条订单的关键字段（排查是否有畸形数据把明细渲染搞崩）
            try:
                cols = [r[1] for r in cur.execute("PRAGMA table_info(`orders`)").fetchall()]
                print("orders 列:", ", ".join(cols))
                pick = [c for c in ("id","factory","item_no","order_no","product","process_category","quantity","amount","order_date","delivery_date","actual_delivery_date","unit_price","unit_price_cny_tax","exchange_rate","status","created") if c in cols]
                q = "select " + ",".join(f"`{c}`" for c in pick) + " from `orders` order by rowid desc limit 8"
                print("-- 最新 8 条订单 --")
                for row in cur.execute(q).fetchall():
                    print("  " + json.dumps(dict(zip(pick,row)), ensure_ascii=False, default=str))
                # 这些订单的 factory 是否都能在 factories 表里找到（expand 会不会失败）
                miss = cur.execute("select count(*) from `orders` o where o.factory not in (select id from `factories`)").fetchone()[0]
                print("factory 找不到对应工厂的订单数:", miss)
                nullf = cur.execute("select count(*) from `orders` where factory is null or factory=''").fetchone()[0]
                print("factory 为空的订单数:", nullf)
            except Exception as e:
                print("订单字段抽样失败:", e)
            con.close()
            # auxiliary.db 里的请求日志（PB 0.39 把 logs 放这）
            auxp = os.path.join(os.path.dirname(db), "auxiliary.db")
            if os.path.exists(auxp):
                try:
                    ac = sqlite3.connect(f"file:{auxp}?mode=ro", uri=True, timeout=5)
                    acur = ac.cursor()
                    atbls = [r[0] for r in acur.execute("select name from sqlite_master where type='table'").fetchall()]
                    print("auxiliary.db tables:", ", ".join(atbls))
                    logtbl = "_logs" if "_logs" in atbls else ("logs" if "logs" in atbls else None)
                    if logtbl:
                        rows = acur.execute(f"select created, level, message, data from `{logtbl}` order by rowid desc limit 200").fetchall()
                        print(f"-- 最近 {logtbl} 里 orders/factories 请求与非2xx --")
                        shown = 0
                        for created, level, message, data in rows:
                            d = {}
                            try: d = json.loads(data) if data else {}
                            except Exception: pass
                            url = str(d.get("url","")); status = d.get("status"); method = d.get("method","")
                            err = False
                            try: err = status is not None and int(status) >= 400
                            except Exception: pass
                            if ("orders" in url) or ("factories" in url) or ("auth" in url) or err:
                                print(f"  {created} {method} {status} {url}  {str(message)[:80]}")
                                shown += 1
                            if shown >= 40: break
                        if not shown: print("  (无相关请求日志)")
                    ac.close()
                except Exception as e:
                    print("auxiliary.db 读取失败:", e)
            else:
                print("auxiliary.db 不存在")
            PY

            echo "== 容器近 40 行日志（找 hook/JS/DB 错误）=="
            docker logs --tail 40 rr-portal-factory-review-1 2>&1 | tail -40 || true

            echo "== ~/rr-backups 里 factory-review 相关备份 =="
            ls -lt ~/rr-backups/ 2>/dev/null | grep -i "factory\|review\|pb_data" | head || echo "(无匹配备份)"
            echo "=================== 诊断结束（只读）==================="
