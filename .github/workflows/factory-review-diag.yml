name: Factory Review Diag

# 只读诊断 factory-review 的 pb_data 数据状态（手动触发）。
# 用于排查「货期管理入单记录消失」——确认 orders 表实际有多少行、pb_data 是否被重置。
# 全程只读：count/ls/du/日志，绝不改动任何数据。

on:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: deploy-cloud
  queue: max
  cancel-in-progress: false

jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Validate SSH host fingerprint
        shell: bash
        env:
          CLOUD_HOST_FINGERPRINT: ${{ secrets.CLOUD_HOST_FINGERPRINT }}
        run: |
          set -euo pipefail
          if [[ ! "$CLOUD_HOST_FINGERPRINT" =~ ^SHA256:[A-Za-z0-9+/]{43}=?$ ]]; then
            echo 'CLOUD_HOST_FINGERPRINT must be a non-empty OpenSSH SHA256 fingerprint.' >&2
            exit 1
          fi

      - name: Diagnose factory-review pb_data via SSH
        env:
          CLOUD_HOST_FINGERPRINT: ${{ secrets.CLOUD_HOST_FINGERPRINT }}
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        with:
          host: ${{ secrets.CLOUD_HOST }}
          username: ${{ secrets.CLOUD_USER }}
          key: ${{ secrets.CLOUD_SSH_KEY }}
          fingerprint: ${{ env.CLOUD_HOST_FINGERPRINT }}
          command_timeout: 8m
          script: |
            set -uo pipefail
            APP="/opt/rr-portal/apps/PMC跟仓管/加工厂月度评审管理制度"
            PBDATA="$APP/pb_data"
            echo "=================== factory-review pb_data 诊断 ==================="

            echo "== 容器状态 =="
            docker ps --filter name=factory-review --format '{{.Names}}\t{{.Status}}' || true

            echo "== pb_data 目录（host 侧 bind mount）=="
            ls -la "$PBDATA" 2>&1 | head -30 || echo "(pb_data 不存在!)"
            echo "-- du --"; du -sh "$PBDATA" 2>/dev/null || true
            echo "-- data.db 大小/时间 --"; ls -la "$PBDATA"/data.db* 2>/dev/null || echo "(无 data.db!)"

            echo "== orders 统计 / listRule / 最近 API 日志（python3 只读）=="
            python3 - "$PBDATA/data.db" <<'PY'
            import sqlite3, sys, os, json
            db = sys.argv[1]
            if not os.path.exists(db):
                print("data.db 不存在:", db); sys.exit(0)
            con = sqlite3.connect(f"file:{db}?mode=ro", uri=True, timeout=5)
            cur = con.cursor()
            try:
                n = cur.execute("select count(*) from `orders`").fetchone()[0]
                print("COUNT orders =", n)
                for st, c in cur.execute("select status, count(*) from `orders` group by status").fetchall():
                    print(f"  status {st!r}: {c}")
            except Exception as e:
                print("orders 统计失败:", e)
            try:
                for name, typ, lr, vr in cur.execute("select name, type, listRule, viewRule from _collections where name in ('orders','factories','users')").fetchall():
                    print(f"collection {name} type={typ} listRule={lr!r} viewRule={vr!r}")
            except Exception as e:
                print("collections 读取失败:", e)
            try:
                print("users count =", cur.execute("select count(*) from `users`").fetchone()[0])
            except Exception as e:
                print("users 读取失败:", e)
            try:
                rows = cur.execute("select created, level, message, data from _logs order by created desc limit 120").fetchall()
                print(f"-- 最近日志里 /api 请求与非2xx（扫 {len(rows)} 条）--")
                shown = 0
                for created, level, message, data in rows:
                    d = {}
                    try: d = json.loads(data) if data else {}
                    except Exception: pass
                    url = str(d.get("url","")); status = d.get("status"); method = d.get("method","")
                    is_err = False
                    try: is_err = status is not None and int(status) >= 400
                    except Exception: pass
                    if ("/api/" in url) or is_err:
                        print(f"  {created} [{level}] {method} {status} {url}  {message}")
                        shown += 1
                    if shown >= 45: break
                if not shown:
                    print("  (无 /api 请求日志——PB 可能未记录请求级日志)")
            except Exception as e:
                print("_logs 读取失败:", e)
            con.close()
            PY

            echo "== 容器近 40 行日志（找 hook/JS/DB 错误）=="
            docker logs --tail 40 rr-portal-factory-review-1 2>&1 | tail -40 || true

            echo "== ~/rr-backups 里 factory-review 相关备份 =="
            ls -lt ~/rr-backups/ 2>/dev/null | grep -i "factory\|review\|pb_data" | head || echo "(无匹配备份)"
            echo "=================== 诊断结束（只读）==================="
