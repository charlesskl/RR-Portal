<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>唱片机管理系统 - 登录</title>
<link rel="stylesheet" href="/static/style.css?v=11">
</head>
<body class="login-page">
<main class="login-shell">
  <section class="login-panel panel">
    <div class="brand-row">
      <div class="brand-mark logo-mark"><img src="/static/royal-regent-logo-transparent.png" alt="Royal Regent"></div>
      <div>
        <h1>唱片机管理系统</h1>
        <p>选择部门后进入对应业务页面</p>
      </div>
    </div>

    <label for="username">账号</label>
    <input id="username" placeholder="请输入账号" autocomplete="username">

    <label for="password">密码</label>
    <input id="password" type="password" placeholder="请输入密码" autocomplete="current-password">

    <label for="department">部门</label>
    <select id="department" title="部门"></select>

    <button class="primary-btn" onclick="doLogin()">登录系统</button>
    <p id="err" class="err"></p>
  </section>

  <a class="summary-link-card panel" href="/static/public-summary.html">
    <div>
      <h2>公开汇总</h2>
      <p>不登录也能查看数量汇总</p>
    </div>
    <span>查看详情</span>
  </a>
</main>

<script>
const APP_BASE = window.APP_BASE || '';

function appPath(path) {
  return `${APP_BASE}${path}`;
}

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

async function loadDepartments() {
  const r = await fetch(appPath('/api/departments'));
  const departments = await r.json();
  document.getElementById('department').innerHTML = departments
    .map(name => `<option value="${esc(name)}">${esc(name)}</option>`)
    .join('');
}

async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const department = document.getElementById('department').value;
  const r = await fetch(appPath('/api/login'), {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({username, password, department})
  });
  if (r.ok) {
    location.href = appPath('/static/app.html');
  } else {
    const e = await r.json().catch(() => ({}));
    document.getElementById('err').textContent = e.detail || '账号、密码或部门错误';
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

loadDepartments();
</script>
</body>
</html>
