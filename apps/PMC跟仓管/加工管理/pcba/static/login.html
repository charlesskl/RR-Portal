<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>77794 PCBA 系统 - 登录</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="login-box">
  <h2>77794 PCBA 系统</h2>
  <input id="username" placeholder="账号" autocomplete="username">
  <input id="password" type="password" placeholder="密码" autocomplete="current-password">
  <button onclick="doLogin()">登录</button>
  <p id="err" class="err"></p>
</div>
<script>
const B = window.APP_BASE || '';
async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const r = await fetch(B + '/api/login', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({username, password})
  });
  if (r.ok) { location.href = B + '/static/app.html'; }
  else { document.getElementById('err').textContent = '账号或密码错误'; }
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
