{% extends "base.html" %}
{% block title %}登录 - {{ sec_info.name }}{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-16">
    <div class="bg-white shadow-sm rounded-lg p-8">
        <h1 class="text-xl font-bold text-gray-800 mb-2">{{ sec_info.name }}</h1>
        <p class="text-sm text-gray-500 mb-6">请输入该板块密码以继续</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for msg in messages %}
                <div class="mb-4 px-3 py-2 bg-red-50 text-red-700 border border-red-200 rounded text-sm">
                    {{ msg }}
                </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="/section/{{ sec }}/login">
            <label class="block text-sm text-gray-600 mb-1">账号</label>
            <input type="text" name="username" required autofocus autocomplete="username"
                   class="w-full border rounded px-3 py-2 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <label class="block text-sm text-gray-600 mb-1">密码</label>
            <input type="password" name="password" required autocomplete="current-password"
                   class="w-full border rounded px-3 py-2 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button type="submit"
                    class="w-full py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
                登录
            </button>
        </form>

        <div class="mt-6 text-center">
            <a href="/" class="text-sm text-gray-500 hover:text-blue-600">返回首页</a>
        </div>
    </div>
</div>
{% endblock %}
