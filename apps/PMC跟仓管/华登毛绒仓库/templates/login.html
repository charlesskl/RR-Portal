<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 · 华登库存</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #FAFAF7;
    color: #1A1A17;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .login-card {
    background: white;
    border: 1px solid #E5E3DD;
    border-radius: 12px;
    padding: 40px 36px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.04);
  }
  .brand { text-align: center; margin-bottom: 32px; }
  .brand-title { font-size: 20px; font-weight: 600; margin-bottom: 6px; letter-spacing: -0.01em; }
  .brand-sub { font-size: 13px; color: #5F5E58; }
  .form-row { margin-bottom: 14px; }
  .form-label { display: block; font-size: 12px; color: #5F5E58; margin-bottom: 6px; font-weight: 500; }
  input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #D1CFC7;
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
    color: #1A1A17;
  }
  input:focus { outline: none; border-color: #1A4D8F; }
  button {
    width: 100%;
    padding: 11px;
    background: #1A4D8F;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    margin-top: 8px;
  }
  button:hover { background: #143E72; }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  .error {
    background: #F5E5E3;
    color: #A03830;
    padding: 9px 12px;
    border-radius: 6px;
    font-size: 13px;
    margin-bottom: 14px;
    display: none;
  }
  .error.show { display: block; }
</style>
</head>
<body>
  <div class="login-card">
    <div class="brand">
      <div class="brand-title">华登库存</div>
      <div class="brand-sub">毛绒 · 戏服 库存管理</div>
    </div>

    <div class="error" id="error"></div>

    <form id="login-form">
      <div class="form-row">
        <label class="form-label">用户名</label>
        <input id="username" autocomplete="username" autofocus required>
      </div>
      <div class="form-row">
        <label class="form-label">密码</label>
        <input id="password" type="password" autocomplete="current-password" required>
      </div>
      <button type="submit" id="submit-btn">登录</button>
    </form>
  </div>

<script>
const form = document.getElementById('login-form');
const errorEl = document.getElementById('error');
const submitBtn = document.getElementById('submit-btn');

// 子路径部署：跟 app.html 同一逻辑
const BASE_URL = (function() {
  const first = window.location.pathname.split('/').filter(Boolean)[0] || '';
  return first === 'huadeng-maorong' ? '/' + first : '';
})();

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorEl.classList.remove('show');
  submitBtn.disabled = true;
  submitBtn.textContent = '登录中...';

  try {
    const resp = await fetch(BASE_URL + '/api/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value
      })
    });
    const data = await resp.json();
    if (resp.ok && data.success) {
      window.location.href = BASE_URL + '/';
    } else {
      errorEl.textContent = data.error || '登录失败';
      errorEl.classList.add('show');
    }
  } catch (err) {
    errorEl.textContent = '网络错误';
    errorEl.classList.add('show');
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = '登录';
  }
});
</script>
</body>
</html>
