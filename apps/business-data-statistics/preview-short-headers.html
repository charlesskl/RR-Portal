<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>表头简化预览 - 双击查看详情</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Microsoft YaHei', sans-serif; background: #f5f3f7; padding: 20px; color: #333; }
h1 { text-align: center; color: #7F41C0; margin-bottom: 8px; font-size: 20px; }
.hint { text-align: center; color: #999; font-size: 13px; margin-bottom: 20px; }
.hint em { color: #7F41C0; font-style: normal; font-weight: bold; }

.tabs { display: flex; gap: 0; margin-bottom: 0; }
.tab { padding: 10px 24px; cursor: pointer; background: #e0d8e8; border-radius: 8px 8px 0 0; font-size: 14px; color: #666; }
.tab.active { background: #7F41C0; color: #fff; font-weight: bold; }

.table-wrap { background: #fff; border-radius: 0 8px 8px 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow-x: auto; max-height: 600px; position: relative; }

/* 合计栏：紧凑版 */
.summary-footer { border-top: 3px solid #3D8361; }
.summary-footer table { width: 100%; border-collapse: collapse; white-space: nowrap; }
.summary-footer td { height: 24px; padding: 0 4px; border: 1px solid #e0e0e0; font-size: 11px; text-align: right; line-height: 24px; min-width: 40px; }
.summary-footer td.label { text-align: left; font-weight: 600; padding-left: 8px; }
/* 表头行 */
.summary-footer .summary-header-row td { background: #3D8361; color: #fff; font-weight: 600; font-size: 11px; height: 24px; line-height: 24px; }
.summary-footer .summary-header-row td.calc-header { background: #6A35A3; }
/* 车间行 */
.summary-footer .workshop-row td { background: #fff; }
.summary-footer .workshop-row:nth-child(even) td { background: #f9f9f9; }
/* 区域合计行 */
.summary-footer .region-row td { background: #F3E5F5; font-weight: 600; }
/* 总合计行 */
.summary-footer .total-row td { background: #3D8361; color: #fff; font-weight: 700; font-size: 12px; height: 26px; line-height: 26px; }
table { border-collapse: collapse; white-space: nowrap; }
th {
  background: #3D8361; color: #fff; font-weight: 600; font-size: 12px;
  height: 30px; padding: 0 6px; border: 1px solid #2d6b4a; position: sticky; top: 0; z-index: 2;
  cursor: pointer; user-select: none; min-width: 56px; text-align: center;
  line-height: 30px;
}
th.fixed { position: sticky; left: 0; z-index: 3; background: #3D8361; }
th:hover { background: #2d6b4a; }

/* 计算字段：紫色背景 + 白色文字 */
th.calc { background: #6A35A3; color: #fff; }
th.calc:hover { background: #5a2d8a; }

/* 可编辑单元格 */
td.editable { background: #FFFDE7; cursor: text; }
td.editable:hover { background: #FFF9C4; }
/* 计算单元格 */
td.calc-cell { color: #6A35A3; font-weight: 600; background: #F3EDF7; }
/* 正在编辑的单元格 */
td.editing { padding: 0; }
td.editing input {
  width: 100%; height: 100%; border: 2px solid #7F41C0; outline: none;
  padding: 0 6px; font-size: 13px; text-align: right; background: #fff;
  box-sizing: border-box;
}

td {
  height: 28px; padding: 0 8px; border: 1px solid #e0e0e0; font-size: 13px;
  text-align: right; line-height: 28px;
}
td.left { text-align: left; }
tr:nth-child(even) { background: #f9f9f9; }
tr:hover { background: #f0e6f6; }

/* Excel 批注样式气泡 */
.note-bubble {
  position: absolute;
  background: #F0E6F6;
  border: 1px solid #D391DD;
  padding: 8px 12px;
  font-size: 12px;
  line-height: 1.6;
  color: #333;
  z-index: 999;
  box-shadow: 2px 2px 6px rgba(0,0,0,0.15);
  max-width: 300px;
  white-space: normal;
  pointer-events: none;
}
.note-bubble .note-full { font-weight: bold; color: #333; }
.note-bubble .note-formula { color: #666; margin-top: 2px; }

.compare { margin: 24px 0; padding: 16px; background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.compare h3 { font-size: 14px; color: #7F41C0; margin-bottom: 8px; }
.compare table { width: 100%; }
.compare th { background: #7F41C0; font-size: 12px; height: 28px; line-height: 28px; padding: 0 8px; }
.compare td { font-size: 12px; padding: 4px 8px; text-align: left; }
.compare td.new { color: #3D8361; font-weight: bold; }
</style>
</head>
<body>

<h1>表头简化预览（四字版）</h1>
<p class="hint">表头行高 30px / 数据行高 28px — <em>双击任意表头</em> 查看全称和公式（批注样式）</p>

<div class="tabs">
  <div class="tab active" onclick="showDept('beer')">啤机部</div>
  <div class="tab" onclick="showDept('print')">印喷部</div>
  <div class="tab" onclick="showDept('assembly')">装配部</div>
</div>

<div class="table-wrap" id="tableWrap"></div>

<!-- 对照表 -->
<div class="compare">
  <h3>简称对照（仅列出被缩短的字段）</h3>
  <div id="compareTable"></div>
</div>

<script>
// ===== 四字简称方案 =====
const SHARED = [
  { field: 'supervisor_count', short: '管工人数', full: '管工人数', type: 'input' },
  { field: 'worker_count', short: '员工人数', full: '员工人数', type: 'input' },
  { field: 'daily_output', short: '产值/天', full: '总产值/天', type: 'input' },
  { field: 'worker_wage', short: '员工工资', full: '员工工资/天', type: 'input' },
  { field: 'supervisor_wage', short: '管工工资', full: '管工工资/天', type: 'input' },
  { field: 'rent', short: '房租', full: '房租', type: 'input' },
  { field: 'utility_fee', short: '水电费', full: '水电费', type: 'input' },
  { field: 'tool_investment', short: '工具投资', full: '工具投资', type: 'input' },
  { field: 'equipment', short: '设备', full: '设备', type: 'input' },
  { field: 'renovation', short: '装修', full: '装修', type: 'input' },
  { field: 'misc_fee', short: '杂费', full: '杂费', type: 'input' },
  { field: 'shipping_fee', short: '运费', full: '运费', type: 'input' },
  { field: 'social_insurance', short: '社保', full: '社保', type: 'input' },
  { field: 'tax', short: '税收', full: '税收', type: 'input' },
  { field: 'balance', short: '结余金额', full: '结余金额', type: 'calc', formula: '产值/天 - 所有费用之和' },
  { field: 'balance_ratio', short: '结余%', full: '结余%', type: 'calc', formula: '结余金额 / 产值/天' },
];

const DEPTS = {
  beer: {
    name: '啤机部',
    unique: [
      { field: 'total_machines', short: '总台数', full: '总台数', type: 'input', group: 'machine' },
      { field: 'running_machines', short: '开机台数', full: '开机台数', type: 'input', group: 'machine' },
      { field: 'run_hours', short: '开机时间', full: '开机时间', type: 'input', group: 'machine' },
      { field: 'machine_rate', short: '开机率', full: '开机率', type: 'calc', formula: '开机台数 / 总台数', group: 'machine' },
      { field: 'misc_workers', short: '杂工人数', full: '杂工人数', type: 'input', group: 'people' },
      { field: 'gate_workers', short: '水口人数', full: '批水口人数', type: 'input', group: 'people' },
      { field: 'output_tax_incl', short: '不含税值', full: '不含税产值', type: 'calc', formula: '产值/天 / 1.13', group: 'output' },
      { field: 'avg_output_per_machine', short: '台均产值', full: '每台机平均产值', type: 'calc', formula: '产值/天 / 开机台数', group: 'output' },
      { field: 'misc_worker_wage', short: '杂工工资', full: '杂工工资/天', type: 'input', group: 'wage' },
      { field: 'wage_ratio', short: '工资占比', full: '总工资占产值%', type: 'calc', formula: '(员工工资+管工工资+杂工工资) / 产值/天', group: 'wage' },
      { field: 'avg_balance_per_machine', short: '台均结余', full: '平均每台结余', type: 'calc', formula: '结余金额 / 开机台数', group: 'after' },
      { field: 'machine_repair', short: '机器维修', full: '机器维修', type: 'input', group: 'after' },
      { field: 'mold_repair', short: '模具维修', full: '模具维修', type: 'input', group: 'after' },
      { field: 'mold_cost_ratio', short: '模修占比', full: '模具维修占产值比%', type: 'calc', formula: '模具维修 / 产值/天', group: 'after' },
      { field: 'materials', short: '物料', full: '物料', type: 'input', group: 'after' },
      { field: 'material_supplement', short: '原料补料', full: '原料补料', type: 'input', group: 'after' },
      { field: 'gate_processing_fee', short: '水口加工', full: '批水口加工费', type: 'input', group: 'after' },
      { field: 'gate_cost_ratio', short: '水口占比', full: '批水口费用占产值比%', type: 'calc', formula: '批水口加工费 / 产值/天', group: 'after' },
      { field: 'assembly_gate_parts_fee', short: '水口配件', full: '装配批水口配件费', type: 'input', group: 'after' },
      { field: 'recoverable_gate_fee', short: '回收水口', full: '可回收批水口费', type: 'input', group: 'after' },
    ]
  },
  print: {
    name: '印喷部',
    unique: [
      { field: 'pad_total_machines', short: '移印台数', full: '移印总台数', type: 'input', group: 'machine' },
      { field: 'pad_running_machines', short: '移印开机', full: '移印开机台数', type: 'input', group: 'machine' },
      { field: 'pad_machine_rate', short: '移印机率', full: '移印开机率', type: 'calc', formula: '移印开机台数 / 移印总台数', group: 'machine' },
      { field: 'spray_total_machines', short: '喷油台数', full: '喷油总台数', type: 'input', group: 'machine' },
      { field: 'spray_running_machines', short: '喷油开机', full: '喷油开机台数', type: 'input', group: 'machine' },
      { field: 'spray_machine_rate', short: '喷油机率', full: '喷油开机率', type: 'calc', formula: '喷油开机台数 / 喷油总台数', group: 'machine' },
      { field: 'misc_workers', short: '杂工人数', full: '杂工人数', type: 'input', group: 'people' },
      { field: 'work_hours', short: '员工工时', full: '员工工时', type: 'input', group: 'time' },
      { field: 'total_hours', short: '总工时', full: '总工时', type: 'input', group: 'time' },
      { field: 'avg_output_per_worker', short: '人均产值', full: '员工人均产值', type: 'calc', formula: '产值/天 / 员工人数', group: 'output' },
      { field: 'wage_ratio', short: '工资占比', full: '总工资占产值%', type: 'calc', formula: '(员工工资+管工工资) / 产值/天', group: 'wage' },
      { field: 'repair_fee', short: '维修费', full: '维修费', type: 'input', group: 'after' },
      { field: 'materials', short: '物料', full: '物料（原子灰、胶头、油墨、喷码溶剂）', type: 'input', group: 'after' },
      { field: 'oil_water_amount', short: '油水金额', full: '油水金额', type: 'input', group: 'after' },
      { field: 'subsidy', short: '补贴', full: '补贴', type: 'input', group: 'after' },
      { field: 'no_output_wage', short: '无产值资', full: '无产值工资', type: 'input', group: 'after' },
      { field: 'assembly_wage_paid', short: '付装配资', full: '付装配工资', type: 'input', group: 'after' },
      { field: 'office_wage', short: '做办工资', full: '做办工资', type: 'input', group: 'after' },
      { field: 'office_wage_ratio', short: '做办占比', full: '做办工资占比%', type: 'calc', formula: '做办工资 / 产值/天', group: 'after' },
      { field: 'recoverable_wage', short: '回收工资', full: '可收回工资', type: 'input', group: 'after' },
      { field: 'dept_recoverable_wage', short: '车发回收', full: '车发部回收工资', type: 'input', group: 'after' },
      { field: 'recoverable_indonesia_wage', short: '印尼工资', full: '可收回印尼工资', type: 'input', group: 'after' },
      { field: 'recoverable_tool_fee', short: '回收工具', full: '可收回工具费', type: 'input', group: 'after' },
      { field: 'non_recoverable_tool_fee', short: '不回工具', full: '不可回收工具费', type: 'input', group: 'after' },
      { field: 'recoverable_paint', short: '回收油漆', full: '可回收油漆金额', type: 'input', group: 'after' },
      { field: 'auto_mold_fee', short: '自动模费', full: '自动机模费', type: 'input', group: 'after' },
      { field: 'mold_fee_ratio', short: '自模占比', full: '自动机模费占产值%', type: 'calc', formula: '自动机模费 / 产值/天', group: 'after' },
      { field: 'hunan_mold_fee', short: '湖南模费', full: '发湖南模费', type: 'input', group: 'after' },
      { field: 'hunan_mold_ratio', short: '湖南模%', full: '发湖南模费占产值%', type: 'calc', formula: '发湖南模费 / 产值/天', group: 'after' },
      { field: 'indonesia_mold_fee', short: '印尼模费', full: '发印尼模费', type: 'input', group: 'after' },
      { field: 'indonesia_mold_ratio', short: '印尼模%', full: '发印尼模费占产值%', type: 'calc', formula: '发印尼模费 / 产值/天', group: 'after' },
      { field: 'total_ratio', short: '余+模%', full: '结余%+自模费%', type: 'calc', formula: '结余% + 自动机模费占产值%', group: 'after' },
    ]
  },
  assembly: {
    name: '装配部',
    unique: [
      { field: 'avg_output_per_worker', short: '人均产值', full: '人均产值', type: 'calc', formula: '产值/天 / 员工人数', group: 'output' },
      { field: 'planned_wage_tax', short: '计划工资', full: '计划总工资含*1.13', type: 'input', group: 'wage' },
      { field: 'actual_wage', short: '实际工资', full: '实际总工资', type: 'input', group: 'wage' },
      { field: 'hunan_social_insurance', short: '湖南社保', full: '湖南社保', type: 'input', group: 'after' },
      { field: 'hunan_tax', short: '湖南税收', full: '湖南税收', type: 'input', group: 'after' },
      { field: 'workshop_repair', short: '车间维修', full: '车间维修费', type: 'input', group: 'after' },
      { field: 'electrical_repair', short: '机电维修', full: '机电部维修费', type: 'input', group: 'after' },
      { field: 'workshop_materials', short: '车间物料', full: '车间物料费', type: 'input', group: 'after' },
      { field: 'stretch_film', short: '拉伸膜', full: '拉伸膜', type: 'input', group: 'after' },
      { field: 'tape', short: '胶纸', full: '胶纸', type: 'input', group: 'after' },
      { field: 'balance_minus_tape', short: '余减胶纸', full: '结余减胶纸', type: 'calc', formula: '结余金额 - 胶纸', group: 'after' },
      { field: 'balance_tape_ratio', short: '减纸占比', full: '减胶纸后结余占计划工资%', type: 'calc', formula: '(结余-胶纸) / 计划总工资', group: 'after' },
      { field: 'recoverable_electricity', short: '回收电费', full: '可回收电费', type: 'input', group: 'after' },
      { field: 'workshop_tool_investment', short: '车间工投', full: '车间工具投资', type: 'input', group: 'after' },
      { field: 'fixture_tool_investment', short: '夹具工投', full: '夹具部工具投资', type: 'input', group: 'after' },
      { field: 'tool_invest_ratio', short: '工投占比', full: '工具投资占计划工资%', type: 'calc', formula: '(车间工具投资+夹具部工具投资) / 计划总工资', group: 'after' },
      { field: 'housing_subsidy', short: '外宿补贴', full: '外宿补贴', type: 'input', group: 'after' },
      { field: 'supplement', short: '补料', full: '补料', type: 'input', group: 'after' },
      { field: 'borrowed_worker_wage', short: '外借工资', full: '外借人员工资', type: 'input', group: 'after' },
      { field: 'borrowed_wage_ratio', short: '外借占比', full: '外借人员工资占计划工资%', type: 'calc', formula: '外借人员工资 / 计划总工资', group: 'after' },
    ]
  }
};

function getColumns(dept) {
  const u = DEPTS[dept].unique;
  const machine = u.filter(f => f.group === 'machine');
  const people = u.filter(f => f.group === 'people');
  const time = u.filter(f => f.group === 'time');
  const output = u.filter(f => f.group === 'output');
  const wage = u.filter(f => f.group === 'wage');
  const after = u.filter(f => f.group === 'after');
  const sp = SHARED.filter(f => ['supervisor_count','worker_count'].includes(f.field));
  const so = SHARED.filter(f => f.field === 'daily_output');
  const sw = SHARED.filter(f => ['worker_wage','supervisor_wage'].includes(f.field));
  const se = SHARED.filter(f => f.type === 'input' && !['supervisor_count','worker_count','daily_output','worker_wage','supervisor_wage'].includes(f.field));
  const sb = SHARED.filter(f => f.type === 'calc');
  return [
    { short: '日期', full: '记录日期', type: 'fixed' },
    { short: '车间', full: '车间名称', type: 'fixed' },
    ...machine, ...sp, ...people, ...time, ...so, ...output,
    ...sw, ...wage, ...se, ...sb, ...after,
    { short: '备注', full: '备注', type: 'input' }
  ];
}

// 显示格式：千分位 + 固定2位小数
function fmtDisplay(num) {
  if (isNaN(num)) return '';
  return num.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

// 当前活跃的批注气泡
let activeBubble = null;

function removeBubble() {
  if (activeBubble) { activeBubble.remove(); activeBubble = null; }
}

function showDept(dept) {
  removeBubble();
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['beer','print','assembly'][i] === dept);
  });
  const cols = getColumns(dept);
  let html = '<table><thead><tr>';
  cols.forEach((c, i) => {
    const cls = [c.type === 'calc' ? 'calc' : '', i < 2 ? 'fixed' : ''].filter(Boolean).join(' ');
    const style = i === 1 ? 'left:80px' : '';
    html += `<th class="${cls}" style="${style}" data-col="${i}">${c.short}</th>`;
  });
  html += '</tr></thead><tbody>';
  for (let r = 0; r < 5; r++) {
    html += '<tr>';
    cols.forEach((c, i) => {
      const isCalc = c.type === 'calc';
      const isFixed = c.type === 'fixed';
      const isInput = !isCalc && !isFixed;
      if (i === 0) {
        html += `<td class="left" style="position:sticky;left:0;background:${r%2?'#f9f9f9':'#fff'};z-index:1;">2026-03-${String(15-r).padStart(2,'0')}</td>`;
      } else if (i === 1) {
        html += `<td class="left" style="position:sticky;left:80px;background:${r%2?'#f9f9f9':'#fff'};z-index:1;">${['兴信A','兴信B','华登','邵阳','兴信A'][r]}</td>`;
      } else if (isCalc) {
        const isRatio = c.full.includes('%') || c.short.includes('%');
        const raw = isRatio ? (Math.random()*30+5) : (Math.random()*50000+1000);
        html += `<td class="calc-cell">${isRatio ? raw.toFixed(2)+'%' : fmtDisplay(raw)}</td>`;
      } else {
        const raw = Math.random() * 9000 + 1000;
        const rawStr = raw.toFixed(2);
        html += `<td class="editable" data-row="${r}" data-col="${i}" data-value="${rawStr}">${fmtDisplay(raw)}</td>`;
      }
    });
    html += '</tr>';
  }
  html += '</tbody></table>';

  // ===== 合计栏 =====
  const workshops = dept === 'print'
    ? [{name:'兴信A',region:'清溪'},{name:'华登',region:'清溪'},{name:'邵阳',region:'邵阳'}]
    : [{name:'兴信A',region:'清溪'},{name:'兴信B',region:'清溪'},{name:'华登',region:'清溪'},{name:'邵阳',region:'邵阳'}];

  // 生成模拟汇总数据
  function mockSummary() {
    const d = {};
    cols.forEach(c => {
      if (c.type === 'fixed') return;
      const isRatio = c.full.includes('%') || c.short.includes('%');
      d[c.short] = isRatio ? (Math.random()*25+5) : (Math.random()*80000+10000);
    });
    return d;
  }
  const wsData = {};
  workshops.forEach(w => { wsData[w.name] = mockSummary(); });

  // 区域汇总
  function sumRows(rows) {
    const s = {};
    cols.forEach(c => {
      if (c.type === 'fixed') return;
      const isRatio = c.full.includes('%') || c.short.includes('%');
      if (isRatio) {
        // 比率取平均
        s[c.short] = rows.reduce((a, r) => a + (r[c.short]||0), 0) / rows.length;
      } else {
        s[c.short] = rows.reduce((a, r) => a + (r[c.short]||0), 0);
      }
    });
    return s;
  }
  const qxWs = workshops.filter(w => w.region === '清溪').map(w => wsData[w.name]);
  const syWs = workshops.filter(w => w.region === '邵阳').map(w => wsData[w.name]);
  const qxTotal = sumRows(qxWs);
  const syTotal = syWs.length > 0 ? sumRows(syWs) : null;
  const grandTotal = sumRows(Object.values(wsData));

  function fmtSummaryVal(c, val) {
    if (!val && val !== 0) return '';
    const isRatio = c.full.includes('%') || c.short.includes('%');
    return isRatio ? val.toFixed(2) + '%' : fmtDisplay(val);
  }

  html += '<div class="summary-footer"><table>';
  // 表头行
  html += '<tr class="summary-header-row">';
  html += '<td class="label" style="width:80px;">合计</td><td style="width:80px;">车间</td>';
  cols.forEach(c => { if (c.type !== 'fixed') html += `<td class="${c.type === 'calc' ? 'calc-header' : ''}">${c.short}</td>`; });
  html += '</tr>';

  // 各车间行
  workshops.forEach(w => {
    html += '<tr class="workshop-row">';
    html += `<td></td><td class="label">${w.name}</td>`;
    cols.forEach(c => { if (c.type !== 'fixed') html += `<td>${fmtSummaryVal(c, wsData[w.name][c.short])}</td>`; });
    html += '</tr>';
  });

  // 清溪合计
  html += '<tr class="region-row">';
  html += '<td></td><td class="label">清溪合计</td>';
  cols.forEach(c => { if (c.type !== 'fixed') html += `<td>${fmtSummaryVal(c, qxTotal[c.short])}</td>`; });
  html += '</tr>';

  // 邵阳合计
  if (syTotal) {
    html += '<tr class="region-row">';
    html += '<td></td><td class="label">邵阳合计</td>';
    cols.forEach(c => { if (c.type !== 'fixed') html += `<td>${fmtSummaryVal(c, syTotal[c.short])}</td>`; });
    html += '</tr>';
  }

  // 总合计
  html += '<tr class="total-row">';
  html += '<td></td><td class="label">总合计</td>';
  cols.forEach(c => { if (c.type !== 'fixed') html += `<td>${fmtSummaryVal(c, grandTotal[c.short])}</td>`; });
  html += '</tr>';

  html += '</table></div>';

  document.getElementById('tableWrap').innerHTML = html;
  renderCompare(dept);
  window._currentCols = cols;

  // 绑定双击编辑（可编辑单元格）
  document.querySelectorAll('#tableWrap td.editable').forEach(td => {
    td.addEventListener('dblclick', function(e) {
      e.stopPropagation();
      if (this.classList.contains('editing')) return;
      const rawVal = this.dataset.value;
      this.classList.add('editing');
      // 编辑时显示真实位数（去掉千分位格式）
      this.innerHTML = `<input type="text" value="${rawVal}" maxlength="20" />`;
      const input = this.querySelector('input');
      input.focus();
      input.select();
      // 限制输入：最多小数点后6位
      input.addEventListener('input', function() {
        const v = this.value;
        const dotIdx = v.indexOf('.');
        if (dotIdx !== -1 && v.length - dotIdx - 1 > 6) {
          this.value = v.substring(0, dotIdx + 7);
        }
      });
      const td = this;
      const finishEdit = () => {
        const newVal = input.value.trim();
        td.classList.remove('editing');
        if (newVal !== '' && newVal !== rawVal) {
          const num = Number(newVal);
          if (!isNaN(num)) {
            td.dataset.value = newVal;
            td.textContent = fmtDisplay(num);
          } else {
            td.textContent = fmtDisplay(Number(rawVal));
          }
        } else {
          td.textContent = fmtDisplay(Number(rawVal));
        }
      };
      input.addEventListener('blur', finishEdit);
      input.addEventListener('keydown', function(ev) {
        if (ev.key === 'Enter') { input.blur(); }
        if (ev.key === 'Escape') { input.value = rawVal; input.blur(); }
      });
    });
  });

  // 绑定双击事件（表头批注）
  document.querySelectorAll('#tableWrap th').forEach(th => {
    th.addEventListener('dblclick', function(e) {
      e.stopPropagation();
      const colIdx = parseInt(this.dataset.col);
      const c = window._currentCols[colIdx];
      removeBubble();

      // 构造批注内容
      let text = c.full;
      if (c.formula) text += '\n公式=' + c.formula;

      // 创建气泡
      const bubble = document.createElement('div');
      bubble.className = 'note-bubble';

      let noteHtml = '<div class="note-full">' + c.full + '</div>';
      if (c.formula) {
        noteHtml += '<div class="note-formula">公式=' + c.formula + '</div>';
      }
      bubble.innerHTML = noteHtml;

      // 定位：表头正下方偏右
      const rect = this.getBoundingClientRect();
      const wrapRect = document.getElementById('tableWrap').getBoundingClientRect();
      bubble.style.left = (rect.left - wrapRect.left + rect.width / 2) + 'px';
      bubble.style.top = (rect.bottom - wrapRect.top + 4) + 'px';

      document.getElementById('tableWrap').appendChild(bubble);
      activeBubble = bubble;

      // 3秒后自动消失
      setTimeout(() => { if (activeBubble === bubble) removeBubble(); }, 8000);
    });
  });
}

// 点击其他地方关闭批注
document.addEventListener('click', removeBubble);
document.addEventListener('keydown', e => { if (e.key === 'Escape') removeBubble(); });

function renderCompare(dept) {
  const cols = getColumns(dept);
  const changed = cols.filter(c => c.short !== c.full);
  let html = '<table><thead><tr><th>表头显示</th><th>全称</th><th>类型</th></tr></thead><tbody>';
  changed.forEach(c => {
    html += `<tr><td class="new">${c.short}</td><td>${c.full}</td><td>${c.type === 'calc' ? '计算' : '录入'}</td></tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('compareTable').innerHTML = html;
}

showDept('beer');
</script>
</body>
</html>
