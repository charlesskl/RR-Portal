<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>生产管控中心 · 车间登录</title>
  <style>
    :root {
      --bg: #0f172a;
      --bg-soft: #1e293b;
      --fg: #f8fafc;
      --fg-dim: #94a3b8;
      --accent: #38bdf8;
      --accent-hover: #0ea5e9;
      --danger: #f87171;
      --card: rgba(30, 41, 59, 0.85);
      --border: rgba(148, 163, 184, 0.2);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background:
        radial-gradient(ellipse at top left, #1e3a8a33, transparent 50%),
        radial-gradient(ellipse at bottom right, #0e749033, transparent 50%),
        var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .wrap {
      width: 100%;
      max-width: 880px;
    }
    header {
      text-align: center;
      margin-bottom: 32px;
    }
    header h1 {
      margin: 0 0 8px;
      font-size: 28px;
      letter-spacing: 2px;
    }
    header p {
      margin: 0;
      color: var(--fg-dim);
      font-size: 14px;
    }
    .card {
      background: var(--card);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }
    .workshops {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 24px;
    }
    .workshop {
      cursor: pointer;
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 16px;
      text-align: center;
      transition: all 0.18s ease;
    }
    .workshop:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
      box-shadow: 0 12px 30px rgba(56, 189, 248, 0.18);
    }
    .workshop.active {
      border-color: var(--accent);
      background: linear-gradient(135deg, rgba(56,189,248,0.18), rgba(14,116,144,0.18));
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.25);
    }
    .workshop .name {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .workshop .desc {
      font-size: 12px;
      color: var(--fg-dim);
      line-height: 1.5;
      min-height: 36px;
    }
    .workshop .role-tag {
      display: inline-block;
      margin-top: 8px;
      padding: 2px 8px;
      font-size: 11px;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.15);
      color: var(--accent);
    }
    form {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .field {
      flex: 1 1 200px;
      display: flex;
      flex-direction: column;
    }
    .field label {
      font-size: 12px;
      color: var(--fg-dim);
      margin-bottom: 6px;
    }
    .field input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--fg);
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus {
      border-color: var(--accent);
    }
    button {
      flex: 0 0 auto;
      align-self: flex-end;
      background: var(--accent);
      color: #0f172a;
      border: 0;
      border-radius: 8px;
      padding: 12px 28px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: var(--accent-hover); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg {
      margin-top: 16px;
      font-size: 13px;
      min-height: 18px;
    }
    .msg.error { color: var(--danger); }
    .msg.ok { color: #4ade80; }
    footer {
      text-align: center;
      margin-top: 24px;
      color: var(--fg-dim);
      font-size: 12px;
    }
    footer code {
      background: var(--bg-soft);
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>生产管控中心</h1>
      <p>选择你所在的车间，输入车间密码登录</p>
    </header>

    <div class="card">
      <div class="workshops" id="workshops">
        <div class="workshop" style="opacity:0.6">加载中…</div>
      </div>

      <form id="login-form" autocomplete="off">
        <input type="hidden" id="code" />
        <div class="field">
          <label for="code-display">已选择车间</label>
          <input id="code-display" readonly placeholder="请先在上方点击你的车间" />
        </div>
        <div class="field">
          <label for="password">密码</label>
          <input id="password" type="password" placeholder="车间登录密码" />
        </div>
        <button id="submit" type="submit">进入系统</button>
      </form>

      <div id="msg" class="msg"></div>
    </div>

    <footer>
      默认密码请向系统管理员获取 · 初次登录后请尽快修改 · 接口前缀 <code>/api/auth</code>
    </footer>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const workshopsEl = $('workshops');
    const form = $('login-form');
    const codeInput = $('code');
    const codeDisplay = $('code-display');
    const passwordInput = $('password');
    const submitBtn = $('submit');
    const msg = $('msg');

    function setMsg(text, type) {
      msg.textContent = text || '';
      msg.className = 'msg' + (type ? ' ' + type : '');
    }

    async function loadWorkshops() {
      try {
        const r = await fetch('api/auth/workshops');
        const j = await r.json();
        const list = j.workshops || [];
        workshopsEl.innerHTML = '';
        for (const w of list) {
          const div = document.createElement('div');
          div.className = 'workshop';
          div.dataset.code = w.code;
          div.innerHTML = `
            <div class="name">${w.display_name}</div>
            <div class="desc">${w.description || ''}</div>
            <span class="role-tag">${w.role}</span>
          `;
          div.addEventListener('click', () => selectWorkshop(w));
          workshopsEl.appendChild(div);
        }
      } catch (e) {
        workshopsEl.innerHTML = '<div class="workshop" style="color:#f87171">加载车间失败</div>';
      }
    }

    function selectWorkshop(w) {
      codeInput.value = w.code;
      codeDisplay.value = `${w.display_name} (${w.code})`;
      [...workshopsEl.children].forEach((el) => {
        el.classList.toggle('active', el.dataset.code === w.code);
      });
      passwordInput.focus();
      setMsg('', '');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const code = codeInput.value;
      const password = passwordInput.value;
      if (!code) return setMsg('请先选择车间', 'error');
      if (!password) return setMsg('请输入密码', 'error');

      submitBtn.disabled = true;
      setMsg('登录中…', '');

      try {
        const r = await fetch('api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code, password }),
        });
        const j = await r.json();
        if (!r.ok) {
          setMsg(j.error || '登录失败', 'error');
          submitBtn.disabled = false;
          return;
        }
        localStorage.setItem('pc_token', j.token);
        localStorage.setItem('pc_workshop', JSON.stringify(j.workshop));
        setMsg(`欢迎 ${j.workshop.display_name}，即将进入 ${j.workshop.entry_path}…`, 'ok');
        setTimeout(() => {
          window.location.href = j.workshop.entry_path;
        }, 800);
      } catch (e) {
        setMsg('网络错误：' + e.message, 'error');
        submitBtn.disabled = false;
      }
    });

    loadWorkshops();
  </script>
</body>
</html>
