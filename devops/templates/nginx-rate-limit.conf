# ============================================================
# Nginx Rate Limiting Configuration
# ============================================================
# Include this in the http {} block of nginx.cloud.conf.
# Protects API endpoints from abuse and brute-force attacks.
#
# Usage: include /etc/nginx/rate-limit.conf;
# ============================================================

# --- Rate limiting zones ---
# API requests: 10 requests/second per IP, burst of 20
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# Login/auth attempts: 5 requests/minute per IP (brute-force protection)
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

# File uploads: 2 requests/second per IP
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=2r/s;

# General page requests: 30 requests/second per IP
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;

# --- Apply to locations (add inside server {} block) ---
# Example usage in location blocks:
#
#   location /api/ {
#       limit_req zone=api_limit burst=20 nodelay;
#       ...
#   }
#
#   location /api/auth/ {
#       limit_req zone=auth_limit burst=5 nodelay;
#       ...
#   }
#
#   location /api/upload {
#       limit_req zone=upload_limit burst=5;
#       ...
#   }

# --- Rate limit response ---
limit_req_status 429;
