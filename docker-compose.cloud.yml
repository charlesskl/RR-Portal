  indo-sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      INDO_SQL_SA_PASSWORD_B64: "${INDO_SQL_SA_PASSWORD_B64:?INDO_SQL_SA_PASSWORD_B64 is required}"
      MSSQL_MEMORY_LIMIT_MB: "1536"
    entrypoint:
      - /bin/bash
      - -c
      - |
        set -e
        export MSSQL_SA_PASSWORD="$$(printf '%s' "$${INDO_SQL_SA_PASSWORD_B64}" | base64 --decode)"
        exec /opt/mssql/bin/sqlservr
    volumes:
      - ./data/indo-sqlserver:/var/opt/mssql
      - ./backups/indo-sqlserver:/var/opt/mssql/backup
    mem_limit: 2304m
    memswap_limit: 2304m
    healthcheck:
      test: ["CMD-SHELL", "password=$$(printf '%s' \"$${INDO_SQL_SA_PASSWORD_B64}\" | base64 --decode) && /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$password\" -C -Q \"SELECT 1\" -b -o /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform-net

  indo-shipping-init:
    build:
      context: ./apps/印尼小组/印尼走货明细
      dockerfile: Dockerfile
      target: bootstrap
    environment:
      INDO_SQL_SA_PASSWORD_B64: "${INDO_SQL_SA_PASSWORD_B64:?INDO_SQL_SA_PASSWORD_B64 is required}"
      INDO_SQL_APP_PASSWORD_B64: "${INDO_SQL_APP_PASSWORD_B64:?INDO_SQL_APP_PASSWORD_B64 is required}"
      INDO_SHIPPING_ADMIN_PASSWORD_B64: "${INDO_SHIPPING_ADMIN_PASSWORD_B64:?INDO_SHIPPING_ADMIN_PASSWORD_B64 is required}"
    volumes:
      - ./apps/印尼小组/印尼走货明细/db:/app/db:ro
      - ./data/indo-shipping-seed:/app/seed:ro
    depends_on:
      indo-sqlserver:
        condition: service_healthy
    restart: "no"
    networks:
      - platform-net

  indo-shipping:
    build:
      context: ./apps/印尼小组/印尼走货明细
      dockerfile: Dockerfile
      args:
        VITE_BASE_PATH: /indo-shipping/
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      INDO_SQL_APP_PASSWORD_B64: "${INDO_SQL_APP_PASSWORD_B64:?INDO_SQL_APP_PASSWORD_B64 is required}"
      INDO_SHIPPING_JWT_KEY_B64: "${INDO_SHIPPING_JWT_KEY_B64:?INDO_SHIPPING_JWT_KEY_B64 is required}"
    expose:
      - "5180"
    depends_on:
      indo-sqlserver:
        condition: service_healthy
    mem_limit: 512m
    memswap_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:5180/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform-net

networks:
  platform-net:
    driver: bridge
