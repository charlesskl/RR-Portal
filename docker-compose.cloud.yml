# Batch A: Cloud Deployment
# Usage: docker compose -f docker-compose.cloud.yml up -d --build
#
# Includes: core + db + redis + nginx + rr-production
# Excludes: 3D打印 (hardware), schedule-system (SMB/Windows), zuru-ma (deferred), indonesia-export (deleted)

services:
  # ──────────────────────────────────────
  # Infrastructure
  # ──────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "${PORT:-80}:80"
    volumes:
      - ./nginx/nginx.cloud.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      - ./frontend/index.cloud.html:/usr/share/nginx/html/index.html:ro
      - ./frontend/logo.png:/usr/share/nginx/html/logo.png:ro
      # Uncomment for HTTPS after running setup-ssl.sh:
      # - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      core:
        condition: service_healthy
    healthcheck:
      # 走 /nginx-health（auth_basic off），不要走 / 否则永远拿到 401
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:80/nginx-health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform-net

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-rrportal}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-rrportal}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./scripts/init-db.cloud.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-rrportal}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform-net

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform-net

  # ──────────────────────────────────────
  # Core System
  # ──────────────────────────────────────
  core:
    build:
      context: ./core
      dockerfile: Dockerfile
    env_file: .env.cloud
    environment:
      - SERVICE_NAME=core
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-rrportal}:${DB_PASSWORD}@db:5432/${DB_NAME:-rrportal}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform-net

  # ──────────────────────────────────────
  # Batch A Plugins
  # ──────────────────────────────────────
  rr-production:
    build:
      context: ./apps/工程部/工程啤办单
      dockerfile: Dockerfile.node
    user: "0:0"
    environment:
      - BASE_PATH=/rr
      - PORT=3000
    volumes:
      - ./apps/工程部/工程啤办单/data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform-net

  figure-mold-cost-system:
    build:
      context: ./apps/工程部/模具手办采购订单系统
      dockerfile: Dockerfile
    environment:
      - PORT=3001
      - JWT_SECRET=${FIGURE_MOLD_JWT_SECRET:?FIGURE_MOLD_JWT_SECRET is required}
      - DATA_PATH=/app/data
      - UPLOADS_PATH=/app/public/uploads
    volumes:
      - ./apps/工程部/模具手办采购订单系统/data:/app/data
      - ./apps/工程部/模具手办采购订单系统/public/uploads:/app/public/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform-net

  zouhuo:
    build:
      context: ./apps/工程部/A-doc生成系統
      dockerfile: Dockerfile
    environment:
      - PORT=3002
      - JWT_SECRET=${ZOUHUO_JWT_SECRET:?ZOUHUO_JWT_SECRET is required}
      - JWT_EXPIRES_IN=8h
      - CORS_ORIGIN=${ZOUHUO_CORS_ORIGIN:?ZOUHUO_CORS_ORIGIN is required - do not use wildcard *}
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX=200
      - MAX_FILE_SIZE_MB=50
    volumes:
      - ./apps/工程部/A-doc生成系統/data:/app/server/data
      - ./apps/工程部/A-doc生成系統/uploads:/app/server/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform-net

  jiangping:
    build:
      context: ./apps/PMC跟仓管/采购订单管理系统
      dockerfile: Dockerfile
    environment:
      - BASE_PATH=/jiangping
      - DATA_PATH=/app/data
      - UPLOAD_FOLDER=/app/uploads
      - SECRET_KEY=${JIANGPING_SECRET_KEY:?JIANGPING_SECRET_KEY is required}
    volumes:
      - ./apps/PMC跟仓管/采购订单管理系统/data:/app/data
      - ./apps/PMC跟仓管/采购订单管理系统/uploads:/app/uploads
      - ./apps/PMC跟仓管/采购订单管理系统/easyocr-models:/home/appuser/.EasyOCR
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    mem_limit: 2g
    memswap_limit: 2g
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform-net

  paiji:
    build:
      context: ./apps/生产部/注塑啤机排产系统
      dockerfile: Dockerfile
    environment:
      - PORT=3000
      - DATA_PATH=/app/data
    volumes:
      - ./apps/生产部/注塑啤机排产系统/data:/app/data
      - ./apps/生产部/注塑啤机排产系统/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform-net

  zuru-master-schedule:
    build:
      context: ./apps/业务部/ZURU总排期入单
      dockerfile: Dockerfile
    environment:
      - APP_PORT=5003
    volumes:
      - "./apps/业务部/ZURU总排期入单/data:/app/data"
      - "./apps/业务部/ZURU总排期入单/uploads:/app/uploads"
      - "./apps/业务部/ZURU总排期入单/exports:/app/exports"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5003/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    mem_limit: 512m
    memswap_limit: 512m
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform-net

  hy-schedule-system:
    build:
      context: ./apps/业务部/ZURU河源排期入单
      dockerfile: Dockerfile
    environment:
      - APP_PORT=5008
    volumes:
      - ./apps/业务部/ZURU河源排期入单/data:/app/data
      - ./apps/业务部/ZURU河源排期入单/uploads:/app/uploads
      - ./apps/业务部/ZURU河源排期入单/exports:/app/exports
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5008/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    mem_limit: 512m
    memswap_limit: 512m
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform-net

  zuru-order-system:
    build:
      context: ./apps/业务部/ZURU接单表入单系统
      dockerfile: Dockerfile
    environment:
      - PORT=5005
      - DATA_PATH=/app
      - LOCAL_MODE=0  # 云端：禁用任意路径浏览/check_path/config 写入
      - FLASK_DEBUG=0
    volumes:
      - ./apps/业务部/ZURU接单表入单系统/data:/app/data
      - ./apps/业务部/ZURU接单表入单系统/uploads:/app/uploads
      - ./apps/业务部/ZURU接单表入单系统/exports:/app/exports
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5005/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    mem_limit: 512m
    memswap_limit: 512m
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform-net

  quotation:
    build:
      context: ./apps/业务部/套客表系统
      dockerfile: Dockerfile
    environment:
      - PORT=3004
      - NODE_ENV=production
      - CORS_ORIGIN=${QUOTATION_CORS_ORIGIN:-http://8.148.146.194}
    volumes:
      - ./apps/业务部/套客表系统/server/data:/app/server/data
    healthcheck:
      # node:20-alpine 没有 wget/curl，用 node 内置 http 模块做健康检查
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3004/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
    mem_limit: 512m
    memswap_limit: 512m
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform-net

  baojia:
    build:
      context: ./apps/业务部/报价系统
      dockerfile: Dockerfile
    environment:
      - PORT=3007
      - NODE_ENV=production
    volumes:
      - ./apps/业务部/报价系统/server/data:/app/server/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3007/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
    mem_limit: 512m
    memswap_limit: 512m
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform-net

  tomy-paiqi:
    build:
      context: ./apps/业务部/TOMY排期核对系统
      dockerfile: Dockerfile
    environment:
      - PORT=3006
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3006/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
    mem_limit: 512m
    memswap_limit: 512m
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform-net

  liwenjuan:
    build:
      context: ./apps/PMC跟仓管/成品核对系统
      dockerfile: Dockerfile
    environment:
      - PORT=5004
      - BASE_PATH=/liwenjuan
      - UPLOAD_FOLDER=/app/uploads
      - SECRET_KEY=${LIWENJUAN_SECRET_KEY:?LIWENJUAN_SECRET_KEY is required}
    volumes:
      - ./apps/PMC跟仓管/成品核对系统/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5004/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    mem_limit: 512m
    memswap_limit: 512m
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform-net

  peise:
    build:
      context: ./apps/PMC跟仓管/配色库存管理
      dockerfile: Dockerfile
    environment:
      - BASE_PATH=/peise
      - TZ=Asia/Shanghai
      # OCR 走阿里云百炼 (Bailian) OpenAI 兼容端点 + 通义千问 VL
      - BAILIAN_API_KEY=${PEISE_BAILIAN_API_KEY:-}
      - BAILIAN_MODEL=${PEISE_BAILIAN_MODEL:-qwen-vl-max-latest}
      - BAILIAN_BASE_URL=${PEISE_BAILIAN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      # 登录凭据(默认 ps/ps123456,改要改 .env.cloud 的 PEISE_AUTH_*)
      # SECRET_KEY 不传,app 会在 instance/.secret_key 自建并持久化
      - AUTH_USERNAME=${PEISE_AUTH_USERNAME:-ps}
      - AUTH_PASSWORD=${PEISE_AUTH_PASSWORD:-ps123456}
    volumes:
      - ./apps/PMC跟仓管/配色库存管理/instance:/app/instance
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5006/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    mem_limit: 512m
    memswap_limit: 512m
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform-net

  huadeng:
    build:
      context: ./apps/PMC跟仓管/华登包材管理
      dockerfile: Dockerfile
    environment:
      - DATA_PATH=/app/data
      # Session login (PR #82) — secrets live in .env.cloud.production only
      - HUADENG_SECRET_KEY=${HUADENG_SECRET_KEY:?HUADENG_SECRET_KEY is required}
      - HUADENG_SEC1_USER=${HUADENG_SEC1_USER:?HUADENG_SEC1_USER is required}
      - HUADENG_SEC1_PASSWORD=${HUADENG_SEC1_PASSWORD:?HUADENG_SEC1_PASSWORD is required}
      - HUADENG_SEC2_USER=${HUADENG_SEC2_USER:?HUADENG_SEC2_USER is required}
      - HUADENG_SEC2_PASSWORD=${HUADENG_SEC2_PASSWORD:?HUADENG_SEC2_PASSWORD is required}
      - HUADENG_SEC3_USER=${HUADENG_SEC3_USER:?HUADENG_SEC3_USER is required}
      - HUADENG_SEC3_PASSWORD=${HUADENG_SEC3_PASSWORD:?HUADENG_SEC3_PASSWORD is required}
    volumes:
      - ./apps/PMC跟仓管/华登包材管理/data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5007/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    mem_limit: 512m
    memswap_limit: 512m
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform-net

networks:
  platform-net:
    driver: bridge
