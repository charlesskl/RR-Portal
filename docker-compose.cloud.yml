# Batch A: Cloud Deployment
# Usage: docker compose -f docker-compose.cloud.yml up -d --build
#
# Includes: core + db + redis + nginx + rr-production
# Excludes: 3D打印 (hardware), schedule-system (SMB/Windows), zuru-ma (deferred), indonesia-export (deleted)

services:
  # ──────────────────────────────────────
  # Infrastructure
  # ──────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "${PORT:-80}:80"
    volumes:
      - ./nginx/nginx.cloud.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      - ./frontend/index.cloud.html:/usr/share/nginx/html/index.html:ro
      - ./frontend/logo.png:/usr/share/nginx/html/logo.png:ro
      # Uncomment for HTTPS after running setup-ssl.sh:
      # - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      core:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform-net

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-rrportal}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-rrportal}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./scripts/init-db.cloud.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-rrportal}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform-net

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform-net

  # ──────────────────────────────────────
  # Core System
  # ──────────────────────────────────────
  core:
    build:
      context: ./core
      dockerfile: Dockerfile
    env_file: .env.cloud
    environment:
      - SERVICE_NAME=core
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-rrportal}:${DB_PASSWORD}@db:5432/${DB_NAME:-rrportal}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform-net

  # ──────────────────────────────────────
  # Batch A Plugins
  # ──────────────────────────────────────
  rr-production:
    build:
      context: ./plugins/工程啤办单
      dockerfile: Dockerfile.node
    environment:
      - BASE_PATH=/rr
      - PORT=3000
    volumes:
      - ./plugins/工程啤办单/data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform-net

  new-product-schedule:
    build:
      context: ./plugins/new-product-schedule
      dockerfile: Dockerfile
    environment:
      - PORT=3000
      - DATA_PATH=/app/data
    volumes:
      - ./plugins/new-product-schedule/data:/app/data
      - ./plugins/new-product-schedule/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform-net

  figure-mold-cost-system:
    build:
      context: ./plugins/figure-mold-cost-system
      dockerfile: Dockerfile
    environment:
      - PORT=3001
      - JWT_SECRET=${FIGURE_MOLD_JWT_SECRET:?FIGURE_MOLD_JWT_SECRET is required}
      - DATA_PATH=/app/data
      - UPLOADS_PATH=/app/public/uploads
    volumes:
      - ./plugins/figure-mold-cost-system/data:/app/data
      - ./plugins/figure-mold-cost-system/public/uploads:/app/public/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform-net

  zouhuo:
    build:
      context: ./apps/zouhuo
      dockerfile: Dockerfile
    environment:
      - PORT=3002
      - JWT_SECRET=${ZOUHUO_JWT_SECRET:?ZOUHUO_JWT_SECRET is required}
      - JWT_EXPIRES_IN=8h
      - CORS_ORIGIN=${ZOUHUO_CORS_ORIGIN:?ZOUHUO_CORS_ORIGIN is required - do not use wildcard *}
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX=200
      - MAX_FILE_SIZE_MB=50
    volumes:
      - ./apps/zouhuo/data:/app/server/data
      - ./apps/zouhuo/uploads:/app/server/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform-net

  jiangping:
    build:
      context: ./apps/jiangping
      dockerfile: Dockerfile
    environment:
      - BASE_PATH=/jiangping
      - DATA_PATH=/app/data
      - UPLOAD_FOLDER=/app/uploads
      - SECRET_KEY=${JIANGPING_SECRET_KEY:?JIANGPING_SECRET_KEY is required}
    volumes:
      - ./apps/jiangping/data:/app/data
      - ./apps/jiangping/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform-net

  paiji:
    build:
      context: ./apps/paiji
      dockerfile: Dockerfile
    environment:
      - PORT=3000
      - DATA_PATH=/app/data
    volumes:
      - ./apps/paiji/data:/app/data
      - ./apps/paiji/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform-net

networks:
  platform-net:
    driver: bridge
