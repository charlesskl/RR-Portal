#         max-size: "10m"
#         max-file: "3"
#     healthcheck:
#       test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
#       interval: 30s
#       timeout: 10s
#       retries: 3

services:
  task-api:
    build:
      context: ./apps/task-api
      dockerfile: Dockerfile
    ports:
      - "3001:8080"
    env_file:
      - ./apps/task-api/.env
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
