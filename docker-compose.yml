services:
  # ──────────────────────────────────────
  # Infrastructure
  # ──────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      core:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - platform-net

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-enterprise}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - platform-net

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - platform-net

  # ──────────────────────────────────────
  # Core System
  # ──────────────────────────────────────
  core:
    build:
      context: ./core
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - SERVICE_NAME=core
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-enterprise}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - platform-net

  # ──────────────────────────────────────
  # Plugins
  # ──────────────────────────────────────
  plugin-indonesia:
    build:
      context: .
      dockerfile: plugins/印尼小组/Dockerfile
    env_file: .env
    environment:
      - SERVICE_NAME=plugin-indonesia
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-enterprise}
      - REDIS_URL=redis://redis:6379/0
      - CORE_SERVICE_URL=http://core:8000
      - SERVICE_URL=http://plugin-indonesia:8000
    depends_on:
      core:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - platform-net

  plugin-rr-production:
    build:
      context: .
      dockerfile: plugins/工程啤办单/Dockerfile
    env_file: .env
    environment:
      - SERVICE_NAME=plugin-rr-production
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-enterprise}
      - REDIS_URL=redis://redis:6379/0
      - CORE_SERVICE_URL=http://core:8000
      - SERVICE_URL=http://plugin-rr-production:8000
    depends_on:
      core:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - platform-net

  # ──────────────────────────────────────
  # Standalone Services
  # ──────────────────────────────────────
  rr-production:
    build:
      context: ./plugins/工程啤办单
      dockerfile: Dockerfile.node
    environment:
      - BASE_PATH=/rr
      - PORT=3000
    volumes:
      - ./plugins/工程啤办单/data:/app/data
    restart: unless-stopped
    networks:
      - platform-net

  printing3d:
    build:
      context: "./plugins/3D打印"
      dockerfile: Dockerfile
    env_file:
      - "./plugins/3D打印/.env"
    environment:
      - PORT=3000
      - DATA_PATH=/app/data/data.json
    volumes:
      - "./plugins/3D打印/data:/app/data"
    restart: unless-stopped
    networks:
      - platform-net

  zuru-ma:
    build:
      context: "./plugins/Zuru MA 包装差价系统"
      dockerfile: Dockerfile
    environment:
      - BASE_PATH=/zuru-ma
      - PORT=3000
    restart: unless-stopped
    networks:
      - platform-net

  indonesia-export:
    build:
      context: "./plugins/印尼小组"
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - platform-net

  schedule-system:
    build:
      context: "./plugins/schedule-system"
      dockerfile: Dockerfile
    environment:
      - APP_PORT=5000
      - CONTAINER_MODE=1
      - Z_DRIVE_PATH=/mnt/schedules
    volumes:
      - "./plugins/schedule-system/data:/app/data"
      - "./plugins/schedule-system/uploads:/app/uploads"
    restart: unless-stopped
    networks:
      - platform-net

volumes:
  pg_data:
  redis_data:

networks:
  platform-net:
    driver: bridge
