# RR-Portal — Docker Compose
#
# This file is managed by the DevOps agent. Do not edit manually.
# Apps are added here automatically during onboarding (Phase 2+).
#
# Example app entry (added by agent):
#
#   app-name:
#     build:
#       context: ./apps/app-name
#       dockerfile: Dockerfile
#     ports:
#       - "3001:3000"
#     env_file:
#       - ./apps/app-name/.env
#     restart: unless-stopped
#     logging:
#       driver: json-file
#       options:
#         max-size: "10m"
#         max-file: "3"
#     healthcheck:
#       test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
#       interval: 30s
#       timeout: 10s
#       retries: 3

services:
  task-api:
    build:
      context: ./apps/task-api
      dockerfile: Dockerfile
    ports:
      - "3001:8080"
    env_file:
      - ./apps/task-api/.env
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  figure-mold-cost-system:
    build:
      context: ./apps/工程部/模具手办采购订单系统
      dockerfile: Dockerfile
    env_file:
      - ./apps/工程部/模具手办采购订单系统/.env
    volumes:
      - "./apps/工程部/模具手办采购订单系统/data:/app/data"
      - "./apps/工程部/模具手办采购订单系统/public/uploads:/app/public/uploads"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  zouhuo:
    build:
      context: ./apps/工程部/A-doc生成系統
      dockerfile: Dockerfile
    env_file:
      - ./apps/工程部/A-doc生成系統/.env
    volumes:
      - "./apps/工程部/A-doc生成系統/data:/app/server/data"
      - "./apps/工程部/A-doc生成系統/uploads:/app/server/uploads"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  jiangping:
    build:
      context: ./apps/PMC跟仓管/采购订单管理系统
      dockerfile: Dockerfile
    env_file:
      - ./apps/PMC跟仓管/采购订单管理系统/.env
    volumes:
      - "./apps/PMC跟仓管/采购订单管理系统/data:/app/data"
      - "./apps/PMC跟仓管/采购订单管理系统/uploads:/app/uploads"
    mem_limit: 1g
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  paiji:
    build:
      context: ./apps/生产部/注塑啤机排产系统
      dockerfile: Dockerfile
    env_file:
      - ./apps/生产部/注塑啤机排产系统/.env
    volumes:
      - "./apps/生产部/注塑啤机排产系统/data:/app/data"
      - "./apps/生产部/注塑啤机排产系统/uploads:/app/uploads"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  production-plan:
    build:
      context: ./apps/生产部/生产计划管理系统
      dockerfile: Dockerfile
      args:
        BASE_PATH: /production-plan/
    environment:
      - PORT=8080
      - NODE_ENV=production
    volumes:
      - "./apps/生产部/生产计划管理系统/server/data:/app/server/data"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  quotation:
    build:
      context: ./apps/业务部/套客表系统
      dockerfile: Dockerfile
    environment:
      - PORT=3004
      - NODE_ENV=production
      - CORS_ORIGIN=${QUOTATION_CORS_ORIGIN:-http://localhost}
    volumes:
      - "./apps/业务部/套客表系统/server/data:/app/server/data"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3004/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  tomy-paiqi:
    build:
      context: ./apps/业务部/TOMY排期核对系统
      dockerfile: Dockerfile
    environment:
      - PORT=3006
      - NODE_ENV=production
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3006/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  zuru-master-schedule:
    build:
      context: ./apps/业务部/ZURU总排期入单
      dockerfile: Dockerfile
    volumes:
      - "./apps/业务部/ZURU总排期入单/data:/app/data"
      - "./apps/业务部/ZURU总排期入单/uploads:/app/uploads"
      - "./apps/业务部/ZURU总排期入单/exports:/app/exports"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  zuru-order-system:
    build:
      context: ./apps/业务部/ZURU接单表入单系统
      dockerfile: Dockerfile
    environment:
      - PORT=5005
      - DATA_PATH=/app
      - LOCAL_MODE=1
      - FLASK_DEBUG=0
    volumes:
      - "./apps/业务部/ZURU接单表入单系统/data:/app/data"
      - "./apps/业务部/ZURU接单表入单系统/uploads:/app/uploads"
      - "./apps/业务部/ZURU接单表入单系统/exports:/app/exports"
    mem_limit: 512m
    memswap_limit: 512m
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5005/health"]
      interval: 30s
      timeout: 10s
      retries: 3


  peise:
    build:
      context: ./apps/PMC跟仓管/配色库存管理
      dockerfile: Dockerfile
    env_file:
      - ./apps/PMC跟仓管/配色库存管理/.env
    environment:
      - BASE_PATH=/peise
    volumes:
      - "./apps/PMC跟仓管/配色库存管理/instance:/app/instance"
    mem_limit: 512m
    memswap_limit: 512m
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5006/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  huadeng:
    build:
      context: ./apps/PMC跟仓管/华登包材管理
      dockerfile: Dockerfile
    environment:
      - DATA_PATH=/app/data
    volumes:
      - "./apps/PMC跟仓管/华登包材管理/data:/app/data"
    mem_limit: 512m
    memswap_limit: 512m
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5007/health"]
      interval: 30s
      timeout: 10s
      retries: 3
