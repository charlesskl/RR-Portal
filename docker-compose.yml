# RR-Portal — Docker Compose
#
# This file is managed by the DevOps agent. Do not edit manually.
# Apps are added here automatically during onboarding (Phase 2+).
#
# Example app entry (added by agent):
#
#   app-name:
#     build:
#       context: ./apps/app-name
#       dockerfile: Dockerfile
#     ports:
#       - "3001:3000"
#     env_file:
#       - ./apps/app-name/.env
#     restart: unless-stopped
#     logging:
#       driver: json-file
#       options:
#         max-size: "10m"
#         max-file: "3"
#     healthcheck:
#       test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
#       interval: 30s
#       timeout: 10s
#       retries: 3

services:
  task-api:
    build:
      context: ./apps/task-api
      dockerfile: Dockerfile
    ports:
      - "3001:8080"
    env_file:
      - ./apps/task-api/.env
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  new-product-schedule:
    build:
      context: ./plugins/new-product-schedule
      dockerfile: Dockerfile
    env_file:
      - ./plugins/new-product-schedule/.env
    volumes:
      - "./plugins/new-product-schedule/data:/app/data"
      - "./plugins/new-product-schedule/uploads:/app/uploads"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  figure-mold-cost-system:
    build:
      context: ./plugins/figure-mold-cost-system
      dockerfile: Dockerfile
    env_file:
      - ./plugins/figure-mold-cost-system/.env
    volumes:
      - "./plugins/figure-mold-cost-system/data:/app/data"
      - "./plugins/figure-mold-cost-system/public/uploads:/app/public/uploads"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  zouhuo:
    build:
      context: ./apps/zouhuo
      dockerfile: Dockerfile
    env_file:
      - ./apps/zouhuo/.env
    volumes:
      - "./apps/zouhuo/data:/app/server/data"
      - "./apps/zouhuo/uploads:/app/server/uploads"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  jiangping:
    build:
      context: ./apps/jiangping
      dockerfile: Dockerfile
    env_file:
      - ./apps/jiangping/.env
    volumes:
      - "./apps/jiangping/data:/app/data"
      - "./apps/jiangping/uploads:/app/uploads"
    mem_limit: 1g
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  paiji:
    build:
      context: ./apps/paiji
      dockerfile: Dockerfile
    env_file:
      - ./apps/paiji/.env
    volumes:
      - "./apps/paiji/data:/app/data"
      - "./apps/paiji/uploads:/app/uploads"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  quotation:
    build:
      context: ./apps/quotation
      dockerfile: Dockerfile
    environment:
      - PORT=3004
      - NODE_ENV=production
      - CORS_ORIGIN=${QUOTATION_CORS_ORIGIN:-http://localhost}
    volumes:
      - "./apps/quotation/server/data:/app/server/data"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3004/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  tomy-paiqi:
    build:
      context: ./apps/tomy-paiqi
      dockerfile: Dockerfile
    environment:
      - PORT=3006
      - NODE_ENV=production
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3006/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  zuru-master-schedule:
    build:
      context: ./plugins/zuru-总排期入单
      dockerfile: Dockerfile
    volumes:
      - "./plugins/zuru-总排期入单/data:/app/data"
      - "./plugins/zuru-总排期入单/uploads:/app/uploads"
      - "./plugins/zuru-总排期入单/exports:/app/exports"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
