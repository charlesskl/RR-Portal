worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/json;

    # ─── Logging ───
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ─── Performance ───
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_max_body_size 50m;

    # ─── Gzip Compression (aggressive — reduces transfer over slow network) ───
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml text/xml image/svg+xml application/font-woff2;

    # ─── Rate Limiting ───
    # API requests: 10 requests/second per IP, burst of 20
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    # Login/auth attempts: 5 requests/minute per IP (brute-force protection)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=3r/m;
    # File uploads: 2 requests/second per IP
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=2r/s;
    # Rate limit response code
    limit_req_status 429;

    # ─── Proxy Cache ───
    proxy_cache_path /var/cache/nginx/rr levels=1:2 keys_zone=rr_cache:10m max_size=100m inactive=60m;
    proxy_cache_key "$scheme$request_method$host$request_uri";

    # ─── Upstreams ───
    upstream core_backend {
        server core:8000;
        keepalive 4;
    }

    upstream rr_production {
        server rr-production:3000;
        keepalive 4;
    }

    upstream zouhuo_backend {
        server zouhuo:3002;
        keepalive 4;
    }

    upstream new_product_schedule {
        server new-product-schedule:3000;
        keepalive 4;
    }

    upstream figure_mold_cost {
        server figure-mold-cost-system:3001;
        keepalive 4;
    }

    upstream jiangping_backend {
        server jiangping:5001;
        keepalive 4;
    }

    upstream paiji_backend {
        server paiji:3000;
        keepalive 4;
    }

    upstream zuru_shipment_backend {
        server zuru-shipment:5003;
        keepalive 4;
    }

    upstream zuru_order_system_backend {
        server zuru-order-system:5005;
        keepalive 4;
    }

    upstream quotation_backend {
        server quotation:3004;
        keepalive 4;
    }

    upstream tomy_paiqi_backend {
        server tomy-paiqi:3006;
        keepalive 4;
    }

    upstream liwenjuan_backend {
        server liwenjuan:5004;
        keepalive 4;
    }

    upstream zuru_master_backend {
        server zuru-master-schedule:5003;
        keepalive 4;
    }

    upstream peise_backend {
        server peise:5006;
        keepalive 4;
    }

    upstream huadeng_backend {
        server huadeng:5007;
        keepalive 4;
    }

    # ─── HTTP → HTTPS redirect (enable when SSL certs are provisioned) ───
    # Uncomment this block after running setup-ssl.sh:
    # server {
    #     listen 80;
    #     server_name _;
    #     location /nginx-health {
    #         return 200 '{"status":"ok"}';
    #     }
    #     return 301 https://$host$request_uri;
    # }

    server {
        listen 80;
        # Uncomment below and comment 'listen 80' after SSL setup:
        # listen 443 ssl;
        # include /etc/nginx/ssl.conf;
        server_name _;

        # ─── Security Headers ───
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self';" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        # HSTS — active when served behind HTTPS (LB or direct SSL)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ─── Hide server version ───
        server_tokens off;

        # ─── Basic Auth ───
        auth_basic "RR Portal";
        auth_basic_user_file /etc/nginx/.htpasswd;

        # ─── Portal (landing page) ───
        root /usr/share/nginx/html;
        index index.html;

        location = / {
            add_header Cache-Control "no-cache, must-revalidate";
            try_files /index.html =404;
        }

        # ─── Health check (no auth) ───
        location /nginx-health {
            auth_basic off;
            return 200 '{"status":"ok"}';
        }

        # ─── Core API ───
        location /api/auth {
            limit_req zone=auth_limit burst=2 nodelay;
            proxy_pass http://core_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /api/admin {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://core_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /api/plugins {
            proxy_pass http://core_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /health {
            auth_basic off;
            proxy_pass http://core_backend;
            proxy_set_header Host $host;
        }

        # ─── Core docs / openapi (blocked in production) ───
        location /docs   { return 403; }
        location /redoc  { return 403; }
        location /openapi.json { return 403; }

        # ─── Standalone: RR 工程啤办单 ───
        location = /rr {
            return 301 /rr/;
        }
        location = /rr/health {
            auth_basic off;
            proxy_pass http://rr_production/health;
            proxy_set_header Host $host;
        }
        # API requests — no cache, keepalive to upstream
        location /rr/api/ {
            proxy_pass http://rr_production/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }
        location /rr/ {
            proxy_pass http://rr_production/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Cache static assets at browser level
            proxy_cache rr_cache;
            proxy_cache_valid 200 1h;
            proxy_cache_bypass $http_cache_control;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # ─── Standalone: 走货明细管理 (zouhuo) ───
        location = /zouhuo {
            return 301 /zouhuo/;
        }
        location = /zouhuo/health {
            auth_basic off;
            proxy_pass http://zouhuo_backend/health;
            proxy_set_header Host $host;
        }
        # API routes: disable nginx basic auth (app uses JWT auth)
        location /zouhuo/api/auth {
            auth_basic off;
            limit_req zone=auth_limit burst=2 nodelay;
            proxy_pass http://zouhuo_backend/api/auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
        location /zouhuo/api/ {
