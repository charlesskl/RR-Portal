        # API: rate limit 上传/解析等动作，防止 DoS
        location /zuru-order-system/api/ {
            limit_req zone=upload_limit burst=10 nodelay;
            set $ups "zuru-order-system:5005";
            rewrite ^/zuru-order-system/(.*)$ /$1 break;
