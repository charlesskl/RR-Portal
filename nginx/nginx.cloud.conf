worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/json;

    # ─── Logging ───
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ─── Performance ───
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_max_body_size 50m;

    # ─── Gzip Compression (aggressive — reduces transfer over slow network) ───
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml text/xml image/svg+xml application/font-woff2;

    # ─── Proxy Cache ───
    proxy_cache_path /var/cache/nginx/rr levels=1:2 keys_zone=rr_cache:10m max_size=100m inactive=60m;
    proxy_cache_key "$scheme$request_method$host$request_uri";

    # ─── Upstreams ───
    upstream core_backend {
        server core:8000;
        keepalive 4;
    }

    upstream rr_production {
        server rr-production:3000;
        keepalive 4;
    }

    upstream zouhuo_backend {
        server zouhuo:3002;
        keepalive 4;
    }

    upstream new_product_schedule {
        server new-product-schedule:3000;
        keepalive 4;
    }

    upstream figure_mold_cost {
        server figure-mold-cost-system:3001;
        keepalive 4;
    }

    upstream eng-doc-generator { server eng-doc-generator:3000; }

    server {
        listen 80;
        server_name _;

        # ─── Basic Auth ───
        auth_basic "RR Portal";
        auth_basic_user_file /etc/nginx/.htpasswd;

        # ─── Portal (landing page) ───
        root /usr/share/nginx/html;
        index index.html;

        location = / {
            add_header Cache-Control "no-cache, must-revalidate";
            try_files /index.html =404;
        }

        # ─── Health check (no auth) ───
        location /nginx-health {
            auth_basic off;
            return 200 '{"status":"ok"}';
        }

        # ─── Core API ───
        location /api/auth {
            proxy_pass http://core_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /api/admin {
            proxy_pass http://core_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /api/plugins {
            proxy_pass http://core_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /health {
            auth_basic off;
            proxy_pass http://core_backend;
            proxy_set_header Host $host;
        }

        # ─── Core docs / openapi (blocked in production) ───
        location /docs   { return 403; }
        location /redoc  { return 403; }
        location /openapi.json { return 403; }

        # ─── Standalone: RR 工程啤办单 ───
        location = /rr {
            return 301 /rr/;
        }
        # API requests — no cache, keepalive to upstream
        location /rr/api/ {
            proxy_pass http://rr_production/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }
        location /rr/ {
            proxy_pass http://rr_production/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Cache static assets at browser level
            proxy_cache rr_cache;
            proxy_cache_valid 200 1h;
            proxy_cache_bypass $http_cache_control;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # ─── Standalone: 走货明细管理 (zouhuo) ───
        location = /zouhuo {
            return 301 /zouhuo/;
        }
        location /zouhuo/api/ {
            proxy_pass http://zouhuo_backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }
        location /zouhuo/ {
            proxy_pass http://zouhuo_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ─── Standalone: 新产品开发进度表 (new-product-schedule) ───
        location = /new-product-schedule {
            return 301 /new-product-schedule/;
        }
        location /new-product-schedule/api/ {
            proxy_pass http://new_product_schedule/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }
        location /new-product-schedule/ {
            proxy_pass http://new_product_schedule/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ─── Standalone: 模具手办采购订单系统 (figure-mold-cost-system) ───
        location = /figure-mold-cost-system {
            return 301 /figure-mold-cost-system/;
        }
        # API routes: disable nginx basic auth (app uses JWT auth)
        location /figure-mold-cost-system/api/ {
            auth_basic off;
            proxy_pass http://figure_mold_cost/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }
        location /figure-mold-cost-system/ {
            proxy_pass http://figure_mold_cost/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ─── Standalone: 工程资料生成器 ───
        location /eng-docs/api/ {
            proxy_pass http://eng-doc-generator/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /eng-docs/ {
            proxy_pass http://eng-doc-generator/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ─── Standalone: PO智能识别 ───
        location = /po-parser {
            return 301 /po-parser/;
        }
        location /po-parser/api/ {
            proxy_pass http://po-parser:3200/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            client_max_body_size 100m;
        }
        location /po-parser/ {
            proxy_pass http://po-parser:3200/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ─── Removed apps: return 404 to stop stale health check polling ───
        location /indonesia/ { return 404; }
        location /api/indonesia/ { return 404; }

        # ─── RR 工程啤办单 API（前端用绝对路径 /api/...）───
        location ~ ^/api/(injection|slush|spray|assembly|stats|problems|clients|material-prices|material-stats|injection-costs|requisitions|pending-reviews|verify-pin|change-pin|assembly-users) {
            proxy_pass http://rr_production;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}
