        location ~* ^/quotation/.+\.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot|map)$ {
            set $ups "quotation:3004";
            rewrite ^/quotation/(.*)$ /$1 break;
