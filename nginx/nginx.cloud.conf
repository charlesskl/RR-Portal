worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/json;

    # ─── Logging ───
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ─── Performance ───
    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    client_max_body_size 50m;

    # ─── Gzip Compression ───
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml text/xml image/svg+xml;

    # ─── Proxy Cache ───
    proxy_cache_path /var/cache/nginx/rr levels=1:2 keys_zone=rr_cache:10m max_size=100m inactive=60m;
    proxy_cache_key "$scheme$request_method$host$request_uri";

    # ─── Upstreams (Batch A only) ───
    upstream core_backend {
        server core:8000;
    }

    upstream rr_production {
        server rr-production:3000;
    }

    upstream indonesia_export {
        server indonesia-export:8080;
    }

    server {
        listen 80;
        server_name _;

        # ─── Basic Auth ───
        auth_basic "RR Portal";
        auth_basic_user_file /etc/nginx/.htpasswd;

        # ─── Portal (landing page) ───
        root /usr/share/nginx/html;
        index index.html;

        location = / {
            try_files /index.html =404;
        }

        # ─── Health check (no auth) ───
        location /nginx-health {
            auth_basic off;
            return 200 '{"status":"ok"}';
        }

        # ─── Core API ───
        location /api/auth {
            proxy_pass http://core_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/admin {
            proxy_pass http://core_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/plugins {
            proxy_pass http://core_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health {
            auth_basic off;
            proxy_pass http://core_backend;
            proxy_set_header Host $host;
        }

        # ─── Core docs / openapi (blocked in production) ───
        location /docs   { return 403; }
        location /redoc  { return 403; }
        location /openapi.json { return 403; }

        # ─── Standalone: RR 工程啤办单 ───
        location = /rr {
            return 301 /rr/;
        }
        # API requests — no cache
        location /rr/api/ {
            proxy_pass http://rr_production/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }

        location /rr/ {
            proxy_pass http://rr_production/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Cache static assets at Nginx level
            proxy_cache rr_cache;
            proxy_cache_valid 200 1h;
            proxy_cache_bypass $http_cache_control;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # ─── Standalone: 印尼出货明细资料核对系统 ───
        location = /indonesia {
            return 301 /indonesia/;
        }
        location /indonesia/ {
            proxy_pass http://indonesia_export/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── RR 工程啤办单 API（前端用绝对路径 /api/...）───
        # 注意：此 regex 僅限 rr_production 的路由，禁止加入 auth/admin/plugins（已由上方 prefix location 處理）
        location ~ ^/api/(injection|slush|spray|assembly|stats|problems|clients|material-prices|material-stats|injection-costs|requisitions|pending-reviews|verify-pin|change-pin|assembly-users) {
            proxy_pass http://rr_production;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
