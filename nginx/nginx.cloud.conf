            proxy_set_header Connection "";
            client_max_body_size 200m;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            # 安全响应头
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        }

        # ─── Standalone: 配色库存管理 (peise) ───
        location = /peise {
            return 301 /peise/;
        }
        location = /peise/health {
            auth_basic off;
            set $ups "peise:5006";
            proxy_pass http://$ups/health;
            proxy_set_header Host $host;
        }
        location /peise/ {
            limit_req zone=upload_limit burst=10 nodelay;
            set $ups "peise:5006";
            rewrite ^/peise/(.*)$ /$1 break;
            proxy_pass http://$ups;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /peise;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            client_max_body_size 32m;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
            # peise 模板用 jsdelivr CDN（Bootstrap/jQuery/DataTables/Chart.js）
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://code.jquery.com https://cdn.datatables.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdn.datatables.net; img-src 'self' data: blob:; font-src 'self' data: https://cdn.jsdelivr.net; connect-src 'self'; frame-ancestors 'self';" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        }

        # ─── Standalone: 华登包材管理 (huadeng) ───
        # huadeng 模板用硬编码绝对路径 (href="/", action="/channel/...", fetch('/api/...'))；
        # 不改应用代码，用 nginx sub_filter 在 response 里把 "/ → /huadeng/" 重写
        location = /huadeng {
            return 301 /huadeng/;
        }
        location = /huadeng/health {
            auth_basic off;
            set $ups "huadeng:5007";
            proxy_pass http://$ups/health;
            proxy_set_header Host $host;
        }
        location /huadeng/ {
            set $ups "huadeng:5007";
            rewrite ^/huadeng/(.*)$ /$1 break;
            proxy_pass http://$ups;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            # 禁用 gzip 让 sub_filter 能扫描 response body
            proxy_set_header Accept-Encoding "";
            # Flask redirect() 返回 Location: /channel/1 (root-relative)，浏览器跳到根路径 → 404
            # 在 nginx 层把 Location header 加 /huadeng 前缀（同 sub_filter 重写 href 的逻辑）
            proxy_redirect / /huadeng/;
            client_max_body_size 32m;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;

            # 重写 HTML / inline JS 的绝对路径
            sub_filter_types text/html application/javascript;
            sub_filter_once off;
            sub_filter 'href="/'       'href="/huadeng/';
            sub_filter "href='/"       "href='/huadeng/";
            sub_filter 'action="/'     'action="/huadeng/';
            sub_filter "action='/"     "action='/huadeng/";
            sub_filter 'fetch("/'      'fetch("/huadeng/';
            sub_filter "fetch('/"      "fetch('/huadeng/";
            # 千万别把 /huadeng/ 再次前缀 — sub_filter 不会递归但防止 "/huadeng/huadeng/" 要小心起止边界
            # （都用单前导 / 触发，前缀 "/huadeng/..." 开头是字母不是 /，匹配不到，安全）

            # Tailwind CDN 从 cdn.tailwindcss.com 加载
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self';" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        }

        # ─── Removed apps: return 404 to stop stale health check polling ───
        location /indonesia/ { return 404; }
        location /api/indonesia/ { return 404; }

        # ─── RR 工程啤办单 API（前端用绝对路径 /api/...）───
        location ~ ^/api/(injection|slush|spray|assembly|stats|problems|clients|material-prices|material-stats|injection-costs|requisitions|pending-reviews|verify-pin|change-pin|assembly-users) {
            set $ups "rr-production:3000";
            proxy_pass http://$ups;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}
