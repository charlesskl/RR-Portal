        # API: rate limit 上传/解析等动作，防止 DoS
        location /zuru-order-system/api/ {
            limit_req zone=upload_limit burst=10 nodelay;
            proxy_pass http://zuru_order_system_backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /zuru-order-system;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            # PO 文件实际只有 ~MB，限到 32MB 与 Flask MAX_CONTENT_LENGTH 一致
            client_max_body_size 32m;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            # SSE 仍保留 (/api/progress 端点存在)
            proxy_buffering off;
            proxy_cache off;
        }
        location /zuru-order-system/ {
