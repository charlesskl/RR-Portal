worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/json;

    # ─── Logging ───
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ─── Performance ───
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_max_body_size 50m;

    # ─── Gzip Compression (aggressive — reduces transfer over slow network) ───
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml text/xml image/svg+xml application/font-woff2;

    # ─── Rate Limiting ───
    # API requests: 10 requests/second per IP, burst of 20
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    # Login/auth attempts: 5 requests/minute per IP (brute-force protection)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=3r/m;
    # File uploads: 2 requests/second per IP
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=2r/s;
    # Rate limit response code
    limit_req_status 429;

    # ─── Proxy Cache ───
    proxy_cache_path /var/cache/nginx/rr levels=1:2 keys_zone=rr_cache:10m max_size=100m inactive=60m;
    proxy_cache_key "$scheme$request_method$host$request_uri";

    # ─── Dynamic upstream resolution ───
    # Docker 内嵌 DNS 127.0.0.11 动态解析容器名。关键点：
    # - 配合下方 `set $ups "host:port"; proxy_pass http://$ups;` 变量写法，
    #   nginx 在【请求时】解析 upstream 而非【启动时】
    # - 这样任何一个 app 挂掉 / 没起 / 重建中，nginx 不会 emerg 拒启，
    #   只是该路径返回 502。其他 13 个 app 继续可用。
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # ─── HTTP → HTTPS redirect (enable when SSL certs are provisioned) ───
    # Uncomment this block after running setup-ssl.sh:
    # server {
    #     listen 80;
    #     server_name _;
    #     location /nginx-health {
    #         return 200 '{"status":"ok"}';
    #     }
    #     return 301 https://$host$request_uri;
    # }

    server {
        listen 80;
        # Uncomment below and comment 'listen 80' after SSL setup:
        # listen 443 ssl;
        # include /etc/nginx/ssl.conf;
        server_name _;

        # ─── Security Headers ───
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self';" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        # HSTS — active when served behind HTTPS (LB or direct SSL)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ─── Hide server version ───
        server_tokens off;

        # ─── Basic Auth ───
        auth_basic "RR Portal";
        auth_basic_user_file /etc/nginx/.htpasswd;

        # ─── Portal (landing page) ───
        root /usr/share/nginx/html;
        index index.html;

        location = / {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            expires -1;
            try_files /index.html =404;
        }

        # ─── Health check (no auth) ───
        location /nginx-health {
            auth_basic off;
            return 200 '{"status":"ok"}';
        }

        # ─── Core API ───
        location /api/auth {
            limit_req zone=auth_limit burst=2 nodelay;
            set $ups "core:8000";
            proxy_pass http://$ups;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /api/admin {
            limit_req zone=api_limit burst=20 nodelay;
            set $ups "core:8000";
            proxy_pass http://$ups;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /api/plugins {
            set $ups "core:8000";
            proxy_pass http://$ups;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /health {
            auth_basic off;
            set $ups "core:8000";
            proxy_pass http://$ups;
            proxy_set_header Host $host;
        }

        # ─── Core docs / openapi (blocked in production) ───
        location /docs   { return 403; }
        location /redoc  { return 403; }
        location /openapi.json { return 403; }

        # ─── Standalone: RR 工程啤办单 ───
        location = /rr {
            return 301 /rr/;
        }
        location = /rr/health {
            auth_basic off;
            set $ups "rr-production:3000";
            proxy_pass http://$ups/health;
            proxy_set_header Host $host;
        }
        # API requests — no cache, keepalive to upstream
        location /rr/api/ {
            set $ups "rr-production:3000";
            rewrite ^/rr/(.*)$ /$1 break;
            proxy_pass http://$ups;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }
        location /rr/ {
            set $ups "rr-production:3000";
            rewrite ^/rr/(.*)$ /$1 break;
            proxy_pass http://$ups;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Cache static assets at browser level
            proxy_cache rr_cache;
            proxy_cache_valid 200 1h;
            proxy_cache_bypass $http_cache_control;
            add_header X-Cache-Status $upstream_cache_status;
        }

