worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/json;

    # ─── Logging ───
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ─── Performance ───
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_max_body_size 50m;

    # ─── Gzip Compression (aggressive — reduces transfer over slow network) ───
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml text/xml image/svg+xml application/font-woff2;

    # ─── Proxy Cache ───
    proxy_cache_path /var/cache/nginx/rr levels=1:2 keys_zone=rr_cache:10m max_size=100m inactive=60m;
    proxy_cache_key "$scheme$request_method$host$request_uri";

    # ─── Upstreams ───
    upstream core_backend {
        server core:8000;
        keepalive 4;
    }

    upstream rr_production {
        server rr-production:3000;
        keepalive 4;
    }

    upstream zouhuo_backend {
        server zouhuo:3002;
        keepalive 4;
    }

    server {
        listen 80;
        server_name _;

        # ─── Basic Auth ───
        auth_basic "RR Portal";
        auth_basic_user_file /etc/nginx/.htpasswd;

        # ─── Portal (landing page) ───
        root /usr/share/nginx/html;
        index index.html;

        location = / {
            try_files /index.html =404;
        }

        # ─── Health check (no auth) ───
        location /nginx-health {
            auth_basic off;
            return 200 '{"status":"ok"}';
        }

        # ─── Static assets — long cache (JS/CSS have hashed filenames) ───
        location ~* \.(js|css|woff2|woff|ttf|png|jpg|jpeg|gif|ico|svg)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            try_files $uri @proxy_rr;
        }

        # ─── Core API ───
        location /api/auth {
            proxy_pass http://core_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /api/admin {
            proxy_pass http://core_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /api/plugins {
            proxy_pass http://core_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /health {
            auth_basic off;
            proxy_pass http://core_backend;
            proxy_set_header Host $host;
        }

        # ─── Core docs / openapi (blocked in production) ───
        location /docs   { return 403; }
        location /redoc  { return 403; }
        location /openapi.json { return 403; }

        # ─── Standalone: RR 工程啤办单 ───
        location = /rr {
            return 301 /rr/;
        }
        # API requests — no cache, keepalive to upstream
        location /rr/api/ {
            proxy_pass http://rr_production/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }
        # Static assets (CSS/JS/fonts) — cache aggressively
        location ~* ^/rr/.*\.(js|css|woff2|woff|ttf|png|jpg|jpeg|gif|ico|svg)$ {
            proxy_pass http://rr_production;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            expires 7d;
            add_header Cache-Control "public";
            proxy_cache rr_cache;
            proxy_cache_valid 200 7d;
        }
        location /rr/ {
            proxy_pass http://rr_production/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Named location for fallback proxy
        location @proxy_rr {
            proxy_pass http://rr_production;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ─── Standalone: 走货明细管理 (zouhuo) ───
        location = /zouhuo {
            return 301 /zouhuo/;
        }
        location /zouhuo/api/ {
            proxy_pass http://zouhuo_backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }
        # Zouhuo static assets — cache aggressively (Vite hashed filenames)
        location ~* ^/zouhuo/assets/.*\.(js|css|woff2|woff|ttf|png|jpg|jpeg|gif|ico|svg)$ {
            proxy_pass http://zouhuo_backend;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
        location /zouhuo/ {
            proxy_pass http://zouhuo_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ─── Removed apps: return 404 to stop stale health check polling ───
        location /indonesia/ { return 404; }
        location /api/indonesia/ { return 404; }

        # ─── RR 工程啤办单 API（前端用绝对路径 /api/...）───
        location ~ ^/api/(injection|slush|spray|assembly|stats|problems|clients|material-prices|material-stats|injection-costs|requisitions|pending-reviews|verify-pin|change-pin|assembly-users) {
            proxy_pass http://rr_production;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}
