worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/json;

    # ─── Logging ───
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ─── Performance ───
    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    client_max_body_size 50m;

    # ─── Upstreams ───
    upstream core_backend {
        server core:8000;
    }

    upstream plugin_indonesia {
        server plugin-indonesia:8000;
    }

    upstream plugin_rr_production {
        server plugin-rr-production:8000;
    }

    upstream rr_production {
        server rr-production:3000;
    }

    upstream zuru_ma {
        server zuru-ma:3000;
    }

    upstream printing3d {
        server printing3d:3000;
    }

    upstream indonesia_export {
        server indonesia-export:8080;
    }

    upstream schedule_system {
        server schedule-system:5001;
    }

    # ──────────────────────────────────────
    # To add a new plugin:
    #   1. Add an upstream block above
    #   2. Add a location block below
    #   3. Restart nginx: docker compose restart nginx
    # ──────────────────────────────────────

    server {
        listen 80;
        server_name _;

        # ─── Portal (landing page) ───
        root /usr/share/nginx/html;
        index index.html;

        location = / {
            try_files /index.html =404;
        }

        # ─── Health check ───
        location /nginx-health {
            return 200 '{"status":"ok"}';
        }

        # ─── Core API ───
        location /api/auth {
            proxy_pass http://core_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/admin {
            proxy_pass http://core_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/plugins {
            proxy_pass http://core_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health {
            proxy_pass http://core_backend;
            proxy_set_header Host $host;
        }

        # ─── Core docs / openapi ───
        location /docs {
            proxy_pass http://core_backend;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://core_backend;
            proxy_set_header Host $host;
        }

        location /redoc {
            proxy_pass http://core_backend;
            proxy_set_header Host $host;
        }

        # ─── Zuru MA 包装差价系统 ───
        location /zuru-ma {
            proxy_pass http://zuru_ma;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── Plugin: 印尼小组 Indonesia ───
        location /api/indonesia {
            proxy_pass http://plugin_indonesia;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── Plugin: RR 工程啤办单 ───
        location /api/rr-production {
            proxy_pass http://plugin_rr_production;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── Standalone: RR 工程啤办单 ───
        location = /rr {
            return 301 /rr/;
        }
        location /rr/ {
            proxy_pass http://rr_production/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── Standalone: 3D打印 ───
        location = /3d {
            return 301 /3d/;
        }
        location /3d/ {
            proxy_pass http://printing3d/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── Standalone: 印尼出货明细资料核对系统 ───
        location = /indonesia {
            return 301 /indonesia/;
        }
        location /indonesia/ {
            proxy_pass http://indonesia_export/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── Standalone: 排期录入系统 ───
        location = /schedule {
            return 301 /schedule/;
        }
        location /schedule/ {
            proxy_pass http://schedule_system/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── RR 工程啤办单 API（前端用绝对路径 /api/...）───
        location ~ ^/api/(injection|slush|spray|stats|problems|material-prices|material-stats|injection-costs|requisitions) {
            proxy_pass http://rr_production;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
