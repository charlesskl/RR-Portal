<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置 — 新产品开发进度表</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body>

<!-- 导航栏 -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="./">新产品开发进度表</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navContent">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="./">项目列表</a></li>
        <li class="nav-item"><a class="nav-link" href="stats.html">汇总统计</a></li>
        <li class="nav-item"><a class="nav-link active" href="settings.html">设置</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container-fluid mt-4">

  <!-- Toast 提示 -->
  <div class="position-fixed top-0 end-0 p-3" style="z-index: 1100">
    <div id="toastMsg" class="toast align-items-center text-bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="d-flex">
        <div class="toast-body" id="toastText">操作成功</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <h5 class="mb-4"><i class="bi bi-gear-fill me-2"></i>系统设置</h5>

  <div class="row g-4">

    <!-- 车间管理 -->
    <div class="col-md-4">
      <div class="card h-100">
        <div class="card-header d-flex align-items-center gap-2">
          <i class="bi bi-building"></i>
          <span class="fw-semibold">车间管理</span>
        </div>
        <div class="card-body">
          <ul id="list-workshops" class="list-group list-group-flush mb-3"></ul>
          <div class="input-group input-group-sm">
            <input id="input-workshops" type="text" class="form-control" placeholder="输入新车间名称">
            <button class="btn btn-primary btn-sm" onclick="addItem('workshops')">
              <i class="bi bi-plus-lg"></i> 添加
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- 客户管理 -->
    <div class="col-md-4">
      <div class="card h-100">
        <div class="card-header d-flex align-items-center gap-2">
          <i class="bi bi-people"></i>
          <span class="fw-semibold">客户管理</span>
        </div>
        <div class="card-body">
          <ul id="list-customers" class="list-group list-group-flush mb-3"></ul>
          <div class="input-group input-group-sm">
            <input id="input-customers" type="text" class="form-control" placeholder="输入新客户名称">
            <button class="btn btn-primary btn-sm" onclick="addItem('customers')">
              <i class="bi bi-plus-lg"></i> 添加
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- 主管管理 -->
    <div class="col-md-4">
      <div class="card h-100">
        <div class="card-header d-flex align-items-center gap-2">
          <i class="bi bi-person-badge"></i>
          <span class="fw-semibold">主管管理</span>
        </div>
        <div class="card-body">
          <ul id="list-supervisors" class="list-group list-group-flush mb-3"></ul>
          <div class="input-group input-group-sm">
            <input id="input-supervisors" type="text" class="form-control" placeholder="输入新主管姓名">
            <button class="btn btn-primary btn-sm" onclick="addItem('supervisors')">
              <i class="bi bi-plus-lg"></i> 添加
            </button>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="settings.js"></script>
</body>
</html>
