# ============================================
# 本地开发环境 Docker Compose
# 用法: docker compose -f docker-compose.dev.yml up
# ============================================

services:
  app:
    image: nginx:1.25-alpine
    container_name: shipment-checker-dev
    ports:
      - "3000:8080"
    volumes:
      # Bind mount：本地文件修改后刷新浏览器即可看到效果
      - .:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    environment:
      - TZ=Asia/Shanghai
