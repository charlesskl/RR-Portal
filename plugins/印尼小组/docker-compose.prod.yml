# ============================================
# 生产环境 Docker Compose
# 用法: docker compose -f docker-compose.prod.yml up -d
# ============================================

services:
  app:
    image: ${REGISTRY:-docker.io}/${IMAGE_NAME:-charlesskl/shipment-checker}:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shipment-checker
    restart: always
    ports:
      - "${APP_PORT:-80}:8080"
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    # Nginx 日志持久化
    volumes:
      - nginx-logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 32M

volumes:
  nginx-logs:
    name: shipment-checker-logs
