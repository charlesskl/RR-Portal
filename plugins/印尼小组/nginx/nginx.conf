# ============================================
# Nginx 配置 - 印尼出货明细资料核对系统
# ============================================

# 以非 root 运行时不能用 user 指令
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip 压缩（对 HTML/JS/CSS 效果显著）
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               application/vnd.ms-fontobject application/x-font-ttf
               font/opentype image/svg+xml;

    # 预压缩文件支持（使用 Dockerfile 中 gzip -k 生成的 .gz 文件）
    gzip_static on;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 限制上传大小（前端处理 Excel/PDF 文件，通过浏览器读取不经过 Nginx）
    client_max_body_size 1m;

    server {
        listen 8080;
        server_name _;

        root /usr/share/nginx/html;
        index 印尼出货明细资料核对系统.html;

        # 主页面
        location / {
            try_files $uri $uri/ /印尼出货明细资料核对系统.html;
        }

        # 静态文件缓存策略
        location ~* \.(html)$ {
            # HTML 不缓存，确保用户总是拿到最新版本
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires 0;
        }

        # 健康检查端点
        location /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # 禁止访问隐藏文件
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
