<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>夹具部 - 夹具申请单</title>
  <link href="./vendor/bootstrap.min.css" rel="stylesheet">
  <link href="./vendor/bootstrap-icons.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
  <style>
    .items-table input[type=text]   { min-width: 60px; }
    .items-table input[type=number] { min-width: 60px; max-width: 90px; }
    .items-table input.w-date { min-width: 90px; max-width: 100px; }
    .items-table input:focus { position: relative; z-index: 10; min-width: 200px; box-shadow: 0 0 0 3px rgba(41,128,185,.3); }
    .items-table td { overflow: visible; }
  </style>
</head>
<body class="bg-light">

<!-- 导航栏 -->
<nav class="navbar navbar-dark" style="background:#2980b9">
  <div class="container-fluid">
    <span class="navbar-brand"><i class="bi bi-wrench-adjustable-circle me-2"></i>夹具部 — 夹具申请单</span>
    <div class="d-flex gap-2 align-items-center">
      <a href="index.html" class="nav-dept-link"><i class="bi bi-house me-1"></i>主页</a>
    </div>
  </div>
</nav>

<div class="container-fluid mt-3">
  <!-- 操作栏 -->
  <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-3">
    <div class="d-flex flex-wrap align-items-center gap-2">
      <div class="status-filter d-flex flex-wrap gap-1">
        <button class="btn btn-sm btn-outline-secondary active" onclick="filterStatus('',this)">全部</button>
        <button class="btn btn-sm" style="background:#fd7e14;color:#fff;border-color:#fd7e14" onclick="filterStatus('待审核',this)">待审核</button>
        <button class="btn btn-sm" style="background:#7c3aed;color:#fff;border-color:#7c3aed" onclick="filterStatus('待经理审核',this)">待经理审核</button>
        <button class="btn btn-sm btn-warning"  onclick="filterStatus('待生产',this)">待生产</button>
        <button class="btn btn-sm btn-info"     onclick="filterStatus('生产中',this)">生产中</button>
        <button class="btn btn-sm btn-success"  onclick="filterStatus('已完成',this)">已完成</button>
        <button class="btn btn-sm btn-danger"   onclick="filterStatus('已驳回',this)">已驳回</button>
      </div>
    </div>
    <div class="d-flex gap-2">
      <button class="btn btn-outline-secondary" onclick="loadOrders()"><i class="bi bi-arrow-clockwise me-1"></i>刷新</button>
      <button class="btn btn-primary" style="background:#2980b9;border-color:#2980b9" onclick="openNewModal()">
        <i class="bi bi-plus-lg me-1"></i>新建夹具申请单
      </button>
    </div>
  </div>

  <!-- 订单列表 -->
  <div class="card shadow-sm">
    <div class="card-body p-0">
      <div id="orderList"><div class="empty-state"><i class="bi bi-inbox"></i><p class="mt-2">加载中...</p></div></div>
    </div>
  </div>
</div>

<!-- ═══════════════════ 夹具申请单 Modal ═══════════════════ -->
<div class="modal fade" id="asmModal" tabindex="-1" data-bs-backdrop="static">
  <div class="modal-dialog modal-xl">
    <div class="modal-content">
      <div class="modal-header" style="background:#2980b9;color:#fff">
        <h5 class="modal-title"><i class="bi bi-wrench-adjustable-circle me-2"></i><span id="asmModalTitle">新建夹具申请单</span></h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="asm-id">
        <input type="hidden" id="asm-status" value="待审核">
        <div class="row g-3 mb-3">
          <div class="col-md-3"><label class="form-label fw-bold">申请人 <span class="text-danger">*</span></label><input class="form-control" id="asm-applicant" placeholder="您的姓名"></div>
          <div class="col-md-3"><label class="form-label fw-bold">货号 <span class="text-danger">*</span></label><input class="form-control" id="asm-order_number" placeholder="如 3寸暴力熊"></div>
          <div class="col-md-3"><label class="form-label fw-bold">客名</label>
            <select class="form-select" id="asm-client_name">
              <option value="">请选择客户</option>
            </select>
          </div>
          <div class="col-md-3"><label class="form-label fw-bold">备注</label><input class="form-control" id="asm-reason" placeholder="备注信息"></div>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-2">
          <strong>夹具明细</strong>
          <div class="d-flex gap-2">
            <button class="btn btn-sm btn-outline-success" onclick="triggerAsmExcelImport()"><i class="bi bi-file-earmark-excel me-1"></i>导入Excel</button>
            <button class="btn btn-sm btn-outline-primary" onclick="addAsmRow()"><i class="bi bi-plus-lg me-1"></i>添加行</button>
          </div>
        </div>
        <div class="items-table-wrap">
          <table class="table table-bordered table-sm items-table" id="asmItemsTable">
            <thead>
              <tr>
                <th style="width:50px">序号</th><th>名称</th><th style="width:80px">数量</th><th>日期</th><th>备注</th><th>完成时间</th><th style="width:40px"></th>
              </tr>
            </thead>
            <tbody id="asmItemsBody"></tbody>
          </table>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
        <button class="btn btn-primary" style="background:#2980b9;border-color:#2980b9" onclick="saveOrder()"><i class="bi bi-save me-1"></i>保存</button>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════════ 订单详情 Modal ═══════════════════ -->
<div class="modal fade" id="orderDetailModal" tabindex="-1">
  <div class="modal-dialog modal-xl">
    <div class="modal-content">
      <div class="modal-header" style="background:#2980b9;color:#fff">
        <h5 class="modal-title"><i class="bi bi-file-text me-2"></i>夹具申请单详情 — <span id="detailModalLabel"></span></h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="orderDetailBody"><div class="text-center text-muted py-4">加载中...</div></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
        <button class="btn btn-outline-primary" id="detailEditBtn"><i class="bi bi-pencil me-1"></i>编辑</button>
        <button class="btn btn-outline-secondary" id="detailPrintBtn"><i class="bi bi-printer me-1"></i>打印</button>
      </div>
    </div>
  </div>
</div>

<!-- Toast通知 -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index:9999">
  <div id="toast" class="toast align-items-center text-white border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toastMsg">操作成功</div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="./vendor/bootstrap.bundle.min.js"></script>
<script src="utils.js"></script>
<script>
// ─── 状态管理 ────────────────────────────────────────────────────────────────
let currentFilter = '';

// ─── 状态筛选 ────────────────────────────────────────────────────────────────
function filterStatus(status, el) {
  currentFilter = status;
  document.querySelectorAll('.status-filter .btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  loadOrders();
}

// ─── 加载/渲染订单列表 ────────────────────────────────────────────────────────
function loadOrders() {
  document.getElementById('orderList').innerHTML = '<div class="text-center p-4 text-muted">加载中...</div>';
  apiFetch('/api/assembly')
    .then(r => r.json())
    .then(orders => {
      if (currentFilter) orders = orders.filter(o => o.status === currentFilter);
      const _sOrd = { '待审核':0, '待经理审核':1, '待生产':2, '生产中':3, '已完成':4, '已驳回':5, '已取消':6 };
      orders.sort((a, b) => {
        const oa = _sOrd[a.status] ?? 9, ob = _sOrd[b.status] ?? 9;
        if (oa !== ob) return oa - ob;
        return b.id - a.id;
      });
      renderOrderList(orders);
    })
    .catch(() => showToast('加载失败', 'danger'));
}

const statusBadge = s => ({
  '待审核': '<span class="badge" style="background:#fd7e14">待审核</span>',
  '待经理审核': '<span class="badge" style="background:#7c3aed">待经理审核</span>',
  '待生产': '<span class="badge badge-pending">待生产</span>',
  '生产中': '<span class="badge badge-progress">生产中</span>',
  '已完成': '<span class="badge badge-done">已完成</span>',
  '已取消': '<span class="badge bg-secondary">已取消</span>',
  '已驳回': '<span class="badge bg-danger">已驳回</span>'
}[s] || `<span class="badge bg-secondary">${esc(s)}</span>`);

function renderOrderList(orders) {
  if (!orders.length) {
    document.getElementById('orderList').innerHTML = `<div class="empty-state"><i class="bi bi-inbox"></i><p class="mt-2">暂无单据</p></div>`;
    return;
  }
  const rows = orders.map(o => {
    const canEdit = o.status === '待审核' || o.status === '已驳回';
    const canDelete = canEdit;
    const canStart = o.status === '待生产';
    const canFinish = o.status === '生产中';
    const itemCount = (o.items || []).length;
    return `
    <tr class="order-row" style="cursor:pointer" onclick="viewOrderDetail(${o.id},'${esc((o.order_number||'').replace(/'/g,''))}')">
      <td>${esc(o.order_number || '-')}</td>
      <td>${esc(o.client_name || '-')}</td>
      <td class="text-center">${itemCount}</td>
      <td>${esc(o.created_by || '-')}</td>
      <td>${fmtDateTime(o.created_at)}</td>
      <td class="text-nowrap">${statusBadge(o.status)}</td>
      <td class="text-nowrap" onclick="event.stopPropagation()">
        <div class="btn-group btn-group-sm">
          ${canEdit   ? `<button class="btn btn-outline-primary" onclick="editOrder(${o.id})" title="编辑"><i class="bi bi-pencil"></i></button>` : ''}
          ${canDelete ? `<button class="btn btn-outline-danger"  onclick="deleteOrder(${o.id})" title="删除"><i class="bi bi-trash"></i></button>` : ''}
          ${canStart  ? `<button class="btn btn-info text-white" onclick="changeStatus(${o.id},'生产中')" title="开始生产"><i class="bi bi-play-fill me-1"></i>开始</button>` : ''}
          ${canFinish ? `<button class="btn btn-success"         onclick="changeStatus(${o.id},'已完成')" title="完成"><i class="bi bi-check-lg me-1"></i>完成</button>` : ''}
          <button class="btn btn-outline-secondary" onclick="printOrder(${o.id})" title="打印"><i class="bi bi-printer"></i></button>
        </div>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('orderList').innerHTML = `
    <table class="table table-hover table-sm mb-0" style="font-size:.82rem">
      <thead class="table-dark">
        <tr>
          <th>货号</th><th>客名</th><th>夹具数</th><th>申请人</th><th>申请时间</th><th>状态</th><th>操作</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function fmtDateTime(s) {
  if (!s) return '-';
  return new Date(s).toLocaleString('zh-CN', {
    timeZone: 'Asia/Shanghai', hour12: false,
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit'
  }).replace(/\//g, '-');
}

// ─── 新建/编辑 ────────────────────────────────────────────────────────────────
let _rowSeq = 0;
function openNewModal() {
  document.getElementById('asmModalTitle').textContent = '新建夹具申请单';
  document.getElementById('asm-id').value = '';
  document.getElementById('asm-applicant').value = '';
  document.getElementById('asm-order_number').value = '';
  document.getElementById('asm-client_name').value = '';
  document.getElementById('asm-reason').value = '';
  document.getElementById('asm-status').value = '待审核';
  document.getElementById('asmItemsBody').innerHTML = '';
  _rowSeq = 0;
  addAsmRow();
  new bootstrap.Modal(document.getElementById('asmModal')).show();
}

function editOrder(id) {
  apiFetch(`/api/assembly/${id}`)
    .then(r => r.json())
    .then(order => {
      if (order.status !== '待审核' && order.status !== '已驳回') {
        showToast('当前状态不允许编辑', 'danger');
        return;
      }

      document.getElementById('asmModalTitle').textContent = `编辑夹具申请单 #${id}`;
      document.getElementById('asm-id').value = order.id;
      document.getElementById('asm-applicant').value = order.created_by || '';
      document.getElementById('asm-order_number').value = order.order_number || '';
      document.getElementById('asm-client_name').value = order.client_name || '';
      document.getElementById('asm-reason').value = order.reason || '';
      document.getElementById('asm-status').value = (order.status === '已驳回') ? '待审核' : order.status;

      const tbody = document.getElementById('asmItemsBody');
      tbody.innerHTML = '';
      _rowSeq = 0;
      (order.items || []).forEach(it => addAsmRow(it));
      if (!order.items || !order.items.length) addAsmRow();

      new bootstrap.Modal(document.getElementById('asmModal')).show();
    })
    .catch(() => showToast('加载失败', 'danger'));
}

// ─── 添加表格行 ───────────────────────────────────────────────────────────────
function inp(type, name, val='', extra='') {
  const escaped = esc(val === null || val === undefined ? '' : val);
  return `<input type="${type}" class="form-control form-control-sm" name="${name}" value="${escaped}" title="${escaped}" ${extra} onfocus="this.title=this.value" oninput="this.title=this.value">`;
}

function addAsmRow(it={}) {
  _rowSeq++;
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td class="text-center seq-num">${_rowSeq}</td>
    <td>${inp('text','product_name',it.product_name,'placeholder="夹具名称"')}</td>
    <td>${inp('number','quantity',it.quantity,'style="width:80px" min="1"')}</td>
    <td>${inp('text','required_date',it.required_date,'placeholder="YYYY-MM-DD" class="w-date"')}</td>
    <td>${inp('text','notes',it.notes)}</td>
    <td>${inp('text','completion_time',it.completion_time,'placeholder="完成时间" class="w-date"')}</td>
    <td><button type="button" class="btn btn-sm btn-danger" onclick="removeRow(this)"><i class="bi bi-x-lg"></i></button></td>`;
  document.getElementById('asmItemsBody').appendChild(tr);
}

function removeRow(btn) {
  btn.closest('tr').remove();
  document.querySelectorAll('#asmItemsBody tr').forEach((tr, i) => {
    tr.querySelector('.seq-num').textContent = i + 1;
  });
  _rowSeq = document.querySelectorAll('#asmItemsBody tr').length;
}

// ─── 保存订单 ─────────────────────────────────────────────────────────────────
const asmFields = ['product_name','quantity','required_date','notes','completion_time'];

function collectRows(tbodyId, fields) {
  return Array.from(document.getElementById(tbodyId).querySelectorAll('tr')).map(tr => {
    const obj = {};
    fields.forEach(f => {
      const el = tr.querySelector(`[name="${f}"]`);
      obj[f] = el ? (el.value.trim() || null) : null;
    });
    return obj;
  });
}

function saveOrder() {
  const applicant = document.getElementById('asm-applicant').value.trim();
  if (!applicant) { alert('请填写申请人姓名'); return; }
  const orderNumber = document.getElementById('asm-order_number').value.trim();
  if (!orderNumber) { alert('请填写货号'); return; }

  const items = collectRows('asmItemsBody', asmFields);
  if (!items.length || items.every(it => !it.product_name)) {
    alert('请至少填写一项夹具名称'); return;
  }

  const id = document.getElementById('asm-id').value;
  const body = {
    order_number:  orderNumber,
    client_name:   document.getElementById('asm-client_name').value || null,
    reason:        document.getElementById('asm-reason').value || null,
    status:        document.getElementById('asm-status').value,
    items:         items,
  };

  const url    = id ? `/api/assembly/${id}` : '/api/assembly';
  const method = id ? 'PUT' : 'POST';
  const hdrs   = { 'Content-Type': 'application/json', 'X-User': encodeURIComponent(applicant) };

  apiFetch(url, { method, headers: hdrs, body: JSON.stringify(body) })
    .then(r => r.json())
    .then(data => {
      if (data.error) { showToast(data.error, 'danger'); return; }
      bootstrap.Modal.getInstance(document.getElementById('asmModal'))?.hide();
      showToast(id ? '更新成功！' : '创建成功！', 'success');
      loadOrders();
    })
    .catch(() => showToast('保存失败', 'danger'));
}

// ─── 状态变更 ────────────────────────────────────────────────────────────────
function changeStatus(id, newStatus) {
  const label = newStatus === '生产中' ? '开始生产' : '完成';
  if (!confirm(`确定要将此单据标记为「${newStatus}」吗？`)) return;

  apiFetch(`/api/assembly/${id}/status`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status: newStatus })
  })
    .then(r => r.json())
    .then(d => {
      if (d.error) { showToast(d.error, 'danger'); return; }
      showToast(`已${label}`, 'success');
      loadOrders();
    })
    .catch(() => showToast('操作失败', 'danger'));
}

// ─── 删除/打印 ────────────────────────────────────────────────────────────────
function deleteOrder(id) {
  if (!confirm('确定删除这条单据吗？删除后无法恢复。')) return;
  apiFetch(`/api/assembly/${id}`, { method: 'DELETE' })
    .then(r => r.json())
    .then(d => {
      if (d.error) { showToast(d.error, 'danger'); return; }
      showToast('删除成功', 'success'); loadOrders();
    })
    .catch(() => showToast('删除失败', 'danger'));
}

function printOrder(id) {
  window.open(`print.html?type=assembly&id=${id}`, '_blank');
}

// ─── 订单详情查看 ─────────────────────────────────────────────────────────────
function viewOrderDetail(id, orderNum) {
  document.getElementById('detailModalLabel').textContent = orderNum || `#${id}`;
  document.getElementById('orderDetailBody').innerHTML = '<div class="text-center text-muted py-4">加载中...</div>';
  document.getElementById('detailEditBtn').onclick = () => {
    bootstrap.Modal.getInstance(document.getElementById('orderDetailModal'))?.hide();
    editOrder(id);
  };
  document.getElementById('detailPrintBtn').onclick = () => printOrder(id);
  new bootstrap.Modal(document.getElementById('orderDetailModal')).show();
  apiFetch(`/api/assembly/${id}`)
    .then(r => r.json())
    .then(order => {
      const canEdit = order.status === '待审核' || order.status === '已驳回';
      document.getElementById('detailEditBtn').style.display = canEdit ? '' : 'none';
      document.getElementById('orderDetailBody').innerHTML = renderOrderDetails(order);
    })
    .catch(() => {
      document.getElementById('orderDetailBody').innerHTML = '<div class="text-danger">加载失败</div>';
    });
}

function renderOrderDetails(order) {
  const headerHtml = `
    <div class="row g-2 mb-3">
      <div class="col-6 col-md-3"><div class="text-muted small">货号</div><div class="fw-bold">${esc(order.order_number || '-')}</div></div>
      <div class="col-6 col-md-3"><div class="text-muted small">客名</div><div>${esc(order.client_name || '-')}</div></div>
      <div class="col-6 col-md-3"><div class="text-muted small">申请人</div><div>${esc(order.created_by || '-')}</div></div>
      <div class="col-6 col-md-3"><div class="text-muted small">申请时间</div><div>${fmtDateTime(order.created_at)}</div></div>
      <div class="col-6 col-md-3"><div class="text-muted small">状态</div><div>${statusBadge(order.status)}</div></div>
      ${order.reason ? `<div class="col-12"><div class="text-muted small">备注</div><div>${esc(order.reason)}</div></div>` : ''}
      ${order.reject_reason ? `<div class="col-12"><div class="text-muted small text-danger">驳回原因</div><div class="text-danger fw-bold">${esc(order.reject_reason)}</div></div>` : ''}
    </div>`;

  const items = order.items || [];
  if (!items.length) return headerHtml + '<div class="text-muted small">（无明细行）</div>';

  const thead = '<tr><th>序号</th><th>名称</th><th>数量</th><th>日期</th><th>备注</th><th>完成时间</th></tr>';
  const rows = items.map((it, i) => `<tr><td>${i+1}</td><td>${esc(it.product_name||'-')}</td><td>${esc(it.quantity||'-')}</td><td>${esc(it.required_date||'-')}</td><td>${esc(it.notes||'-')}</td><td>${esc(it.completion_time||'-')}</td></tr>`).join('');

  return headerHtml + `<div class="table-responsive"><table class="table table-bordered table-sm"><thead class="table-light">${thead}</thead><tbody>${rows}</tbody></table></div>`;
}

// ─── Toast提示 ────────────────────────────────────────────────────────────────
function showToast(msg, type = 'success') {
  const el = document.getElementById('toast');
  const colors = { success: '#198754', danger: '#dc3545', warning: '#ffc107' };
  el.style.background = colors[type] || '#333';
  document.getElementById('toastMsg').textContent = msg;
  new bootstrap.Toast(el, { delay: 2500 }).show();
}

// ─── 加载客户列表 ────────────────────────────────────────────────────────────
apiFetch('/api/clients').then(r => r.json()).then(clients => {
  const sel = document.getElementById('asm-client_name');
  if (sel) {
    clients.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; sel.appendChild(o); });
  }
}).catch(() => {});

// ─── Excel 导入 ──────────────────────────────────────────────────────────────
const _asmExcelInput = (() => {
  const el = document.createElement('input');
  el.type = 'file'; el.accept = '.xlsx,.xls,.csv'; el.style.display = 'none';
  document.body.appendChild(el);
  el.addEventListener('change', onAsmExcelSelected);
  return el;
})();

function triggerAsmExcelImport() { _asmExcelInput.value = ''; _asmExcelInput.click(); }

function loadXLSX() {
  if (window.XLSX) return Promise.resolve();
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js';
    s.onload = resolve;
    s.onerror = () => reject(new Error('Failed to load XLSX library'));
    document.head.appendChild(s);
  });
}

function excelDateToStr(v) {
  if (!v) return '';
  if (typeof v === 'string') return v;
  if (typeof v === 'number') {
    const d = new Date((v - 25569) * 86400000);
    return d.toISOString().slice(0, 10);
  }
  if (v instanceof Date) return v.toISOString().slice(0, 10);
  return String(v);
}

function onAsmExcelSelected() {
  const file = _asmExcelInput.files[0];
  if (!file) return;
  loadXLSX().then(() => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const allRows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '', raw: true });
        if (!allRows.length) { showToast('Excel 文件没有数据', 'warning'); return; }

        let orderNumber = '';
        let headerIdx = -1;

        for (let i = 0; i < Math.min(allRows.length, 10); i++) {
          const rowText = allRows[i].map(c => String(c)).join(' ');
          const m = rowText.match(/货号[：:]\s*(.+)/);
          if (m) orderNumber = m[1].trim();
          const cells = allRows[i].map(c => String(c).trim());
          if (cells.includes('序号') && cells.includes('名称')) { headerIdx = i; break; }
        }

        if (headerIdx === -1) {
          for (let i = 0; i < Math.min(allRows.length, 10); i++) {
            const cells = allRows[i].map(c => String(c).trim());
            if (cells.some(c => c.includes('名称')) && cells.some(c => c.includes('数量'))) { headerIdx = i; break; }
          }
        }
        if (headerIdx === -1) { showToast('未找到表头行（需含"序号""名称"列）', 'warning'); return; }

        const headers = allRows[headerIdx].map(c => String(c).trim());
        const nameCol = headers.findIndex(h => h.includes('名称'));
        const qtyCol = headers.findIndex(h => h.includes('数量'));
        const dateCol = headers.findIndex(h => h === '日期');
        const notesCol = headers.findIndex(h => h.includes('备注'));
        const complCol = headers.findIndex(h => h.includes('完成'));

        if (orderNumber) document.getElementById('asm-order_number').value = orderNumber;

        const dataRows = allRows.slice(headerIdx + 1);
        const tbody = document.getElementById('asmItemsBody');
        tbody.innerHTML = '';
        _rowSeq = 0;
        let imported = 0;

        for (const row of dataRows) {
          const name = nameCol >= 0 ? String(row[nameCol] || '').trim() : '';
          if (!name) continue;
          const rowText = row.map(c => String(c)).join('');
          if (rowText.includes('申请人') || rowText.includes('批准') || rowText.includes('审核')) break;

          addAsmRow({
            product_name: name,
            quantity: qtyCol >= 0 ? (row[qtyCol] || '') : '',
            required_date: dateCol >= 0 ? excelDateToStr(row[dateCol]) : '',
            notes: notesCol >= 0 ? String(row[notesCol] || '') : '',
            completion_time: complCol >= 0 ? excelDateToStr(row[complCol]) : '',
          });
          imported++;
        }

        if (imported === 0) addAsmRow();
        showToast(`成功导入 ${imported} 项夹具`, 'success');
      } catch (err) {
        console.error(err);
        showToast('Excel 解析失败: ' + err.message, 'danger');
      }
    };
    reader.readAsArrayBuffer(file);
  }).catch(() => showToast('加载 XLSX 库失败', 'danger'));
}

// ─── 初始化 ──────────────────────────────────────────────────────────────────
loadOrders();

// Auto-refresh every 30s
setInterval(loadOrders, 30000);
</script>
