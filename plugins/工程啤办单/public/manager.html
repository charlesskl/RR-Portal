<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>经理审核入口</title>
  <link href="./vendor/bootstrap.min.css" rel="stylesheet">
  <link href="./vendor/bootstrap-icons.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
  <style>
    .login-card { max-width: 400px; margin: 100px auto; }
    .login-card .card { border: none; box-shadow: 0 4px 24px rgba(0,0,0,.12); border-radius: 12px; }
    .login-header { background: linear-gradient(135deg,#7c3aed,#a855f7); border-radius: 12px 12px 0 0; padding: 28px 24px 20px; text-align: center; color: #fff; }
    .login-header i { font-size: 2.4rem; }
    .login-header h4 { margin: 10px 0 4px; font-weight: 700; }
    .login-header small { opacity: .8; }
    /* 通知徽章 */
    .notify-badge { position:relative; }
    .notify-badge .badge-count { position:absolute; top:-6px; right:-10px; background:#dc3545; color:#fff; border-radius:50%; font-size:.7rem; min-width:18px; height:18px; line-height:18px; text-align:center; padding:0 4px; font-weight:700; animation: badge-pulse 2s infinite; }
    @keyframes badge-pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }
    /* 顶部通知条 */
    .notify-bar { background:linear-gradient(90deg,#7c3aed,#a855f7); color:#fff; padding:10px 16px; font-weight:600; display:flex; align-items:center; gap:8px; cursor:pointer; }
    .notify-bar:hover { filter:brightness(1.1); }
    .notify-bar i { font-size:1.2rem; animation: ring 1.5s ease-in-out infinite; }
    @keyframes ring { 0%{transform:rotate(0)} 10%{transform:rotate(15deg)} 20%{transform:rotate(-15deg)} 30%{transform:rotate(10deg)} 40%{transform:rotate(-10deg)} 50%{transform:rotate(0)} }
  </style>
</head>
<body class="bg-light">

<!-- ─── 登录界面 ─────────────────────────────────────────────────────────────── -->
<div id="loginSection" class="login-card">
  <div class="card">
    <div class="login-header">
      <i class="bi bi-person-badge"></i>
      <h4>经理审核入口</h4>
      <small>请输入经理专属 PIN 码</small>
    </div>
    <div class="card-body p-4">
      <div class="mb-3">
        <label class="form-label fw-bold">PIN 密码</label>
        <input type="password" id="loginPin" class="form-control form-control-lg"
               placeholder="请输入 PIN" maxlength="8" autocomplete="off"
               onkeydown="if(event.key==='Enter')doLogin()">
        <div id="loginError" class="text-danger small mt-2 d-none">
          <i class="bi bi-exclamation-circle me-1"></i>PIN 错误，请重试
        </div>
      </div>
      <button class="btn btn-primary w-100 btn-lg fw-bold" style="background:#7c3aed;border-color:#7c3aed" onclick="doLogin()">
        <i class="bi bi-box-arrow-in-right me-2"></i>登录
      </button>
      <div class="text-center mt-3">
        <a href="index.html" class="text-muted small"><i class="bi bi-house me-1"></i>返回主页</a>
      </div>
    </div>
  </div>
</div>

<!-- ─── 经理工作台 ────────────────────────────────────────────────────────────── -->
<div id="dashSection" style="display:none">

  <nav class="navbar navbar-dark" style="background:#7c3aed">
    <div class="container-fluid">
      <span class="navbar-brand">
        <span class="notify-badge">
          <i class="bi bi-person-badge me-2"></i>
          <span id="navBadge" class="badge-count" style="display:none">0</span>
        </span>
        经理审核工作台
        &nbsp;—&nbsp;
        <span id="dashName" class="fw-bold text-warning"></span>
      </span>
      <div class="d-flex gap-2 align-items-center">
        <a href="index.html" class="nav-dept-link"><i class="bi bi-house me-1"></i>主页</a>
        <a href="engineering.html" class="nav-dept-link">工程部</a>
        <button class="btn btn-sm btn-outline-light" onclick="openPriceTableModal()">
          <i class="bi bi-table me-1"></i>价格表管理
        </button>
        <button class="btn btn-sm btn-outline-light" onclick="openRecalcModal()">
          <i class="bi bi-calculator me-1"></i>料费重算
        </button>
        <button class="btn btn-sm btn-outline-light" onclick="openResetPinModal()">
          <i class="bi bi-key me-1"></i>重置主管密码
        </button>
        <button class="btn btn-sm btn-outline-light" onclick="doLogout()">
          <i class="bi bi-box-arrow-right me-1"></i>退出
        </button>
      </div>
    </div>
  </nav>

  <!-- 待审核通知条 -->
  <div id="notifyBar" class="notify-bar" style="display:none" onclick="filterStatus('待经理审核',document.querySelector('.status-filter .btn:nth-child(3)'))">
    <i class="bi bi-bell-fill"></i>
    <span id="notifyText">您有 0 条待审核订单</span>
    <i class="bi bi-chevron-right ms-auto"></i>
  </div>

  <div class="container-fluid mt-3">
    <ul class="nav nav-tabs type-tabs mb-3" id="mgrTabs">
      <li class="nav-item"><a class="nav-link active" href="#" onclick="return switchMgrTab('injection',this)"><i class="bi bi-box-seam me-1"></i>啤办单</a></li>
      <li class="nav-item"><a class="nav-link" href="#" onclick="return switchMgrTab('assembly',this)"><i class="bi bi-gear-wide-connected me-1"></i>夹具单</a></li>
    </ul>

    <!-- 筛选 -->
    <div class="d-flex flex-wrap gap-2 mb-3 align-items-center">
      <div class="status-filter d-flex flex-wrap gap-1">
        <button class="btn btn-sm btn-outline-secondary active" onclick="filterStatus('',this)">全部</button>
        <button class="btn btn-sm" style="background:#fd7e14;color:#fff;border-color:#fd7e14" onclick="filterStatus('待审核',this)">待审核</button>
        <button class="btn btn-sm" style="background:#7c3aed;color:#fff;border-color:#7c3aed" onclick="filterStatus('待经理审核',this)">待经理审核</button>
        <button class="btn btn-sm btn-warning"  onclick="filterStatus('待生产',this)">待生产</button>
        <button class="btn btn-sm btn-info"     onclick="filterStatus('生产中',this)">生产中</button>
        <button class="btn btn-sm btn-success"  onclick="filterStatus('已完成',this)">已完成</button>
        <button class="btn btn-sm btn-danger"   onclick="filterStatus('已驳回',this)">已驳回</button>
      </div>
      <button class="btn btn-sm btn-outline-secondary ms-auto" onclick="loadOrders()">
        <i class="bi bi-arrow-clockwise me-1"></i>刷新
      </button>
    </div>

    <div class="card shadow-sm">
      <div class="card-body p-0">
        <div id="orderList"><div class="text-center p-4 text-muted">加载中...</div></div>
      </div>
    </div>
  </div>
</div>

<!-- ─── 审核 Modal ───────────────────────────────────────────────────────────── -->
<div class="modal fade" id="reviewModal" tabindex="-1" data-bs-backdrop="static">
  <div class="modal-dialog modal-xl modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header" style="background:#7c3aed;color:#fff">
        <h5 class="modal-title"><i class="bi bi-person-badge me-2"></i>经理审核 — <span id="reviewLabel"></span></h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="reviewDetails"><div class="text-center text-muted py-4">加载中...</div></div>
        <hr class="my-3">
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label fw-bold">驳回原因 <span class="text-muted fw-normal small">（审核通过时可留空）</span></label>
            <input type="text" id="rejectReason" class="form-control" placeholder="请说明驳回原因">
          </div>
        </div>
      </div>
      <div class="modal-footer justify-content-between">
        <button class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
        <div class="d-flex gap-2">
          <button class="btn btn-danger"  onclick="submitReview('reject')"><i class="bi bi-x-circle me-1"></i>驳回</button>
          <button class="btn btn-success" onclick="submitReview('approve')"><i class="bi bi-check-circle me-1"></i>审核通过</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ─── 重置主管密码 Modal ───────────────────────────────────────────────────── -->
<div class="modal fade" id="resetPinModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header" style="background:#7c3aed;color:#fff">
        <h5 class="modal-title"><i class="bi bi-key me-2"></i>重置主管 PIN 密码</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="alert alert-info small mb-3">
          <i class="bi bi-info-circle me-1"></i>重置后主管登录时将被强制修改为自己的新 PIN。
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">选择主管</label>
          <select id="resetTarget" class="form-select"></select>
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">新 PIN 码（4-8 位）</label>
          <input type="text" id="resetNewPin" class="form-control" maxlength="8" placeholder="例如 1234" autocomplete="off">
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">经理 PIN 确认</label>
          <input type="password" id="resetMgrPin" class="form-control" maxlength="8" placeholder="重新输入经理 PIN" autocomplete="off">
        </div>
        <div id="resetPinError" class="text-danger small d-none"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
        <button class="btn btn-primary" style="background:#7c3aed;border-color:#7c3aed" onclick="submitResetPin()">
          <i class="bi bi-check-circle me-1"></i>确认重置
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ─── 价格表管理 Modal ──────────────────────────────────────────────────── -->
<div class="modal fade" id="priceTableModal" tabindex="-1" data-bs-backdrop="static">
  <div class="modal-dialog modal-xl modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header" style="background:#7c3aed;color:#fff">
        <h5 class="modal-title"><i class="bi bi-table me-2"></i>原料价格表管理</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="d-flex gap-2 mb-3 align-items-center">
          <input id="ptSearch" class="form-control form-control-sm" style="max-width:240px" placeholder="搜索原料名..." oninput="renderPriceTable()">
          <div class="form-check">
            <input type="checkbox" id="ptOnlyMissing" class="form-check-input" onchange="renderPriceTable()">
            <label for="ptOnlyMissing" class="form-check-label small">只看未录入价格</label>
          </div>
          <button class="btn btn-sm btn-outline-primary ms-auto" onclick="addPriceRow()">
            <i class="bi bi-plus-circle me-1"></i>新增原料
          </button>
          <span id="ptStats" class="small text-muted"></span>
        </div>
        <div class="table-responsive" style="max-height:60vh">
          <table class="table table-sm table-hover align-middle">
            <thead class="table-light sticky-top">
              <tr>
                <th style="width:50px">#</th>
                <th>原料名</th>
                <th style="width:160px">单价 (HKD/磅)</th>
                <th>备注</th>
                <th style="width:60px"></th>
              </tr>
            </thead>
            <tbody id="priceTableBody"></tbody>
          </table>
        </div>
        <div id="priceTableError" class="text-danger small d-none"></div>
      </div>
      <div class="modal-footer flex-column align-items-stretch">
        <div class="mb-2">
          <label class="form-label fw-bold small mb-1">经理 PIN 确认（保存并回填需验证）</label>
          <input type="password" id="ptMgrPin" class="form-control form-control-sm" maxlength="8" placeholder="请输入经理 PIN" autocomplete="off">
        </div>
        <div class="d-flex justify-content-end gap-2">
          <button class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
          <button class="btn btn-primary" style="background:#7c3aed;border-color:#7c3aed" onclick="savePriceTable()">
            <i class="bi bi-check-circle me-1"></i>保存并回填
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ─── 料费重算 Modal ──────────────────────────────────────────────────── -->
<div class="modal fade" id="recalcModal" tabindex="-1" data-bs-backdrop="static">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header" style="background:#7c3aed;color:#fff">
        <h5 class="modal-title"><i class="bi bi-calculator me-2"></i>料费重算</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p class="small text-muted mb-3">将根据最新原料价格表，重新计算所有未完成订单的料费金额。</p>
        <div class="mb-3">
          <label class="form-label fw-bold">经理 PIN 确认</label>
          <input type="password" id="recalcMgrPin" class="form-control" maxlength="8" placeholder="请输入经理 PIN" autocomplete="off">
        </div>
        <div id="recalcError" class="text-danger small d-none"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
        <button class="btn btn-primary" style="background:#7c3aed;border-color:#7c3aed" onclick="submitRecalc()">
          <i class="bi bi-check-circle me-1"></i>确认重算
        </button>
      </div>
    </div>
  </div>
</div>


<!-- Toast -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index:9999">
  <div id="toast" class="toast align-items-center text-white border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toastMsg">操作成功</div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="./vendor/bootstrap.bundle.min.js"></script>
<script src="utils.js"></script>
<script>
// PIN 已移至服务端验证，前端不存储任何 PIN
const MANAGER_NAME = '易东存';

// ─── 登录逻辑 ─────────────────────────────────────────────────────────────────
let currentManager = null;
let currentFilter = '';
let mgrTab = 'injection'; // 'injection' | 'assembly'

function switchMgrTab(tab, el) {
  mgrTab = tab;
  document.querySelectorAll('#mgrTabs .nav-link').forEach(a => a.classList.remove('active'));
  el.classList.add('active');
  currentFilter = '';
  document.querySelectorAll('.status-filter .btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.status-filter .btn').classList.add('active');
  loadOrders();
  return false;
}

async function doLogin() {
  const pin = document.getElementById('loginPin').value;
  if (!pin) {
    document.getElementById('loginError').classList.remove('d-none');
    document.getElementById('loginPin').focus();
    return;
  }
  try {
    const r = await apiFetch('/api/verify-pin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: MANAGER_NAME, pin, role: 'manager' })
    });
    const d = await r.json();
    if (!d.success) {
      document.getElementById('loginError').classList.remove('d-none');
      document.getElementById('loginPin').value = '';
      document.getElementById('loginPin').focus();
      return;
    }
    currentManager = MANAGER_NAME;
    sessionStorage.setItem('mgr_name', MANAGER_NAME);
    sessionStorage.setItem('mgr_pin', pin);
    document.getElementById('loginError').classList.add('d-none');
    showDashboard();
  } catch (e) {
    document.getElementById('loginError').classList.remove('d-none');
  }
}

function doLogout() {
  stopNotifyPolling();
  currentManager = null;
  sessionStorage.removeItem('mgr_name');
  sessionStorage.removeItem('mgr_pin');
  document.getElementById('loginSection').style.display = '';
  document.getElementById('dashSection').style.display = 'none';
  document.getElementById('loginPin').value = '';
}

function showDashboard() {
  document.getElementById('loginSection').style.display = 'none';
  document.getElementById('dashSection').style.display = '';
  document.getElementById('dashName').textContent = currentManager;
  loadOrders();
  startNotifyPolling();
}

// ─── 状态 ─────────────────────────────────────────────────────────────────────
const statusBadge = s => ({
  '待审核': '<span class="badge" style="background:#fd7e14">待审核</span>',
  '待经理审核': '<span class="badge" style="background:#7c3aed">待经理审核</span>',
  '待生产': '<span class="badge badge-pending">待生产</span>',
  '生产中': '<span class="badge badge-progress">生产中</span>',
  '已完成': '<span class="badge badge-done">已完成</span>',
  '已取消': '<span class="badge bg-secondary">已取消</span>',
  '已驳回': '<span class="badge bg-danger">已驳回</span>',
}[s] || `<span class="badge bg-secondary">${esc(s)}</span>`);

function filterStatus(status, el) {
  currentFilter = status;
  document.querySelectorAll('.status-filter .btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  loadOrders();
}

// ─── 订单列表 ─────────────────────────────────────────────────────────────────
function loadOrders() {
  document.getElementById('orderList').innerHTML = '<div class="text-center p-4 text-muted">加载中...</div>';
  apiFetch(`/api/${mgrTab}`)
    .then(r => r.json())
    .then(orders => {
      if (currentFilter) orders = orders.filter(o => o.status === currentFilter);
      orders.sort((a, b) => {
        const so = { '待审核':0,'待经理审核':1,'待生产':2,'生产中':3,'已完成':4,'已驳回':5 };
        const oa = so[a.status] ?? 9, ob = so[b.status] ?? 9;
        if (oa !== ob) return oa - ob;
        return b.id - a.id;
      });
      if (mgrTab === 'assembly') renderAssemblyOrders(orders);
      else renderOrders(orders);
    })
    .catch(() => showToast('加载失败', 'danger'));
}

function renderOrders(orders) {
  if (!orders.length) {
    document.getElementById('orderList').innerHTML =
      `<div class="text-center p-5 text-muted"><i class="bi bi-inbox fs-1"></i><p class="mt-2">暂无单据</p></div>`;
    return;
  }
  const rows = orders.map(o => `
    <tr style="cursor:pointer" onclick="openReview(${o.id},'${(o.order_number||'').replace(/'/g,'')}',true)">
      <td><strong>${esc(o.order_number || '-')}</strong></td>
      <td>${esc(o.date || '-')}</td>
      <td>${esc(o.order_type || '-')}</td>
      <td>${esc(o.workshop || '-')}${o.send_to ? ' <span class="badge bg-info text-dark">'+esc(o.send_to)+'</span>' : ''}</td>
      <td>${esc(o.supervisor || '-')}</td>
      <td>${esc(o.eng_name || '-')}</td>
      <td>${esc(o.reason || '-')}</td>
      <td>${statusBadge(o.status)}</td>
      <td onclick="event.stopPropagation()">
        <div class="btn-group btn-group-sm">
          ${(o.status === '待审核' || o.status === '待经理审核')
            ? `<button class="btn ${o.status === '待经理审核' ? 'btn-primary' : 'btn-warning'} fw-bold" onclick="openReview(${o.id},'${(o.order_number||'').replace(/'/g,'')}')">
                <i class="bi bi-person-badge me-1"></i>审核
               </button>`
            : ''}
          <button class="btn btn-outline-secondary" onclick="openReview(${o.id},'${(o.order_number||'').replace(/'/g,'')}',true)" title="查看详情">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </td>
    </tr>`).join('');

  document.getElementById('orderList').innerHTML = `
    <table class="table table-hover table-sm mb-0">
      <thead class="table-dark">
        <tr>
          <th>产品编号</th><th>日期</th><th>类型</th><th>车间</th>
          <th>主管</th><th>跟进工程师</th><th>原因/备注</th><th>状态</th><th>操作</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function renderAssemblyOrders(orders) {
  if (!orders.length) {
    document.getElementById('orderList').innerHTML =
      `<div class="text-center p-5 text-muted"><i class="bi bi-inbox fs-1"></i><p class="mt-2">暂无单据</p></div>`;
    return;
  }
  const rows = orders.map(o => {
    const itemCount = (o.items || []).length;
    return `
    <tr style="cursor:pointer" onclick="openReview(${o.id},'${(o.order_number||'').replace(/'/g,'')}',true)">
      <td><strong>${esc(o.order_number || '-')}</strong></td>
      <td>${esc(o.client_name || '-')}</td>
      <td class="text-center">${itemCount}</td>
      <td>${esc(o.created_by || '-')}</td>
      <td>${statusBadge(o.status)}</td>
      <td onclick="event.stopPropagation()">
        <div class="btn-group btn-group-sm">
          ${(o.status === '待审核' || o.status === '待经理审核')
            ? `<button class="btn ${o.status === '待经理审核' ? 'btn-primary' : 'btn-warning'} fw-bold" onclick="openReview(${o.id},'${(o.order_number||'').replace(/'/g,'')}')">
                <i class="bi bi-person-badge me-1"></i>审核
               </button>`
            : ''}
          <button class="btn btn-outline-secondary" onclick="openReview(${o.id},'${(o.order_number||'').replace(/'/g,'')}',true)" title="查看详情">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('orderList').innerHTML = `
    <table class="table table-hover table-sm mb-0">
      <thead class="table-dark">
        <tr>
          <th>货号</th><th>客名</th><th>夹具数</th><th>申请人</th><th>状态</th><th>操作</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ─── 审核弹窗 ─────────────────────────────────────────────────────────────────
let reviewingId = null;
let reviewingTab = 'injection';
let viewOnly = false;

function openReview(id, orderNum, isViewOnly = false) {
  reviewingId = id;
  reviewingTab = mgrTab;
  viewOnly = isViewOnly;
  document.getElementById('reviewLabel').textContent = orderNum || `#${id}`;
  document.getElementById('rejectReason').value = '';
  document.getElementById('reviewDetails').innerHTML = '<div class="text-center text-muted py-4">加载中...</div>';

  document.querySelector('#reviewModal .modal-footer .btn-danger').style.display  = isViewOnly ? 'none' : '';
  document.querySelector('#reviewModal .modal-footer .btn-success').style.display = isViewOnly ? 'none' : '';
  document.getElementById('rejectReason').closest('.row').style.display = isViewOnly ? 'none' : '';

  new bootstrap.Modal(document.getElementById('reviewModal')).show();

  apiFetch(`/api/${reviewingTab}/${id}`)
    .then(r => r.json())
    .then(order => {
      document.getElementById('reviewDetails').innerHTML =
        reviewingTab === 'assembly' ? renderAssemblyDetails(order) : renderDetails(order);
    })
    .catch(() => {
      document.getElementById('reviewDetails').innerHTML = '<div class="text-danger">加载失败</div>';
    });
}

function renderDetails(order) {
  const header = `
    <div class="row g-2 mb-3 p-2 rounded" style="background:#f3e8ff">
      <div class="col-6 col-md-3"><small class="text-muted">产品编号</small><div class="fw-bold">${esc(order.order_number||'-')}</div></div>
      <div class="col-6 col-md-3"><small class="text-muted">日期</small><div>${esc(order.date||'-')}</div></div>
      <div class="col-6 col-md-3"><small class="text-muted">类型</small><div>${esc(order.order_type||'-')}</div></div>
      <div class="col-6 col-md-3"><small class="text-muted">车间</small><div>${esc(order.workshop||'-')}${order.send_to ? ' <span class="badge bg-info text-dark">'+esc(order.send_to)+'</span>' : ''}</div></div>
      <div class="col-6 col-md-3"><small class="text-muted">主管</small><div>${esc(order.supervisor||'-')}</div></div>
      <div class="col-6 col-md-3"><small class="text-muted">跟进工程师</small><div>${esc(order.eng_name||'-')}</div></div>
      <div class="col-6 col-md-3"><small class="text-muted">状态</small><div>${statusBadge(order.status)}</div></div>
      ${order.reason ? `<div class="col-12"><small class="text-muted">原因/备注</small><div>${esc(order.reason)}</div></div>` : ''}
    </div>`;

  const items = order.items || [];
  if (!items.length) return header + '<div class="text-muted small">（无明细行）</div>';

  const thead = '<tr><th>工模编号</th><th>工模名称</th><th>机型</th><th>原料</th><th>颜色</th><th>色粉编号</th><th>件数/套数</th><th>数量(啤)</th><th>整啤毛重(g)</th><th>所需用料(KG)</th><th>模具回厂时间</th><th>啤办完成时间</th><th>备注</th></tr>';
  const rows = items.map(it => `<tr>
    <td>${esc(it.mold_id||'-')}</td><td>${esc(it.mold_name||'-')}</td><td>${esc(it.machine_type||'-')}</td><td>${esc(it.material||'-')}</td>
    <td>${esc(it.color||'-')}</td><td>${esc(it.pigment_no||'-')}</td><td>${esc(it.quantity||'-')}</td>
    <td>${esc(it.shoot_qty||'-')}</td><td>${esc(it.gross_weight_g||'-')}</td><td>${esc(it.required_material_kg||'-')}</td>
    <td>${esc(it.mold_return_time||'-')}</td><td>${esc(it.completion_time||'-')}</td><td>${esc(it.notes||'-')}</td>
  </tr>`).join('');

  return header + `<div class="table-responsive"><table class="table table-bordered table-sm"><thead class="table-light">${thead}</thead><tbody>${rows}</tbody></table></div>`;
}

function renderAssemblyDetails(order) {
  const header = `
    <div class="row g-2 mb-3 p-2 rounded" style="background:#f3e8ff">
      <div class="col-6 col-md-3"><small class="text-muted">货号</small><div class="fw-bold">${esc(order.order_number||'-')}</div></div>
      <div class="col-6 col-md-3"><small class="text-muted">客名</small><div>${esc(order.client_name||'-')}</div></div>
      <div class="col-6 col-md-3"><small class="text-muted">申请人</small><div>${esc(order.created_by||'-')}</div></div>
      <div class="col-6 col-md-3"><small class="text-muted">状态</small><div>${statusBadge(order.status)}</div></div>
      ${order.reason ? `<div class="col-12"><small class="text-muted">备注</small><div>${esc(order.reason)}</div></div>` : ''}
      ${order.reject_reason ? `<div class="col-12"><small class="text-muted text-danger">驳回原因</small><div class="text-danger fw-bold">${esc(order.reject_reason)}</div></div>` : ''}
    </div>`;

  const items = order.items || [];
  if (!items.length) return header + '<div class="text-muted small">（无明细行）</div>';

  const thead = '<tr><th>序号</th><th>名称</th><th>数量</th><th>日期</th><th>备注</th><th>完成时间</th></tr>';
  const rows = items.map((it, i) => `<tr>
    <td>${i+1}</td><td>${esc(it.product_name||'-')}</td><td>${esc(it.quantity||'-')}</td>
    <td>${esc(it.required_date||'-')}</td><td>${esc(it.notes||'-')}</td><td>${esc(it.completion_time||'-')}</td>
  </tr>`).join('');

  return header + `<div class="table-responsive"><table class="table table-bordered table-sm"><thead class="table-light">${thead}</thead><tbody>${rows}</tbody></table></div>`;
}

async function submitReview(action) {
  const rejectReason = document.getElementById('rejectReason').value.trim();
  const newStatus = action === 'approve' ? '待生产' : '已驳回';
  const pin = sessionStorage.getItem('mgr_pin') || '';

  try {
    if (action === 'reject') {
      const order = await (await apiFetch(`/api/${reviewingTab}/${reviewingId}`)).json();
      const { items, ...header } = order;
      await apiFetch(`/api/${reviewingTab}/${reviewingId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...header, status: newStatus, reason: rejectReason, items })
      });
    } else {
      const resp = await apiFetch(`/api/${reviewingTab}/${reviewingId}/status`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: newStatus, pin, reviewer_name: MANAGER_NAME, reviewer_role: 'manager' })
      });
      const result = await resp.json();
      if (result.error) { showToast(result.error, 'danger'); return; }
      if (result.auto_completed) {
        bootstrap.Modal.getInstance(document.getElementById('reviewModal'))?.hide();
        showToast('经理审核通过！发至模厂订单已自动完成并计算料费', 'success');
        loadOrders();
        checkPendingReviews();
        return;
      }
    }
    bootstrap.Modal.getInstance(document.getElementById('reviewModal'))?.hide();
    showToast(action === 'approve' ? '经理审核通过！单据已进入待生产' : '已驳回', action === 'approve' ? 'success' : 'danger');
    loadOrders();
    checkPendingReviews();
  } catch (e) {
    showToast('操作失败', 'danger');
  }
}

// ─── 通知系统 ─────────────────────────────────────────────────────────────────
let lastPendingCount = -1;
let notifyTimer = null;

function playNotifySound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.2, 0.4].forEach((delay, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = [880, 1100, 1320][i];
      gain.gain.setValueAtTime(0.3, ctx.currentTime + delay);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + delay + 0.15);
      osc.start(ctx.currentTime + delay);
      osc.stop(ctx.currentTime + delay + 0.15);
    });
  } catch (e) {}
}

function updateNotification(count) {
  const badge = document.getElementById('navBadge');
  const bar = document.getElementById('notifyBar');
  const text = document.getElementById('notifyText');

  if (count > 0) {
    badge.textContent = count;
    badge.style.display = '';
    bar.style.display = '';
    text.textContent = `您有 ${count} 条待审核订单`;
    document.title = `(${count}) 经理审核入口`;
    if (lastPendingCount >= 0 && count > lastPendingCount) {
      playNotifySound();
    }
  } else {
    badge.style.display = 'none';
    bar.style.display = 'none';
    document.title = '经理审核入口';
  }
  lastPendingCount = count;
}

function checkPendingReviews() {
  if (!currentManager) return;
  apiFetch('/api/pending-reviews?role=manager')
    .then(r => r.json())
    .then(d => updateNotification(d.count))
    .catch(() => {});
}

function startNotifyPolling() {
  checkPendingReviews();
  if (notifyTimer) clearInterval(notifyTimer);
  notifyTimer = setInterval(checkPendingReviews, 30000);
}

function stopNotifyPolling() {
  if (notifyTimer) { clearInterval(notifyTimer); notifyTimer = null; }
  lastPendingCount = -1;
  document.title = '经理审核入口';
}

// ─── 工具 ─────────────────────────────────────────────────────────────────────
function showToast(msg, type = 'success') {
  const el = document.getElementById('toast');
  const colors = { success: '#198754', danger: '#dc3545', warning: '#ffc107' };
  el.style.background = colors[type] || '#333';
  document.getElementById('toastMsg').textContent = msg;
  new bootstrap.Toast(el, { delay: 2500 }).show();
}

// ─── 自动恢复登录 session ──────────────────────────────────────────────────────
const saved = sessionStorage.getItem('mgr_name');
const savedPin = sessionStorage.getItem('mgr_pin');
if (saved === MANAGER_NAME && savedPin) {
  apiFetch('/api/verify-pin', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: MANAGER_NAME, pin: savedPin, role: 'manager' })
  }).then(r => r.json()).then(d => {
    if (d.success) {
      currentManager = saved;
      showDashboard();
    } else {
      sessionStorage.removeItem('mgr_name');
      sessionStorage.removeItem('mgr_pin');
    }
  });
}

// ─── 重置主管 PIN ────────────────────────────────────────────────────────────
async function openResetPinModal() {
  const sel = document.getElementById('resetTarget');
  sel.innerHTML = '<option value="">加载中...</option>';
  document.getElementById('resetNewPin').value = '';
  document.getElementById('resetPinError').classList.add('d-none');
  try {
    const r = await apiFetch('/api/roles');
    const d = await r.json();
    sel.innerHTML = '<option value="">-- 请选择 --</option>' +
      (d.supervisors || []).map(n => `<option value="${n}">${n}</option>`).join('');
  } catch (e) {
    sel.innerHTML = '<option value="">加载失败</option>';
  }
  new bootstrap.Modal(document.getElementById('resetPinModal')).show();
}

async function submitResetPin() {
  const target = document.getElementById('resetTarget').value;
  const newPin = document.getElementById('resetNewPin').value.trim();
  const managerPin = document.getElementById('resetMgrPin').value.trim();
  const err = document.getElementById('resetPinError');
  err.classList.add('d-none');
  if (!target) { err.textContent = '请选择主管'; err.classList.remove('d-none'); return; }
  if (newPin.length < 4 || newPin.length > 8) { err.textContent = '新 PIN 需 4-8 位'; err.classList.remove('d-none'); return; }
  if (!managerPin) { err.textContent = '请输入经理 PIN'; err.classList.remove('d-none'); return; }
  try {
    const r = await apiFetch('/api/reset-supervisor-pin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        manager_name: MANAGER_NAME,
        manager_pin: managerPin,
        target_name: target,
        new_pin: newPin
      })
    });
    const d = await r.json();
    if (!r.ok || !d.success) {
      err.textContent = d.error || '重置失败';
      err.classList.remove('d-none');
      return;
    }
    bootstrap.Modal.getInstance(document.getElementById('resetPinModal')).hide();
    document.getElementById('resetMgrPin').value = '';
    showToast(`已重置 ${target} 的 PIN，首次登录需修改`);
  } catch (e) {
    err.textContent = '网络错误';
    err.classList.remove('d-none');
  }
}

// ─── 价格表管理 ────────────────────────────────────────────────────────────
let _priceRows = [];
async function openPriceTableModal() {
  document.getElementById('priceTableError').classList.add('d-none');
  document.getElementById('ptSearch').value = '';
  document.getElementById('ptOnlyMissing').checked = false;
  document.getElementById('ptMgrPin').value = '';
  try {
    const r = await apiFetch('/api/material-prices');
    _priceRows = (await r.json()).map(p => ({
      material: p.material || '',
      unit_price: +(p.unit_price || 0),
      notes: p.notes || ''
    }));
  } catch (e) { _priceRows = []; }
  renderPriceTable();
  new bootstrap.Modal(document.getElementById('priceTableModal')).show();
}

function renderPriceTable() {
  const q = (document.getElementById('ptSearch').value || '').toLowerCase();
  const onlyMissing = document.getElementById('ptOnlyMissing').checked;
  const body = document.getElementById('priceTableBody');
  const filtered = _priceRows.map((p, idx) => ({ ...p, _idx: idx }))
    .filter(p => !q || p.material.toLowerCase().includes(q))
    .filter(p => !onlyMissing || !(+p.unit_price > 0));
  const missingCount = _priceRows.filter(p => !(+p.unit_price > 0)).length;
  document.getElementById('ptStats').textContent = `共 ${_priceRows.length} 项，未录入 ${missingCount} 项`;
  body.innerHTML = filtered.map(p => `
    <tr class="${!(+p.unit_price > 0) ? 'table-warning' : ''}">
      <td class="text-muted small">${p._idx + 1}</td>
      <td><input class="form-control form-control-sm" value="${esc(p.material)}"
                 oninput="_priceRows[${p._idx}].material=this.value"></td>
      <td><input type="number" step="0.0001" min="0" class="form-control form-control-sm"
                 value="${+p.unit_price || ''}" placeholder="未录入"
                 oninput="_priceRows[${p._idx}].unit_price=+this.value||0;this.closest('tr').classList.toggle('table-warning',!(+this.value>0))"></td>
      <td><input class="form-control form-control-sm" value="${esc(p.notes)}"
                 oninput="_priceRows[${p._idx}].notes=this.value"></td>
      <td><button class="btn btn-sm btn-outline-danger" onclick="removePriceRow(${p._idx})"><i class="bi bi-trash"></i></button></td>
    </tr>
  `).join('') || '<tr><td colspan="5" class="text-center text-muted py-3">无匹配项</td></tr>';
}

function addPriceRow() {
  _priceRows.push({ material: '', unit_price: 0, notes: '' });
  document.getElementById('ptOnlyMissing').checked = false;
  renderPriceTable();
  setTimeout(() => {
    const inputs = document.querySelectorAll('#priceTableBody tr:last-child input');
    if (inputs[0]) inputs[0].focus();
  }, 50);
}

function removePriceRow(idx) {
  if (!confirm(`删除「${_priceRows[idx].material || '(空)'}」？`)) return;
  _priceRows.splice(idx, 1);
  renderPriceTable();
}

async function savePriceTable() {
  const err = document.getElementById('priceTableError');
  err.classList.add('d-none');
  const clean = _priceRows.filter(p => p.material && p.material.trim());
  const names = clean.map(p => p.material.trim().toLowerCase());
  const dup = names.find((n, i) => names.indexOf(n) !== i);
  if (dup) { err.textContent = `存在重复原料名：${dup}`; err.classList.remove('d-none'); return; }
  const managerPin = (document.getElementById('ptMgrPin').value || '').trim();
  if (!managerPin) { err.textContent = '请输入经理 PIN'; err.classList.remove('d-none'); return; }
  try {
    const r = await apiFetch('/api/manager-update-prices', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ manager_name: MANAGER_NAME, manager_pin: managerPin, prices: clean })
    });
    const d = await r.json();
    if (!r.ok || !d.success) { err.textContent = d.error || '保存失败'; err.classList.remove('d-none'); return; }
    bootstrap.Modal.getInstance(document.getElementById('priceTableModal')).hide();
    document.getElementById('ptMgrPin').value = '';
    showToast(d.backfilled > 0
      ? `已保存 ${d.total} 项价格，回填 ${d.backfilled} 条历史明细`
      : `已保存 ${d.total} 项价格`);
  } catch (e) {
    err.textContent = '网络错误';
    err.classList.remove('d-none');
  }
}

// ─── 料费重算（按当前价格表回填金额=0 的历史明细） ──────────────────────────
function openRecalcModal() {
  document.getElementById('recalcError').classList.add('d-none');
  document.getElementById('recalcMgrPin').value = '';
  new bootstrap.Modal(document.getElementById('recalcModal')).show();
}

async function submitRecalc() {
  const err = document.getElementById('recalcError');
  err.classList.add('d-none');
  const managerPin = (document.getElementById('recalcMgrPin').value || '').trim();
  if (!managerPin) { err.textContent = '请输入经理 PIN'; err.classList.remove('d-none'); return; }
  try {
    const r = await apiFetch('/api/recalc-amounts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ manager_name: MANAGER_NAME, manager_pin: managerPin })
    });
    const d = await r.json();
    if (!r.ok || !d.success) { err.textContent = d.error || '重算失败'; err.classList.remove('d-none'); return; }
    bootstrap.Modal.getInstance(document.getElementById('recalcModal')).hide();
    document.getElementById('recalcMgrPin').value = '';
    const msg = d.backfilled > 0
      ? `已回填 ${d.backfilled} 条料费` + (d.missing_price > 0 ? `（${d.missing_price} 条仍缺价格）` : '')
      : '没有需要回填的明细' + (d.missing_price > 0 ? `（${d.missing_price} 条缺价格）` : '');
    showToast(msg, 'primary');
  } catch (e) {
    err.textContent = '网络错误';
    err.classList.remove('d-none');
  }
}
