<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>喷油部 - 生产订单</title>
  <link href="./vendor/bootstrap.min.css" rel="stylesheet">
  <link href="./vendor/bootstrap-icons.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
  <style>
    .proc-done { color:#0f5132; background:#d1e7dd; border-radius:4px; padding:1px 6px; font-size:.75rem; }
    .proc-pending { color:#664d03; background:#fff3cd; border-radius:4px; padding:1px 6px; font-size:.75rem; cursor:pointer; }
    .proc-pending:hover { background:#ffe69c; }
  </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark" style="background:#8e44ad">
  <div class="container-fluid">
    <span class="navbar-brand"><i class="bi bi-palette me-2"></i>喷油部 — 生产任务单</span>
    <div class="d-flex gap-2">
      <a href="index.html"       class="nav-dept-link"><i class="bi bi-house me-1"></i>主页</a>
      <a href="engineering.html" class="nav-dept-link">工程部</a>
      <a href="injection.html"   class="nav-dept-link">啤机部</a>
      <a href="slush.html"       class="nav-dept-link">搪胶部</a>
    </div>
  </div>
</nav>

<div class="container-fluid mt-3">
  <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-3">
    <div class="d-flex flex-wrap gap-2 align-items-center">
      <select id="workshopFilter" class="form-select form-select-sm" style="width:auto" onchange="applyFilters()">
        <option value="">全部车间</option>
        <option value="兴信车间">兴信车间</option>
        <option value="华登车间">华登车间</option>
      </select>
      <div class="status-filter d-flex flex-wrap gap-1">
        <button class="btn btn-sm btn-outline-secondary active" onclick="filterStatus('',this)">全部</button>
        <button class="btn btn-sm btn-warning"  onclick="filterStatus('待生产',this)">待生产</button>
        <button class="btn btn-sm btn-info"     onclick="filterStatus('生产中',this)">生产中</button>
        <button class="btn btn-sm btn-success"  onclick="filterStatus('已完成',this)">已完成</button>
      </div>
    </div>
    <small class="text-muted"><i class="bi bi-arrow-clockwise me-1"></i>每30秒自动刷新</small>
  </div>

  <div class="card shadow-sm">
    <div class="card-body p-0">
      <div id="orderList"><div class="text-center p-4 text-muted">加载中...</div></div>
    </div>
  </div>
</div>

<!-- 详情 Modal -->
<div class="modal fade" id="detailModal" tabindex="-1">
  <div class="modal-dialog modal-xl modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header" style="background:#8e44ad;color:#fff">
        <h5 class="modal-title" id="detailTitle">喷油单详情</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="detailBody"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
        <button class="btn btn-outline-primary" id="detailPrintBtn"><i class="bi bi-printer me-1"></i>打印</button>
      </div>
    </div>
  </div>
</div>

<!-- 进度更新 Modal -->
<div class="modal fade" id="progressModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header bg-success text-white">
        <h5 class="modal-title"><i class="bi bi-check-circle me-2"></i>工序进度</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p class="mb-2"><strong id="pgItemName"></strong></p>
        <div id="pgProcessList" class="mb-3"></div>
        <label class="form-label fw-bold">操作人 <span class="text-danger">*</span></label>
        <input type="text" id="pgOperator" class="form-control" placeholder="请输入姓名" autocomplete="off">
        <div id="pgError" class="text-danger small mt-1 d-none"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
        <button class="btn btn-success" onclick="confirmProgress()"><i class="bi bi-check-lg me-1"></i>保存</button>
      </div>
    </div>
  </div>
</div>

<!-- 问题反馈 Modal -->
<div class="modal fade" id="problemModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-danger text-white">
        <h5 class="modal-title"><i class="bi bi-exclamation-triangle-fill me-2"></i>问题反馈 — <span id="pmOrderNum"></span></h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="pmProblemsList" class="mb-3"></div>
        <hr class="my-2">
        <label class="form-label fw-bold">反馈新问题</label>
        <textarea class="form-control" id="pmDescription" rows="3" placeholder="请描述具体问题，例如：颜色不对、漏喷、油漆起皱..."></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
        <button class="btn btn-danger" onclick="submitProblem()">
          <i class="bi bi-exclamation-triangle me-1"></i>提交问题
        </button>
      </div>
    </div>
  </div>
</div>

<script src="./vendor/bootstrap.bundle.min.js"></script>
<script src="utils.js"></script>
<script>
let allOrders = [];
let problemsMap = {};
let currentFilter = '';

const statusBadge = s => ({
  '待生产': '<span class="badge badge-pending">待生产</span>',
  '生产中': '<span class="badge badge-progress">生产中</span>',
  '已完成': '<span class="badge badge-done">已完成</span>',
  '已取消': '<span class="badge bg-secondary">已取消</span>'
}[s] || `<span class="badge bg-secondary">${esc(s)}</span>`);

function filterStatus(status, el) {
  currentFilter = status;
  document.querySelectorAll('.status-filter .btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}
function applyFilters() {
  let filtered = allOrders;
  const ws = document.getElementById('workshopFilter')?.value || '';
  if (ws) filtered = filtered.filter(o => o.workshop === ws);
  if (currentFilter) filtered = filtered.filter(o => o.status === currentFilter);
  renderOrders(filtered);
}

function loadOrders() {
  Promise.all([
    apiFetch('/api/spray').then(r => r.json()),
    apiFetch('/api/problems?type=spray').then(r => r.json())
  ]).then(([orders, problems]) => {
    allOrders = orders;
    problemsMap = {};
    problems.filter(p => p.status === '待处理').forEach(p => {
      problemsMap[p.order_id] = (problemsMap[p.order_id] || 0) + 1;
    });
    applyFilters();
  }).catch(() => {
    document.getElementById('orderList').innerHTML = '<div class="text-center p-4 text-danger">加载失败，请刷新页面</div>';
  });
}

function renderOrders(orders) {
  if (!orders.length) {
    document.getElementById('orderList').innerHTML = `<div class="empty-state"><i class="bi bi-inbox"></i><p class="mt-2">暂无喷油任务</p></div>`;
    return;
  }
  // 展平：每个明细行一行
  const rows = [];
  orders.forEach(o => {
    const items = o.items || [];
    if (!items.length) {
      rows.push(`
        <tr class="order-row" onclick="viewOrder(${o.id})">
          <td>${esc(o.workshop||'-')}</td>
          <td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td>
          <td>-</td><td>-</td>
          <td>${statusBadge(o.status)} ${problemsMap[o.id]?`<span class="badge bg-danger ms-1">${problemsMap[o.id]}问题</span>`:''}</td>
          <td><div class="btn-group btn-group-sm">
            <button class="btn btn-outline-danger" onclick="event.stopPropagation();openProblemModal(${o.id},'${(o.order_number||'').replace(/'/g,'')}')" title="问题反馈"><i class="bi bi-exclamation-triangle"></i></button>
            <button class="btn btn-outline-secondary" onclick="event.stopPropagation();printOrder(${o.id})"><i class="bi bi-printer"></i></button>
          </div></td>
        </tr>`);
      return;
    }
    items.forEach((it, idx) => {
      rows.push(`
        <tr class="order-row" onclick="viewOrder(${o.id})">
          <td>${idx===0 ? esc(o.workshop||'-') : ''}</td>
          <td>${esc(it.client_name||'-')}</td>
          <td>${esc(it.product_name||'-')}</td>
          <td>${esc(it.part_name||'-')}</td>
          <td>${esc(it.process||'-')}</td>
          <td>${esc(it.sample_qty||'-')}</td>
          <td>${esc(it.provide_time||'-')}</td>
          <td>${esc(it.receive_time || o.actual_receive_time || '-')}</td>
          <td>${esc(it.eng_complete_time||'-')}</td>
          <td>${esc(it.delivery_time||'-')}</td>
          <td>${esc(it.engineer||'-')}</td>
          <td>${esc(it.follower||'-')}</td>
          <td>${idx===0 ? esc(o.completed_date||'-') : ''}</td>
          <td onclick="event.stopPropagation()">
            ${renderProcessBadges(it, o.id)}
          </td>
          <td>
            ${idx===0 ? `<div class="btn-group btn-group-sm">
              ${statusBadge(o.status)}
              ${problemsMap[o.id]?`<span class="badge bg-danger ms-1">${problemsMap[o.id]}问题</span>`:''}
              <button class="btn btn-outline-danger" onclick="event.stopPropagation();openProblemModal(${o.id},'${(o.order_number||'').replace(/'/g,'')}')" title="问题反馈"><i class="bi bi-exclamation-triangle"></i></button>
              <button class="btn btn-outline-secondary" onclick="event.stopPropagation();printOrder(${o.id})"><i class="bi bi-printer"></i></button>
            </div>` : ''}
          </td>
        </tr>`);
    });
  });

  document.getElementById('orderList').innerHTML = `
    <div class="table-responsive">
    <table class="table table-hover table-sm mb-0">
      <thead class="table-dark">
        <tr>
          <th>车间</th><th>客名</th><th>产品名称</th><th>零件名称</th><th>工序</th><th>样板数量</th><th>提供胶件时间</th>
          <th style="color:#86efac">收到胶件时间</th>
          <th style="color:#f9a8d4">工程预计完成时间</th>
          <th style="color:#fca5a5">喷油复交货时间</th>
          <th>工程师</th><th>跟进人</th><th style="color:#86efac">完成时间</th><th>进度</th><th>状态/操作</th>
        </tr>
      </thead>
      <tbody>${rows.join('')}</tbody>
    </table></div>`;
}

// ─── 详情 ─────────────────────────────────────────────────────────────────────
let currentDetailOrderId = null;

function viewOrder(id) {
  currentDetailOrderId = id;
  apiFetch(`/api/spray/${id}`)
    .then(r => r.json())
    .then(order => {
      document.getElementById('detailTitle').textContent = `喷油单 — ${order.order_number || '#'+order.id}`;
      document.getElementById('detailPrintBtn').onclick = () => printOrder(id);

      const items = order.items || [];
      const itemRows = items.map(it => `
        <tr>
          <td>${esc(it.client_name||'-')}</td>
          <td>${esc(it.product_name||'-')}</td>
          <td>${esc(it.part_name||'-')}</td>
          <td>${esc(it.process||'-')}</td>
          <td>${esc(it.sample_qty||'-')}</td>
          <td>${esc(it.provide_time||'-')}</td>
          <td>${esc(it.receive_time || order.actual_receive_time || '-')}</td>
          <td>${esc(it.eng_complete_time||'-')}</td>
          <td><input type="date" class="form-control form-control-sm spray-delivery" data-order-id="${order.id}" data-item-id="${it.id}" value="${esc(it.delivery_time||'')}" onchange="saveItemDelivery(this)" style="min-width:130px"></td>
          <td>${esc(it.engineer||'-')}</td>
          <td>${esc(it.follower||'-')}</td>
          <td>
            ${renderProcessBadges(it, order.id, true)}
          </td>
        </tr>`).join('');

      document.getElementById('detailBody').innerHTML = `
        <div class="detail-header row g-3 mb-3">
          <div class="col-md-3"><div class="label">日期</div><div class="value">${esc(order.date||'-')}</div></div>
          <div class="col-md-3"><div class="label">类型</div><div class="value">${esc(order.order_type||'-')}</div></div>
          <div class="col-md-3"><div class="label">状态</div><div class="value">${statusBadge(order.status)}</div></div>
          <div class="col-md-3"><div class="label">车间</div><div class="value">${esc(order.workshop||'-')}</div></div>
          <div class="col-12"><div class="label">原因/备注</div><div class="value">${esc(order.reason||'-')}</div></div>
        </div>

        <div class="table-responsive">
          <table class="table table-bordered table-sm">
            <thead class="table-dark" style="font-size:.8rem">
              <tr>
                <th>客名</th><th>产品名称</th><th>零件名称</th><th>工序</th><th>样板数量</th><th>提供胶件时间</th>
                <th>收到胶件时间</th><th>工程预计完成时间</th>
                <th style="color:#fca5a5">喷油复交货时间</th><th>工程师</th><th>跟进人</th><th>进度</th>
              </tr>
            </thead>
            <tbody>${itemRows || '<tr><td colspan="11" class="text-muted text-center">无明细</td></tr>'}</tbody>
          </table>
        </div>

        <h6 class="mt-3 mb-2 fw-bold">喷油部填写</h6>
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label">实际收到胶件时间</label>
            <input type="date" class="form-control" id="sf-actual-receive" value="${esc(order.actual_receive_time||'')}" onchange="saveSprayFields(${order.id})">
          </div>
          <div class="col-md-8">
            <label class="form-label">备注</label>
            <input type="text" class="form-control" id="sf-notes" value="${esc(order.spray_notes||'')}" placeholder="喷油部备注" onchange="saveSprayFields(${order.id})">
          </div>
        </div>
        ${order.completed_date ? '<div class="mt-2"><span class="badge bg-success">完成时间: '+esc(order.completed_date)+'</span></div>' : ''}`;

      new bootstrap.Modal(document.getElementById('detailModal')).show();
    });
}

function saveSprayFields(id) {
  apiFetch(`/api/spray/${id}/spray-fields`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json', 'X-User': encodeURIComponent('喷油部') },
    body: JSON.stringify({
      actual_receive_time: document.getElementById('sf-actual-receive').value,
      spray_notes: document.getElementById('sf-notes').value
    })
  }).then(r => { if (r.ok) loadOrders(); });
}

// ─── 喷油复交货时间（per-item） ───────────────────────────────────────────────
function saveItemDelivery(el) {
  const orderId = el.dataset.orderId;
  const itemId = +el.dataset.itemId;
  apiFetch(`/api/spray/${orderId}/item-delivery`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json', 'X-User': encodeURIComponent('喷油部') },
    body: JSON.stringify({ item_id: itemId, delivery_time: el.value })
  }).then(r => { if (r.ok) loadOrders(); });
}

// ─── 工序进度 ─────────────────────────────────────────────────────────────────
let pendingProgress = null;

/** 解析工序字段为数组，如 "喷油/移印/UV" → ["喷油","移印","UV"] */
function parseProcesses(proc) {
  if (!proc || proc === '-') return [];
  return proc.split('/').map(s => s.trim()).filter(Boolean);
}

/** 缓存 item process_status 用于 openProgress 取值，避免 inline JSON */
const _psCache = {};

/** 渲染工序打勾标签（列表和详情通用） */
function renderProcessBadges(item, orderId, showDetail) {
  const procs = parseProcesses(item.process);
  if (!procs.length) return '-';
  const ps = item.process_status || {};
  const cacheKey = orderId + '_' + item.id;
  _psCache[cacheKey] = { ps, process: item.process, name: item.product_name || '' };
  const allDone = procs.every(p => ps[p] && ps[p].done);
  let html = procs.map(p => {
    const done = ps[p] && ps[p].done;
    if (done) {
      const tip = showDetail ? `<div style="font-size:.65rem;color:#6c757d">${esc(ps[p].done_by||'')} ${esc((ps[p].done_at||'').replace('T',' ').slice(0,16))}</div>` : '';
      return `<span class="proc-done" style="margin-right:4px"><i class="bi bi-check-circle-fill me-1"></i>${esc(p)}</span>${tip}`;
    }
    return `<span class="badge bg-secondary" style="margin-right:4px;cursor:pointer" onclick="event.stopPropagation();openProgressCached(${orderId},${item.id})">${esc(p)}</span>`;
  }).join('');
  if (allDone) html = `<span class="badge bg-success me-1">全部完成</span>` + html;
  return html;
}

function openProgressCached(orderId, itemId) {
  const c = _psCache[orderId + '_' + itemId] || {};
  openProgress(orderId, itemId, c.name || '', c.process || '', c.ps || {});
}

function openProgress(orderId, itemId, itemName, processStr, currentStatus) {
  const procs = parseProcesses(processStr);
  const ps = currentStatus || {};
  pendingProgress = { orderId, itemId, processes: procs };
  document.getElementById('pgItemName').textContent = itemName || `#${itemId}`;
  document.getElementById('pgOperator').value = '';
  document.getElementById('pgError').classList.add('d-none');
  // 渲染工序勾选列表
  document.getElementById('pgProcessList').innerHTML = procs.map(p => {
    const done = ps[p] && ps[p].done;
    return `<div class="form-check form-check-inline mb-2">
      <input class="form-check-input pg-proc-check" type="checkbox" id="pg-${p}" value="${esc(p)}" ${done ? 'checked disabled' : ''}>
      <label class="form-check-label" for="pg-${p}">${esc(p)} ${done ? '<span class="text-success small">(已完成 - '+esc(ps[p].done_by||'')+')</span>' : ''}</label>
    </div>`;
  }).join('');
  new bootstrap.Modal(document.getElementById('progressModal')).show();
}

function confirmProgress() {
  const operator = document.getElementById('pgOperator').value.trim();
  const checks = document.querySelectorAll('.pg-proc-check:checked:not(:disabled)');
  if (checks.length === 0) {
    document.getElementById('pgError').textContent = '请至少勾选一个新完成的工序';
    document.getElementById('pgError').classList.remove('d-none');
    return;
  }
  if (!operator) {
    document.getElementById('pgError').textContent = '请输入操作人姓名';
    document.getElementById('pgError').classList.remove('d-none');
    return;
  }
  const newlyDone = Array.from(checks).map(c => c.value);
  apiFetch(`/api/spray/${pendingProgress.orderId}/item-progress`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json', 'X-User': encodeURIComponent('喷油部') },
    body: JSON.stringify({ item_id: pendingProgress.itemId, processes_done: newlyDone, done_by: operator })
  }).then(r => r.json()).then(d => {
    if (d.error) {
      document.getElementById('pgError').textContent = d.error;
      document.getElementById('pgError').classList.remove('d-none');
      return;
    }
    bootstrap.Modal.getInstance(document.getElementById('progressModal'))?.hide();
    if (document.getElementById('detailModal').classList.contains('show')) {
      viewOrder(pendingProgress.orderId);
    }
    loadOrders();
  });
}

// ─── 问题反馈 ─────────────────────────────────────────────────────────────────
let currentProblemOrderId = null;
let currentProblemOrderNum = '';

function openProblemModal(orderId, orderNumber) {
  currentProblemOrderId = orderId;
  currentProblemOrderNum = orderNumber;
  document.getElementById('pmOrderNum').textContent = orderNumber || `#${orderId}`;
  document.getElementById('pmDescription').value = '';
  document.getElementById('pmProblemsList').innerHTML = '<div class="text-muted small">加载中...</div>';
  new bootstrap.Modal(document.getElementById('problemModal')).show();

  apiFetch(`/api/problems?type=spray&order_id=${orderId}`)
    .then(r => r.json())
    .then(list => {
      if (!list.length) {
        document.getElementById('pmProblemsList').innerHTML = '<div class="text-muted small">暂无历史问题记录</div>';
        return;
      }
      document.getElementById('pmProblemsList').innerHTML = `
        <p class="fw-bold mb-2">历史问题记录</p>
        ${list.map(p => `
          <div class="border rounded p-2 mb-2 ${p.status==='已解决' ? 'bg-light' : 'bg-warning-subtle'}">
            <div class="d-flex justify-content-between align-items-start">
              <span class="small">${esc(p.description)}</span>
              <span class="badge ${p.status==='已解决' ? 'bg-success' : 'bg-danger'} ms-2 flex-shrink-0">${esc(p.status)}</span>
            </div>
            <div class="text-muted" style="font-size:.75rem;margin-top:4px">
              ${esc(p.reported_by)} · ${esc(p.created_at.replace('T',' ').slice(0,16))}
            </div>
          </div>`).join('')}`;
    });
}

function submitProblem() {
  const desc = document.getElementById('pmDescription').value.trim();
  if (!desc) { alert('请输入问题描述'); return; }
  apiFetch('/api/problems', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-User': encodeURIComponent('喷油部') },
    body: JSON.stringify({
      order_type: 'spray',
      order_id: currentProblemOrderId,
      order_number: currentProblemOrderNum,
      description: desc,
      reported_by: '喷油部'
    })
  }).then(() => {
    document.getElementById('pmDescription').value = '';
    bootstrap.Modal.getInstance(document.getElementById('problemModal'))?.hide();
    loadOrders();
  });
}

function printOrder(id) {
  window.open(`print.html?type=spray&id=${id}`, '_blank');
}

loadOrders();
setInterval(loadOrders, 30000);
</script>
</body>
</html>
