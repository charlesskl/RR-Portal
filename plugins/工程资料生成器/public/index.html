<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工程资料生成器</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body>
  <div class="container-fluid py-4">

    <!-- Header -->
    <div class="d-flex align-items-center mb-4">
      <h2 class="mb-0 fw-bold">工程资料生成器</h2>
    </div>

    <!-- Toolbar -->
    <div class="d-flex flex-wrap gap-2 align-items-center mb-3">
      <input
        type="text"
        id="search-input"
        class="form-control"
        style="max-width: 300px;"
        placeholder="搜索产品编号/名称/客户..."
      >
      <select id="engineer-filter" class="form-select" style="max-width: 180px; display: none;">
        <option value="">全部工程师</option>
      </select>
      <a href="product.html" class="btn btn-primary">新建产品</a>
      <button class="btn btn-outline-secondary" data-bs-toggle="modal" data-bs-target="#copy-modal">
        从已有产品复制
      </button>
      <button class="btn btn-outline-success" data-bs-toggle="modal" data-bs-target="#import-modal">
        从Excel导入
      </button>
    </div>

    <!-- Product Table -->
    <div class="table-responsive">
      <table class="table table-bordered table-hover align-middle">
        <thead class="table-light">
          <tr>
            <th>产品编号</th>
            <th>产品名称</th>
            <th>客户</th>
            <th>厂区</th>
            <th>工程师</th>
            <th>更新日期</th>
            <th style="min-width: 220px;">操作</th>
          </tr>
        </thead>
        <tbody id="product-tbody">
          <tr>
            <td colspan="7" class="text-center text-muted py-4">加载中...</td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>

  <!-- Copy Modal -->
  <div class="modal fade" id="copy-modal" tabindex="-1" aria-labelledby="copy-modal-label" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="copy-modal-label">从已有产品复制</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
        </div>
        <div class="modal-body">
          <p class="text-muted small mb-3">选择一个产品作为模板，将复制其所有数据并进入编辑页面。</p>
          <div id="copy-list">
            <div class="text-center text-muted py-3">加载中...</div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Import Modal -->
  <div class="modal fade" id="import-modal" tabindex="-1" aria-labelledby="import-modal-label" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="import-modal-label">从Excel导入工程资料</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
        </div>
        <div class="modal-body">
          <p class="text-muted small mb-3">
            支持导入：排模表、外购清单、外箱资料、生产注意事项、作业指导书。
            系统会根据文件名自动识别类型。
          </p>

          <!-- Tab: folder path or file upload -->
          <ul class="nav nav-tabs mb-3" role="tablist">
            <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#import-folder-tab">输入文件夹路径</a></li>
            <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#import-upload-tab">上传文件</a></li>
          </ul>
          <div class="tab-content">
            <div class="tab-pane fade show active" id="import-folder-tab">
              <div class="mb-3">
                <label class="form-label">文件夹路径</label>
                <input type="text" id="import-folder-path" class="form-control" placeholder="例如: D:\产品\xxx\工程资料">
              </div>
            </div>
            <div class="tab-pane fade" id="import-upload-tab">
              <div class="mb-3">
                <label class="form-label">选择Excel文件</label>
                <input type="file" id="import-files" class="form-control" multiple accept=".xls,.xlsx">
              </div>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">厂区</label>
            <select id="import-factory" class="form-select">
              <option value="华登">华登</option>
              <option value="兴信">兴信</option>
            </select>
          </div>

          <div id="import-result" style="display:none;" class="mt-3">
            <div id="import-matched" class="text-success small"></div>
            <div id="import-errors" class="text-danger small"></div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
          <button type="button" class="btn btn-success" id="import-btn" onclick="doImport()">
            开始导入
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="utils.js"></script>
  <script>
    let allProducts = [];

    // Load engineer filter options from config
    async function loadConfig() {
      try {
        const config = await api('GET', '/api/config');
        const engineers = config.engineers || [];
        const filterEl = document.getElementById('engineer-filter');
        if (engineers.length > 0) {
          engineers.forEach(name => {
            const opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name;
            filterEl.appendChild(opt);
          });
          filterEl.style.display = '';
          filterEl.addEventListener('change', applyFilters);
        }
      } catch (e) {
        // Config load failure is non-critical; engineer filter stays hidden
      }
    }

    async function loadProducts() {
      try {
        allProducts = await api('GET', '/api/products');
        renderTable(allProducts);
      } catch (e) {
        showToast('加载失败: ' + e.message, 'error');
      }
    }

    function renderTable(products) {
      const tbody = document.getElementById('product-tbody');
      if (!products.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">暂无产品数据，点击「新建产品」开始</td></tr>';
        return;
      }
      tbody.innerHTML = products.map(p => `
        <tr>
          <td>${p.product_number || '<span class="text-muted">未填写</span>'}</td>
          <td>${p.product_name || ''}</td>
          <td>${p.client_name || ''}</td>
          <td>${p.factory || ''}</td>
          <td>${p.engineer || ''}</td>
          <td>${formatDate(p.updated_at)}</td>
          <td>
            <a href="product.html?id=${p.id}" class="btn btn-sm btn-outline-primary">编辑</a>
            <button class="btn btn-sm btn-success" onclick="generateExcel('${p.id}', '${(p.product_number || 'product')}_${(p.product_name || '')}_工程资料.zip')">生成Excel</button>
            <button class="btn btn-sm btn-outline-danger" onclick="deleteProduct('${p.id}', '${(p.product_name || '').replace(/'/g, "\\'")}')">删除</button>
          </td>
        </tr>
      `).join('');
    }

    function applyFilters() {
      const s = document.getElementById('search-input').value.toLowerCase();
      const engineer = document.getElementById('engineer-filter').value;
      const filtered = allProducts.filter(p => {
        const matchSearch =
          (p.product_number || '').toLowerCase().includes(s) ||
          (p.product_name || '').toLowerCase().includes(s) ||
          (p.client_name || '').toLowerCase().includes(s);
        const matchEngineer = !engineer || (p.engineer || '') === engineer;
        return matchSearch && matchEngineer;
      });
      renderTable(filtered);
    }

    // Search with debounce
    const searchInput = document.getElementById('search-input');
    searchInput.addEventListener('input', debounce(applyFilters));

    // Generate Excel
    function generateExcel(id, filename) {
      downloadFromPost('/api/products/' + id + '/generate', filename);
    }

    // Delete
    async function deleteProduct(id, name) {
      if (!confirmAction('确定要删除「' + name + '」吗？此操作不可撤销。')) return;
      try {
        await api('DELETE', '/api/products/' + id);
        showToast('已删除');
        loadProducts();
      } catch (e) {
        showToast('删除失败: ' + e.message, 'error');
      }
    }

    // Copy modal — populate list when modal opens
    document.getElementById('copy-modal').addEventListener('show.bs.modal', () => {
      const listEl = document.getElementById('copy-list');
      if (!allProducts.length) {
        listEl.innerHTML = '<div class="text-center text-muted py-3">暂无可复制的产品</div>';
        return;
      }
      listEl.innerHTML = allProducts.map(p => `
        <div class="d-flex align-items-center justify-content-between border rounded px-3 py-2 mb-2">
          <div>
            <span class="fw-semibold">${p.product_name || '(未命名)'}</span>
            ${p.product_number ? `<span class="text-muted ms-2 small">${p.product_number}</span>` : ''}
            ${p.client_name ? `<span class="badge bg-secondary ms-2">${p.client_name}</span>` : ''}
          </div>
          <button class="btn btn-sm btn-primary" onclick="copyProduct('${p.id}')">复制此产品</button>
        </div>
      `).join('');
    });

    // Copy product
    async function copyProduct(id) {
      try {
        const newProduct = await api('POST', '/api/products/' + id + '/copy');
        window.location.href = 'product.html?id=' + newProduct.id;
      } catch (e) {
        showToast('复制失败: ' + e.message, 'error');
      }
    }

    // Import
    async function doImport() {
      const btn = document.getElementById('import-btn');
      btn.disabled = true;
      btn.textContent = '导入中...';
      const resultDiv = document.getElementById('import-result');
      resultDiv.style.display = 'none';

      const factory = document.getElementById('import-factory').value;
      const folderTab = document.querySelector('#import-folder-tab.active, #import-folder-tab.show');

      try {
        let data;
        if (folderTab) {
          // Folder path mode
          const folderPath = document.getElementById('import-folder-path').value.trim();
          if (!folderPath) { showToast('请输入文件夹路径', 'error'); return; }
          data = await api('POST', '/api/import/folder', { folder_path: folderPath, factory });
        } else {
          // File upload mode
          const fileInput = document.getElementById('import-files');
          if (!fileInput.files.length) { showToast('请选择文件', 'error'); return; }
          const formData = new FormData();
          formData.append('factory', factory);
          for (const f of fileInput.files) formData.append('files', f);
          const res = await fetch('/api/import/files', { method: 'POST', body: formData });
          if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err.error || 'Import failed'); }
          data = await res.json();
        }

        // Show results
        resultDiv.style.display = '';
        document.getElementById('import-matched').innerHTML =
          '<strong>成功匹配：</strong><br>' + (data.matched || []).map(m => '✓ ' + m).join('<br>');
        document.getElementById('import-errors').innerHTML =
          data.errors?.length ? '<strong>警告：</strong><br>' + data.errors.map(e => '⚠ ' + e).join('<br>') : '';

        showToast('导入成功！正在跳转到编辑页面...');
        setTimeout(() => {
          window.location.href = 'product.html?id=' + data.product.id;
        }, 1500);
      } catch (e) {
        showToast('导入失败: ' + e.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '开始导入';
      }
    }

    // Init
    loadConfig();
    loadProducts();
  </script>
</body>
</html>
