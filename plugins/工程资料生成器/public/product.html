<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>产品编辑 - 工程资料生成器</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
  <style>
    /* Parts table needs extra min-width due to 24+ columns */
    #parts-table {
      min-width: 2200px;
    }
    #purchases-table {
      min-width: 1400px;
    }
    /* Fixed-width hints for dense columns */
    .col-narrow { min-width: 70px; }
    .col-medium { min-width: 100px; }
    .col-wide   { min-width: 130px; }
    .col-num    { min-width: 70px; }
  </style>
</head>
<body>
  <!-- Top Action Bar -->
  <div class="page-header no-print">
    <div class="container-fluid">
      <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
        <div class="d-flex align-items-center gap-3">
          <a href="index.html" class="btn btn-outline-secondary btn-sm">← 返回列表</a>
          <h5 id="page-title" class="mb-0 fw-bold text-dark">新建产品</h5>
        </div>
        <div class="d-flex gap-2">
          <button id="btn-save" class="btn btn-primary" onclick="saveProduct()">保存</button>
          <button id="btn-generate" class="btn btn-success d-none" onclick="generateExcel()">生成Excel</button>
        </div>
      </div>
    </div>
  </div>

  <div class="container-fluid py-3">
    <!-- Tabs Navigation -->
    <ul class="nav nav-tabs" id="productTabs" role="tablist">
      <li class="nav-item" role="presentation">
        <a class="nav-link active" id="tab-basic-tab" data-bs-toggle="tab" href="#tab-basic" role="tab">基本信息</a>
      </li>
      <li class="nav-item" role="presentation">
        <a class="nav-link" id="tab-parts-tab" data-bs-toggle="tab" href="#tab-parts" role="tab">零件清单</a>
      </li>
      <li class="nav-item" role="presentation">
        <a class="nav-link" id="tab-purchases-tab" data-bs-toggle="tab" href="#tab-purchases" role="tab">外购件</a>
      </li>
      <li class="nav-item" role="presentation">
        <a class="nav-link" id="tab-dimensions-tab" data-bs-toggle="tab" href="#tab-dimensions" role="tab">尺寸重量</a>
      </li>
      <li class="nav-item" role="presentation">
        <a class="nav-link" id="tab-notes-tab" data-bs-toggle="tab" href="#tab-notes" role="tab">生产注意事项</a>
      </li>
      <li class="nav-item" role="presentation">
        <a class="nav-link" id="tab-sop-tab" data-bs-toggle="tab" href="#tab-sop" role="tab">作业指导书</a>
      </li>
    </ul>

    <div class="tab-content" id="productTabsContent">

      <!-- ─── Tab 1: 基本信息 ─────────────────────────────────────────── -->
      <div class="tab-pane fade show active" id="tab-basic" role="tabpanel">
        <div class="card">
          <div class="card-body">
            <div class="row g-3">

              <!-- 厂区 (full row) -->
              <div class="col-12">
                <label class="form-label">厂区 <span class="text-danger">*</span></label>
                <div class="d-flex gap-4">
                  <div class="form-check">
                    <input class="form-check-input" type="radio" name="factory" id="factory-huadeng" value="华登">
                    <label class="form-check-label" for="factory-huadeng">华登</label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input" type="radio" name="factory" id="factory-xingxin" value="兴信">
                    <label class="form-check-label" for="factory-xingxin">兴信</label>
                  </div>
                </div>
              </div>

              <!-- 产品编号 -->
              <div class="col-md-6">
                <label class="form-label" for="product_number">产品编号 <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="product_number" placeholder="请输入产品编号">
              </div>

              <!-- 产品名称 -->
              <div class="col-md-6">
                <label class="form-label" for="product_name">产品名称 <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="product_name" placeholder="请输入产品名称">
              </div>

              <!-- 客户名称 -->
              <div class="col-md-6">
                <label class="form-label" for="client_name">客户名称</label>
                <input type="text" class="form-control" id="client_name" placeholder="请输入客户名称">
              </div>

              <!-- 订单数量 -->
              <div class="col-md-6">
                <label class="form-label" for="order_qty">订单数量</label>
                <input type="number" class="form-control" id="order_qty" placeholder="请输入订单数量" step="any" min="0">
              </div>

              <!-- 年龄分组 -->
              <div class="col-md-6">
                <label class="form-label" for="age_grade">年龄分组</label>
                <input type="text" class="form-control" id="age_grade" placeholder="如 4+">
              </div>

              <!-- 工程师 -->
              <div class="col-md-6">
                <label class="form-label" for="engineer">工程师</label>
                <input type="text" class="form-control" id="engineer" placeholder="请输入工程师姓名">
              </div>

              <!-- 编制日期 -->
              <div class="col-md-6">
                <label class="form-label" for="created_at">编制日期</label>
                <input type="date" class="form-control" id="created_at">
              </div>

            </div>
          </div>
        </div>
      </div>

      <!-- ─── Tab 2: 零件清单 ─────────────────────────────────────────── -->
      <div class="tab-pane fade" id="tab-parts" role="tabpanel">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <h6 class="mb-0 fw-semibold">零件清单</h6>
          <button class="btn btn-sm btn-outline-primary" onclick="addPartRow()">+ 添加零件</button>
        </div>
        <div class="table-scroll-wrapper">
          <table class="table table-bordered table-sm dynamic-table" id="parts-table">
            <thead>
              <tr>
                <th class="col-narrow">分组</th>
                <th class="col-medium">工模编号</th>
                <th class="col-wide">模具名称</th>
                <th class="col-medium">零件编号</th>
                <th class="col-wide">物料名称</th>
                <th class="col-medium">材料</th>
                <th class="col-wide">海关备案</th>
                <th class="col-narrow">颜色</th>
                <th class="col-medium">色粉编号</th>
                <th class="col-wide">加工内容</th>
                <th class="col-num">水口比率%</th>
                <th class="col-num">混水口%</th>
                <th class="col-num">整啤毛重g</th>
                <th class="col-num">整啤净重g</th>
                <th class="col-num">单净重g</th>
                <th class="col-num">模腔数</th>
                <th class="col-num">出模数</th>
                <th class="col-num">套数</th>
                <th class="col-narrow">用量</th>
                <th class="col-num">需求数</th>
                <th class="col-medium">机型</th>
                <th class="col-medium">模架尺寸</th>
                <th class="col-narrow">模具数量</th>
                <th class="col-wide">备注</th>
                <th style="min-width: 60px;">操作</th>
              </tr>
            </thead>
            <tbody id="parts-tbody">
            </tbody>
          </table>
        </div>
        <button class="btn btn-sm btn-outline-primary mt-2" onclick="addPartRow()">+ 添加零件</button>
      </div>

      <!-- ─── Tab 3: 外购件 ───────────────────────────────────────────── -->
      <div class="tab-pane fade" id="tab-purchases" role="tabpanel">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <h6 class="mb-0 fw-semibold">外购件</h6>
          <button class="btn btn-sm btn-outline-primary" onclick="addPurchaseRow()">+ 添加外购件</button>
        </div>
        <div class="table-scroll-wrapper">
          <table class="table table-bordered table-sm dynamic-table" id="purchases-table">
            <thead>
              <tr>
                <th class="col-medium">类别</th>
                <th class="col-wide">物料名称</th>
                <th class="col-medium">物料编号</th>
                <th class="col-wide">规格</th>
                <th class="col-medium">材料</th>
                <th class="col-wide">海关备案</th>
                <th class="col-narrow">颜色</th>
                <th class="col-narrow">用量</th>
                <th class="col-num">需求数</th>
                <th class="col-num">单重g</th>
                <th class="col-wide">供应商</th>
                <th class="col-wide">表面处理</th>
                <th class="col-medium">用途</th>
                <th class="col-wide">备注</th>
                <th style="min-width: 60px;">操作</th>
              </tr>
            </thead>
            <tbody id="purchases-tbody">
            </tbody>
          </table>
        </div>
        <button class="btn btn-sm btn-outline-primary mt-2" onclick="addPurchaseRow()">+ 添加外购件</button>
      </div>

      <!-- ─── Tab 4: 尺寸重量 ────────────────────────────────────────── -->
      <div class="tab-pane fade" id="tab-dimensions" role="tabpanel">
        <div class="card">
          <div class="card-body">

            <!-- 装箱方式 / 材质 -->
            <div class="row g-2 mb-3">
              <div class="col-12">
                <label class="form-label fw-semibold">装箱方式</label>
                <input type="text" class="form-control" id="dim_packing_method" placeholder="如 每箱12套，2层×6套">
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">内箱材质</label>
                <input type="text" class="form-control" id="dim_inner_box_material" placeholder="如 E坑白盒">
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">外箱材质</label>
                <input type="text" class="form-control" id="dim_outer_box_material" placeholder="如 B坑纸箱">
              </div>
            </div>

            <!-- 产品光身 -->
            <h6 class="section-header mt-3">产品光身</h6>
            <div class="row g-2 align-items-center mb-2">
              <div class="col-2"><label class="form-label mb-0">阶段</label>
                <input type="text" class="form-control form-control-sm" id="dim_product_stage" placeholder="如 T1"></div>
              <div class="col-2"><label class="form-label mb-0">长 cm</label>
                <input type="number" class="form-control form-control-sm" id="dim_product_width" step="any" min="0"></div>
              <div class="col-2"><label class="form-label mb-0">宽 cm</label>
                <input type="number" class="form-control form-control-sm" id="dim_product_depth" step="any" min="0"></div>
              <div class="col-2"><label class="form-label mb-0">高 cm</label>
                <input type="number" class="form-control form-control-sm" id="dim_product_height" step="any" min="0"></div>
              <div class="col-2"><label class="form-label mb-0">重量 kg</label>
                <input type="number" class="form-control form-control-sm" id="dim_product_weight_kg" step="any" min="0"></div>
            </div>

            <!-- 包装 -->
            <h6 class="section-header mt-3">包装</h6>
            <div class="row g-2 align-items-center mb-2">
              <div class="col-2"><label class="form-label mb-0">阶段</label>
                <input type="text" class="form-control form-control-sm" id="dim_package_stage" placeholder="如 T1"></div>
              <div class="col-2"><label class="form-label mb-0">长 cm</label>
                <input type="number" class="form-control form-control-sm" id="dim_package_width" step="any" min="0"></div>
              <div class="col-2"><label class="form-label mb-0">宽 cm</label>
                <input type="number" class="form-control form-control-sm" id="dim_package_depth" step="any" min="0"></div>
              <div class="col-2"><label class="form-label mb-0">高含J钩 cm</label>
                <input type="number" class="form-control form-control-sm" id="dim_package_height_with_hook" step="any" min="0"></div>
              <div class="col-2"><label class="form-label mb-0">高不含J钩 cm</label>
                <input type="number" class="form-control form-control-sm" id="dim_package_height_no_hook" step="any" min="0"></div>
              <div class="col-2"><label class="form-label mb-0">毛重 kg</label>
                <input type="number" class="form-control form-control-sm" id="dim_package_gross_weight_kg" step="any" min="0"></div>
            </div>

            <!-- PDQ/展示盒 (collapsible) -->
            <h6 class="section-header mt-3">
              <a class="text-decoration-none" data-bs-toggle="collapse" href="#dim-display-section" role="button" aria-expanded="false">
                PDQ / 展示盒 <small class="text-muted">(点击展开)</small>
              </a>
            </h6>
            <div class="collapse" id="dim-display-section">
              <div class="row g-2 align-items-center mb-2">
                <div class="col-2"><label class="form-label mb-0">长 cm</label>
                  <input type="number" class="form-control form-control-sm" id="dim_display_width" step="any" min="0"></div>
                <div class="col-2"><label class="form-label mb-0">宽 cm</label>
                  <input type="number" class="form-control form-control-sm" id="dim_display_depth" step="any" min="0"></div>
                <div class="col-2"><label class="form-label mb-0">组装高 cm</label>
                  <input type="number" class="form-control form-control-sm" id="dim_display_closed_height" step="any" min="0"></div>
                <div class="col-2"><label class="form-label mb-0">打开高 cm</label>
                  <input type="number" class="form-control form-control-sm" id="dim_display_open_height" step="any" min="0"></div>
                <div class="col-2"><label class="form-label mb-0">总重量 kg</label>
                  <input type="number" class="form-control form-control-sm" id="dim_display_total_weight_kg" step="any" min="0"></div>
              </div>
            </div>

            <!-- 内箱资料 -->
            <h6 class="section-header mt-3">内箱资料</h6>
            <div class="row g-2 align-items-end mb-2">
              <div class="col-auto"><label class="form-label mb-0 text-muted" style="width:90px">订箱尺寸<br><small>(用于采购订箱)</small></label></div>
              <div class="col-2"><label class="form-label mb-0">长 cm</label>
                <input type="number" class="form-control form-control-sm" id="dim_inner_order_width" step="any" min="0"></div>
              <div class="col-2"><label class="form-label mb-0">宽 cm</label>
                <input type="number" class="form-control form-control-sm" id="dim_inner_order_depth" step="any" min="0"></div>
              <div class="col-2"><label class="form-label mb-0">高 cm</label>
                <input type="number" class="form-control form-control-sm" id="dim_inner_order_height" step="any" min="0"></div>
              <div class="col-2"><label class="form-label mb-0">净重 kg</label>
                <input type="number" class="form-control form-control-sm" id="dim_inner_order_nw" step="any" min="0"></div>
              <div class="col-2"><label class="form-label mb-0">毛重 kg</label>
                <input type="number" class="form-control form-control-sm" id="dim_inner_order_gw" step="any" min="0"></div>
            </div>
            <div class="row g-2 align-items-end mb-2">
              <div class="col-auto"><label class="form-label mb-0 text-muted" style="width:90px">量箱尺寸<br><small>(用于装柜)</small></label></div>
              <div class="col-2"><label class="form-label mb-0">长 cm</label>
                <input type="number" class="form-control form-control-sm" id="dim_inner_measure_width" step="any" min="0"></div>
              <div class="col-2"><label class="form-label mb-0">宽 cm</label>
                <input type="number" class="form-control form-control-sm" id="dim_inner_measure_depth" step="any" min="0"></div>
              <div class="col-2"><label class="form-label mb-0">高 cm</label>
                <input type="number" class="form-control form-control-sm" id="dim_inner_measure_height" step="any" min="0"></div>
              <div class="col-2"><label class="form-label mb-0">净重 kg</label>
                <input type="number" class="form-control form-control-sm" id="dim_inner_measure_nw" step="any" min="0"></div>
              <div class="col-2"><label class="form-label mb-0">毛重 kg</label>
                <input type="number" class="form-control form-control-sm" id="dim_inner_measure_gw" step="any" min="0"></div>
            </div>

            <!-- 外箱资料 -->
            <h6 class="section-header mt-3">外箱资料</h6>
            <div class="row g-2 align-items-end mb-2">
              <div class="col-auto"><label class="form-label mb-0 text-muted" style="width:90px">订箱尺寸<br><small>(用于采购订箱)</small></label></div>
              <div class="col-2"><label class="form-label mb-0">长 cm</label>
                <input type="number" class="form-control form-control-sm" id="dim_outer_order_width" step="any" min="0"></div>
              <div class="col-2"><label class="form-label mb-0">宽 cm</label>
                <input type="number" class="form-control form-control-sm" id="dim_outer_order_depth" step="any" min="0"></div>
              <div class="col-2"><label class="form-label mb-0">高 cm</label>
                <input type="number" class="form-control form-control-sm" id="dim_outer_order_height" step="any" min="0"></div>
              <div class="col-2"><label class="form-label mb-0">净重 kg</label>
                <input type="number" class="form-control form-control-sm" id="dim_outer_order_nw" step="any" min="0"></div>
              <div class="col-2"><label class="form-label mb-0">毛重 kg</label>
                <input type="number" class="form-control form-control-sm" id="dim_outer_order_gw" step="any" min="0"></div>
            </div>
            <div class="row g-2 align-items-end mb-2">
              <div class="col-auto"><label class="form-label mb-0 text-muted" style="width:90px">量箱尺寸<br><small>(用于装柜)</small></label></div>
              <div class="col-2"><label class="form-label mb-0">长 cm</label>
                <input type="number" class="form-control form-control-sm" id="dim_outer_measure_width" step="any" min="0"></div>
              <div class="col-2"><label class="form-label mb-0">宽 cm</label>
                <input type="number" class="form-control form-control-sm" id="dim_outer_measure_depth" step="any" min="0"></div>
              <div class="col-2"><label class="form-label mb-0">高 cm</label>
                <input type="number" class="form-control form-control-sm" id="dim_outer_measure_height" step="any" min="0"></div>
              <div class="col-2"><label class="form-label mb-0">净重 kg</label>
                <input type="number" class="form-control form-control-sm" id="dim_outer_measure_nw" step="any" min="0"></div>
              <div class="col-2"><label class="form-label mb-0">毛重 kg</label>
                <input type="number" class="form-control form-control-sm" id="dim_outer_measure_gw" step="any" min="0"></div>
            </div>

          </div>
        </div>
      </div>

      <!-- ─── Tab 5: 生产注意事项 ──────────────────────────────────────── -->
      <div class="tab-pane fade" id="tab-notes" role="tabpanel">
        <div class="card">
          <div class="card-body">
            <div class="row g-3">

              <div class="col-12">
                <label class="form-label fw-semibold" for="notes_product_intro">产品介绍</label>
                <textarea class="form-control" id="notes_product_intro" rows="4" placeholder="简要描述产品用途、特点及目标用户群体"></textarea>
              </div>

              <div class="col-12">
                <label class="form-label fw-semibold" for="notes_function_desc">功能玩法描述</label>
                <textarea class="form-control" id="notes_function_desc" rows="4" placeholder="描述产品的主要功能及玩法步骤"></textarea>
              </div>

              <div class="col-12">
                <label class="form-label fw-semibold" for="notes_test_requirements">测试要求</label>
                <textarea class="form-control" id="notes_test_requirements" rows="3" placeholder="列出需要通过的测试标准及具体要求"></textarea>
              </div>

              <div class="col-12">
                <label class="form-label fw-semibold" for="notes_injection_notes">啤塑注意事项</label>
                <textarea class="form-control" id="notes_injection_notes" rows="4" placeholder="注塑过程中的温度、压力、用料等注意事项"></textarea>
              </div>

              <div class="col-12">
                <label class="form-label fw-semibold" for="notes_assembly_notes">装配 / 贴水纸注意事项</label>
                <textarea class="form-control" id="notes_assembly_notes" rows="4" placeholder="装配顺序、贴纸位置及方向、手力控制等注意事项"></textarea>
              </div>

              <div class="col-12">
                <label class="form-label fw-semibold" for="notes_packaging_notes">包装注意事项</label>
                <textarea class="form-control" id="notes_packaging_notes" rows="4" placeholder="包装方式、装箱要求、标签张贴位置等注意事项"></textarea>
              </div>

            </div>
          </div>
        </div>
      </div>

      <!-- ─── Tab 6: 作业指导书 ────────────────────────────────────────── -->
      <div class="tab-pane fade" id="tab-sop" role="tabpanel">
        <div id="sop-cards-container"></div>
        <button class="btn btn-outline-primary mt-2" onclick="addSopCard()">+ 添加工序</button>
      </div>

    </div><!-- /tab-content -->
  </div><!-- /container-fluid -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="utils.js"></script>
  <script>
    // ─── Helpers ────────────────────────────────────────────────────────────
    function getProductId() {
      const params = new URLSearchParams(window.location.search);
      return params.get('id') || null;
    }

    function today() {
      return new Date().toISOString().slice(0, 10);
    }

    function updateTitle(product) {
      const title = document.getElementById('page-title');
      if (product && (product.product_number || product.product_name)) {
        title.textContent = [product.product_number, product.product_name].filter(Boolean).join(' ');
      } else {
        title.textContent = '新建产品';
      }
    }

    // ─── Load product ────────────────────────────────────────────────────────
    async function loadProduct(id) {
      try {
        const product = await api('GET', '/api/products/' + id);
        populateForm(product);
        updateTitle(product);
        document.getElementById('btn-generate').classList.remove('d-none');
      } catch (e) {
        showToast('加载产品数据失败: ' + e.message, 'error');
      }
    }

    // ─── Populate form from product data ────────────────────────────────────
    function populateForm(product) {
      // Tab 1 — 基本信息
      if (product.factory) {
        const radio = document.querySelector(`input[name="factory"][value="${product.factory}"]`);
        if (radio) radio.checked = true;
      }
      setValue('product_number', product.product_number);
      setValue('product_name',   product.product_name);
      setValue('client_name',    product.client_name);
      setValue('order_qty',      product.order_qty);
      setValue('age_grade',      product.age_grade);
      setValue('engineer',       product.engineer);
      setValue('created_at',     product.created_at ? product.created_at.slice(0, 10) : '');

      // Tab 2 — 零件清单
      const parts = product.parts || [];
      parts.forEach(row => addPartRow(row));

      // Tab 3 — 外购件
      const purchases = product.purchases || [];
      purchases.forEach(row => addPurchaseRow(row));

      // Tab 4 — 尺寸重量
      const dim = product.dimensions || {};
      setValue('dim_packing_method',    dim.packing_method);
      setValue('dim_inner_box_material', dim.inner_box_material);
      setValue('dim_outer_box_material', dim.outer_box_material);
      const dp = dim.product || {};
      setValue('dim_product_stage',     dp.stage);
      setValue('dim_product_width',     dp.width);
      setValue('dim_product_depth',     dp.depth);
      setValue('dim_product_height',    dp.height);
      setValue('dim_product_weight_kg', dp.weight_kg);
      const dpk = dim.package || {};
      setValue('dim_package_stage',           dpk.stage);
      setValue('dim_package_width',           dpk.width);
      setValue('dim_package_depth',           dpk.depth);
      setValue('dim_package_height_with_hook', dpk.height_with_hook);
      setValue('dim_package_height_no_hook',   dpk.height_no_hook);
      setValue('dim_package_gross_weight_kg',  dpk.gross_weight_kg);
      const ddisp = dim.display || {};
      setValue('dim_display_width',        ddisp.width);
      setValue('dim_display_depth',        ddisp.depth);
      setValue('dim_display_closed_height', ddisp.closed_height);
      setValue('dim_display_open_height',   ddisp.open_height);
      setValue('dim_display_total_weight_kg', ddisp.total_weight_kg);
      const ico = dim.inner_carton_order || {};
      setValue('dim_inner_order_width',  ico.width);
      setValue('dim_inner_order_depth',  ico.depth);
      setValue('dim_inner_order_height', ico.height);
      setValue('dim_inner_order_nw',     ico.nw_kg);
      setValue('dim_inner_order_gw',     ico.gw_kg);
      const icm = dim.inner_carton_measure || {};
      setValue('dim_inner_measure_width',  icm.width);
      setValue('dim_inner_measure_depth',  icm.depth);
      setValue('dim_inner_measure_height', icm.height);
      setValue('dim_inner_measure_nw',     icm.nw_kg);
      setValue('dim_inner_measure_gw',     icm.gw_kg);
      const oco = dim.outer_carton_order || {};
      setValue('dim_outer_order_width',  oco.width);
      setValue('dim_outer_order_depth',  oco.depth);
      setValue('dim_outer_order_height', oco.height);
      setValue('dim_outer_order_nw',     oco.nw_kg);
      setValue('dim_outer_order_gw',     oco.gw_kg);
      const ocm = dim.outer_carton_measure || {};
      setValue('dim_outer_measure_width',  ocm.width);
      setValue('dim_outer_measure_depth',  ocm.depth);
      setValue('dim_outer_measure_height', ocm.height);
      setValue('dim_outer_measure_nw',     ocm.nw_kg);
      setValue('dim_outer_measure_gw',     ocm.gw_kg);

      // Tab 5 — 生产注意事项
      const notes = product.production_notes || {};
      setValue('notes_product_intro',     notes.product_intro);
      setValue('notes_function_desc',     notes.function_desc);
      setValue('notes_test_requirements', notes.test_requirements);
      setValue('notes_injection_notes',   notes.injection_notes);
      setValue('notes_assembly_notes',    notes.assembly_notes);
      setValue('notes_packaging_notes',   notes.packaging_notes);

      // Tab 6 — 作业指导书
      const wis = product.work_instructions || [];
      wis.forEach(wi => addSopCard(wi));
    }

    function setValue(id, val) {
      const el = document.getElementById(id);
      if (el && val !== undefined && val !== null) el.value = val;
    }

    // ─── Collect form data ───────────────────────────────────────────────────
    function collectData() {
      // Basic info
      const factoryRadio = document.querySelector('input[name="factory"]:checked');
      const data = {
        factory:        factoryRadio ? factoryRadio.value : '',
        product_number: document.getElementById('product_number').value.trim(),
        product_name:   document.getElementById('product_name').value.trim(),
        client_name:    document.getElementById('client_name').value.trim(),
        order_qty:      numOrNull(document.getElementById('order_qty').value),
        age_grade:      document.getElementById('age_grade').value.trim(),
        engineer:       document.getElementById('engineer').value.trim(),
        created_at:     document.getElementById('created_at').value || null,
      };

      // Parts
      data.parts = collectTableRows('parts-tbody', [
        'group', 'mold_id', 'mold_name', 'part_number', 'part_name',
        'material', 'customs_name', 'color', 'pigment_no', 'process',
        'runner_ratio', 'mixed_ratio', 'gross_weight_g', 'net_weight_g',
        'single_net_weight_g', 'cavities', 'output_per_shot', 'sets',
        'usage_ratio', 'order_qty', 'machine_type', 'mold_size',
        'mold_count', 'notes'
      ]);

      // Purchases
      data.purchases = collectTableRows('purchases-tbody', [
        'category', 'name', 'part_number', 'spec', 'material',
        'customs_name', 'color', 'usage_ratio', 'order_qty', 'unit_weight_g',
        'supplier', 'surface_treatment', 'purpose', 'notes'
      ]);

      // Tab 4 — 尺寸重量
      data.dimensions = {
        packing_method:    document.getElementById('dim_packing_method').value,
        inner_box_material: document.getElementById('dim_inner_box_material').value,
        outer_box_material: document.getElementById('dim_outer_box_material').value,
        product: {
          stage:     document.getElementById('dim_product_stage').value,
          width:     numOrNull(document.getElementById('dim_product_width').value),
          depth:     numOrNull(document.getElementById('dim_product_depth').value),
          height:    numOrNull(document.getElementById('dim_product_height').value),
          weight_kg: numOrNull(document.getElementById('dim_product_weight_kg').value),
        },
        package: {
          stage:           document.getElementById('dim_package_stage').value,
          width:           numOrNull(document.getElementById('dim_package_width').value),
          depth:           numOrNull(document.getElementById('dim_package_depth').value),
          height_with_hook: numOrNull(document.getElementById('dim_package_height_with_hook').value),
          height_no_hook:  numOrNull(document.getElementById('dim_package_height_no_hook').value),
          gross_weight_kg: numOrNull(document.getElementById('dim_package_gross_weight_kg').value),
        },
        display: {
          width:          numOrNull(document.getElementById('dim_display_width').value),
          depth:          numOrNull(document.getElementById('dim_display_depth').value),
          closed_height:  numOrNull(document.getElementById('dim_display_closed_height').value),
          open_height:    numOrNull(document.getElementById('dim_display_open_height').value),
          total_weight_kg: numOrNull(document.getElementById('dim_display_total_weight_kg').value),
        },
        inner_carton_order: {
          width:  numOrNull(document.getElementById('dim_inner_order_width').value),
          depth:  numOrNull(document.getElementById('dim_inner_order_depth').value),
          height: numOrNull(document.getElementById('dim_inner_order_height').value),
          nw_kg:  numOrNull(document.getElementById('dim_inner_order_nw').value),
          gw_kg:  numOrNull(document.getElementById('dim_inner_order_gw').value),
        },
        inner_carton_measure: {
          width:  numOrNull(document.getElementById('dim_inner_measure_width').value),
          depth:  numOrNull(document.getElementById('dim_inner_measure_depth').value),
          height: numOrNull(document.getElementById('dim_inner_measure_height').value),
          nw_kg:  numOrNull(document.getElementById('dim_inner_measure_nw').value),
          gw_kg:  numOrNull(document.getElementById('dim_inner_measure_gw').value),
        },
        outer_carton_order: {
          width:  numOrNull(document.getElementById('dim_outer_order_width').value),
          depth:  numOrNull(document.getElementById('dim_outer_order_depth').value),
          height: numOrNull(document.getElementById('dim_outer_order_height').value),
          nw_kg:  numOrNull(document.getElementById('dim_outer_order_nw').value),
          gw_kg:  numOrNull(document.getElementById('dim_outer_order_gw').value),
        },
        outer_carton_measure: {
          width:  numOrNull(document.getElementById('dim_outer_measure_width').value),
          depth:  numOrNull(document.getElementById('dim_outer_measure_depth').value),
          height: numOrNull(document.getElementById('dim_outer_measure_height').value),
          nw_kg:  numOrNull(document.getElementById('dim_outer_measure_nw').value),
          gw_kg:  numOrNull(document.getElementById('dim_outer_measure_gw').value),
        },
      };

      // Tab 5 — 生产注意事项
      data.production_notes = {
        product_intro:     document.getElementById('notes_product_intro').value,
        function_desc:     document.getElementById('notes_function_desc').value,
        test_requirements: document.getElementById('notes_test_requirements').value,
        injection_notes:   document.getElementById('notes_injection_notes').value,
        assembly_notes:    document.getElementById('notes_assembly_notes').value,
        packaging_notes:   document.getElementById('notes_packaging_notes').value,
      };

      // Tab 6 — 作业指导书
      data.work_instructions = collectWorkInstructions();

      return data;
    }

    function collectTableRows(tbodyId, fields) {
      const rows = document.getElementById(tbodyId).querySelectorAll('tr');
      return Array.from(rows).map(tr => {
        const inputs = tr.querySelectorAll('input, select, textarea');
        const obj = {};
        fields.forEach((field, i) => {
          const el = inputs[i];
          if (!el) return;
          const val = el.value;
          // Treat number inputs specially
          if (el.type === 'number') {
            obj[field] = val === '' ? null : parseFloat(val);
          } else {
            obj[field] = val;
          }
        });
        return obj;
      });
    }

    function numOrNull(val) {
      if (val === '' || val === undefined || val === null) return null;
      const n = parseFloat(val);
      return isNaN(n) ? null : n;
    }

    // ─── Save product ────────────────────────────────────────────────────────
    async function saveProduct() {
      const data = collectData();

      // Validate required fields
      if (!data.factory) {
        showToast('请选择厂区', 'error');
        // Switch to basic tab
        bootstrap.Tab.getOrCreateInstance(document.getElementById('tab-basic-tab')).show();
        return;
      }
      if (!data.product_number) {
        showToast('请填写产品编号', 'error');
        bootstrap.Tab.getOrCreateInstance(document.getElementById('tab-basic-tab')).show();
        document.getElementById('product_number').focus();
        return;
      }
      if (!data.product_name) {
        showToast('请填写产品名称', 'error');
        bootstrap.Tab.getOrCreateInstance(document.getElementById('tab-basic-tab')).show();
        document.getElementById('product_name').focus();
        return;
      }

      const btn = document.getElementById('btn-save');
      btn.disabled = true;
      btn.textContent = '保存中...';

      try {
        let result;
        const id = getProductId();
        if (id) {
          result = await api('PUT', '/api/products/' + id, data);
        } else {
          result = await api('POST', '/api/products', data);
          // Update URL to include new ID (no page reload)
          window.history.replaceState({}, '', 'product.html?id=' + result.id);
          // Show generate button
          document.getElementById('btn-generate').classList.remove('d-none');
        }
        showToast('保存成功');
        updateTitle(result);
      } catch (e) {
        showToast('保存失败: ' + e.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '保存';
      }
    }

    // ─── Generate Excel ──────────────────────────────────────────────────────
    function generateExcel() {
      const id = getProductId();
      if (!id) { showToast('请先保存产品', 'error'); return; }
      const num  = document.getElementById('product_number').value || 'product';
      const name = document.getElementById('product_name').value || '';
      const filename = `${num}_${name}_工程资料.zip`;
      downloadFromPost('/api/products/' + id + '/generate', filename);
    }

    // ─── Dynamic rows — 零件清单 ─────────────────────────────────────────────
    function addPartRow(data) {
      data = data || {};
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><input type="text"   class="form-control form-control-sm col-narrow" value="${esc(data.group)}"></td>
        <td><input type="text"   class="form-control form-control-sm col-medium" value="${esc(data.mold_id)}"></td>
        <td><input type="text"   class="form-control form-control-sm col-wide"   value="${esc(data.mold_name)}"></td>
        <td><input type="text"   class="form-control form-control-sm col-medium" value="${esc(data.part_number)}"></td>
        <td><input type="text"   class="form-control form-control-sm col-wide"   value="${esc(data.part_name)}"></td>
        <td><input type="text"   class="form-control form-control-sm col-medium" value="${esc(data.material)}"></td>
        <td><input type="text"   class="form-control form-control-sm col-wide"   value="${esc(data.customs_name)}"></td>
        <td><input type="text"   class="form-control form-control-sm col-narrow" value="${esc(data.color)}"></td>
        <td><input type="text"   class="form-control form-control-sm col-medium" value="${esc(data.pigment_no)}"></td>
        <td><input type="text"   class="form-control form-control-sm col-wide"   value="${esc(data.process)}"></td>
        <td><input type="number" class="form-control form-control-sm col-num" step="any" value="${numVal(data.runner_ratio)}"></td>
        <td><input type="number" class="form-control form-control-sm col-num" step="any" value="${numVal(data.mixed_ratio)}"></td>
        <td><input type="number" class="form-control form-control-sm col-num" step="any" value="${numVal(data.gross_weight_g)}"></td>
        <td><input type="number" class="form-control form-control-sm col-num" step="any" value="${numVal(data.net_weight_g)}"></td>
        <td><input type="number" class="form-control form-control-sm col-num" step="any" value="${numVal(data.single_net_weight_g)}"></td>
        <td><input type="number" class="form-control form-control-sm col-num" step="any" value="${numVal(data.cavities)}"></td>
        <td><input type="number" class="form-control form-control-sm col-num" step="any" value="${numVal(data.output_per_shot)}"></td>
        <td><input type="number" class="form-control form-control-sm col-num" step="any" value="${numVal(data.sets)}"></td>
        <td><input type="text"   class="form-control form-control-sm col-narrow" value="${esc(data.usage_ratio)}"></td>
        <td><input type="number" class="form-control form-control-sm col-num" step="any" value="${numVal(data.order_qty)}"></td>
        <td><input type="text"   class="form-control form-control-sm col-medium" value="${esc(data.machine_type)}"></td>
        <td><input type="text"   class="form-control form-control-sm col-medium" value="${esc(data.mold_size)}"></td>
        <td><input type="text"   class="form-control form-control-sm col-narrow" value="${esc(data.mold_count)}"></td>
        <td><input type="text"   class="form-control form-control-sm col-wide"   value="${esc(data.notes)}"></td>
        <td><button type="button" class="btn btn-sm btn-outline-danger btn-delete-row" onclick="this.closest('tr').remove()">删</button></td>
      `;
      document.getElementById('parts-tbody').appendChild(tr);
    }

    // ─── Dynamic rows — 外购件 ───────────────────────────────────────────────
    function addPurchaseRow(data) {
      data = data || {};
      const categoryOptions = ['彩盒', '吸塑', '辅料', '纸箱'];
      const optionsHtml = categoryOptions.map(opt =>
        `<option value="${opt}"${data.category === opt ? ' selected' : ''}>${opt}</option>`
      ).join('');

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>
          <select class="form-select form-select-sm col-medium">
            <option value="">--</option>
            ${optionsHtml}
          </select>
        </td>
        <td><input type="text"   class="form-control form-control-sm col-wide"   value="${esc(data.name)}"></td>
        <td><input type="text"   class="form-control form-control-sm col-medium" value="${esc(data.part_number)}"></td>
        <td><input type="text"   class="form-control form-control-sm col-wide"   value="${esc(data.spec)}"></td>
        <td><input type="text"   class="form-control form-control-sm col-medium" value="${esc(data.material)}"></td>
        <td><input type="text"   class="form-control form-control-sm col-wide"   value="${esc(data.customs_name)}"></td>
        <td><input type="text"   class="form-control form-control-sm col-narrow" value="${esc(data.color)}"></td>
        <td><input type="text"   class="form-control form-control-sm col-narrow" value="${esc(data.usage_ratio)}"></td>
        <td><input type="number" class="form-control form-control-sm col-num" step="any" value="${numVal(data.order_qty)}"></td>
        <td><input type="number" class="form-control form-control-sm col-num" step="any" value="${numVal(data.unit_weight_g)}"></td>
        <td><input type="text"   class="form-control form-control-sm col-wide"   value="${esc(data.supplier)}"></td>
        <td><input type="text"   class="form-control form-control-sm col-wide"   value="${esc(data.surface_treatment)}"></td>
        <td><input type="text"   class="form-control form-control-sm col-medium" value="${esc(data.purpose)}"></td>
        <td><input type="text"   class="form-control form-control-sm col-wide"   value="${esc(data.notes)}"></td>
        <td><button type="button" class="btn btn-sm btn-outline-danger btn-delete-row" onclick="this.closest('tr').remove()">删</button></td>
      `;
      document.getElementById('purchases-tbody').appendChild(tr);
    }

    // ─── Escape helpers ──────────────────────────────────────────────────────
    function esc(val) {
      if (val === undefined || val === null) return '';
      return String(val).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function numVal(val) {
      if (val === undefined || val === null || val === '') return '';
      return val;
    }

    // ─── SOP (作业指导书) ────────────────────────────────────────────────────

    function renumberSopCards() {
      document.querySelectorAll('#sop-cards-container .sop-card').forEach((card, idx) => {
        const badge = card.querySelector('.sop-seq');
        if (badge) badge.textContent = idx + 1;
      });
    }

    function addSopPartRow(tbody, data) {
      data = data || {};
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><input type="text" class="form-control form-control-sm" value="${esc(data.name)}" placeholder="零件名称"></td>
        <td><input type="text" class="form-control form-control-sm" value="${esc(data.material_spec)}" placeholder="材料规格"></td>
        <td><input type="text" class="form-control form-control-sm" value="${esc(data.qty)}" placeholder="1"></td>
        <td><button type="button" class="btn btn-sm btn-outline-danger" onclick="this.closest('tr').remove()">删</button></td>
      `;
      tbody.appendChild(tr);
    }

    function addSopCard(data) {
      data = data || {};
      const container = document.getElementById('sop-cards-container');
      const seq = container.querySelectorAll('.sop-card').length + 1;

      const card = document.createElement('div');
      card.className = 'card mb-3 sop-card';
      card.innerHTML = `
        <div class="card-header d-flex align-items-center">
          <span class="me-2">工序</span>
          <span class="sop-seq badge bg-primary me-2">${seq}</span>
          <input type="text" class="form-control form-control-sm me-2" style="width:200px" placeholder="工序名称" data-field="name" value="${esc(data.name)}">
          <label class="me-1 mb-0">操作时间:</label>
          <input type="text" class="form-control form-control-sm me-2" style="width:80px" placeholder="如 9S" data-field="cycle_time" value="${esc(data.cycle_time)}">
          <button class="btn btn-sm btn-outline-danger ms-auto btn-delete-sop">删除工序</button>
        </div>
        <div class="card-body">
          <div class="row">
            <div class="col-md-6">
              <label class="fw-bold mb-1">使用零件</label>
              <table class="table table-sm table-bordered sop-parts-table">
                <thead><tr><th>名称</th><th>材料规格</th><th>用量</th><th></th></tr></thead>
                <tbody></tbody>
              </table>
              <button type="button" class="btn btn-sm btn-outline-secondary btn-add-sop-part">+ 添加零件</button>
            </div>
            <div class="col-md-6">
              <label class="fw-bold mb-1">作业内容 (每行一个步骤)</label>
              <textarea class="form-control mb-2" rows="5" data-field="steps" placeholder="1. 第一步&#10;2. 第二步">${esc(data.steps)}</textarea>
              <label class="fw-bold mb-1">作业工具 (逗号分隔)</label>
              <input type="text" class="form-control mb-2" data-field="tools" placeholder="布条, 清水, 手套" value="${esc(data.tools)}">
              <label class="fw-bold mb-1">注意事项 (逗号分隔)</label>
              <input type="text" class="form-control" data-field="cautions" placeholder="温度不能过高, 不能太用力" value="${esc(data.cautions)}">
            </div>
          </div>
        </div>
      `;

      // Bind delete button
      card.querySelector('.btn-delete-sop').addEventListener('click', () => {
        card.remove();
        renumberSopCards();
      });

      // Bind add-part button
      card.querySelector('.btn-add-sop-part').addEventListener('click', () => {
        const tbody = card.querySelector('.sop-parts-table tbody');
        addSopPartRow(tbody);
      });

      // Populate existing parts
      const parts = data.parts || [];
      const tbody = card.querySelector('.sop-parts-table tbody');
      parts.forEach(p => addSopPartRow(tbody, p));

      container.appendChild(card);
    }

    function collectWorkInstructions() {
      const cards = document.querySelectorAll('#sop-cards-container .sop-card');
      return Array.from(cards).map(card => {
        const getField = (field) => {
          const el = card.querySelector(`[data-field="${field}"]`);
          return el ? el.value : '';
        };
        // Collect parts from the parts table
        const partRows = card.querySelectorAll('.sop-parts-table tbody tr');
        const parts = Array.from(partRows).map(tr => {
          const inputs = tr.querySelectorAll('input');
          return {
            name:          inputs[0] ? inputs[0].value : '',
            material_spec: inputs[1] ? inputs[1].value : '',
            qty:           inputs[2] ? inputs[2].value : '',
          };
        });
        return {
          name:       getField('name'),
          cycle_time: getField('cycle_time'),
          steps:      getField('steps'),
          tools:      getField('tools'),
          cautions:   getField('cautions'),
          parts,
        };
      });
    }

    // ─── Init ────────────────────────────────────────────────────────────────
    (function init() {
      // Set default date to today
      document.getElementById('created_at').value = today();

      const id = getProductId();
      if (id) {
        loadProduct(id);
      }
    })();
  </script>
</body>
