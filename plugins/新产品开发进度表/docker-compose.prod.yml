version: "3.8"

services:
  dev-progress:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dev-progress
    ports:
      - "3003:3000"
    volumes:
      - "./data:/app/data"
      - "./uploads:/app/uploads"
    environment:
      - PORT=3000
      - DATA_PATH=/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - platform-net

networks:
  platform-net:
    external: true
